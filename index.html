<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2, user-scalable=yes">
<title>VEÍCULOS MASTER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --bg: #020617; --card: #0f172a; --accent: #22c55e; --edit: #3b82f6; --danger: #ef4444; --border: #1e293b; --text: #f8fafc; --text-dim: #94a3b8; }
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; background-image: radial-gradient(circle at 50% -20%, #1e293b, #020617); }
#login-screen { position: fixed; inset: 0; background: linear-gradient(rgba(2,6,23,0.85), rgba(2,6,23,0.85)), url('https://raw.githubusercontent.com/comunicasindico/veiculos/main/img/bcveiculos.png') no-repeat center center/cover; display: flex; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(10px); }
.login-box { width: 90%; max-width: 400px; background: rgba(15, 23, 42, 0.95); padding: 40px; border-radius: 24px; border: 1px solid var(--border); text-align: center; }
input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--border); background: #1e293b; color: #fff; outline: none; font-size: 16px; }
button { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
.btn-primary { background: var(--accent); color: #052e16; }
#app { display: none; height: 100vh; flex-direction: column; }
.top-header { background: var(--card); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
.tabs { display: flex; gap: 4px; padding: 8px 16px; background: var(--card); overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
.tab-btn { background: transparent; color: var(--text-dim); padding: 10px 20px; border-radius: 8px; border: none; font-size: 12px; white-space: nowrap; font-weight: 700; cursor: pointer; text-transform: uppercase; }
.tab-btn.active { background: rgba(34,197,94,0.1); color: var(--accent); }
.main-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
.table-wrapper { overflow-x: auto; background: var(--card); border-radius: 16px; border: 1px solid var(--border); width: 100%; }
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 800px; }
th { background: #1e293b; padding: 14px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; text-align: left; position: sticky; top: 0; z-index: 10; }
td { padding: 12px 14px; border-bottom: 1px solid var(--border); }
.txt-right { text-align: right; }
.txt-center { text-align: center; }
.actions { display: flex; gap: 6px; justify-content: center; min-width: 80px; }
.btn-action { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: white; }
.btn-del { background: var(--danger); }
.btn-edit { background: var(--edit); }
[contenteditable="false"] { background: transparent; }
[contenteditable="true"] { background: rgba(255,255,255,0.05) !important; outline: 1px solid var(--edit); border-radius: 4px; }
.btn-sair { background: var(--danger); color: white; width: auto; padding: 6px 12px; font-size: 10px; }
@media (max-width: 600px) { .main-container { padding: 10px; } .card { padding: 15px; } }
</style>
</head>
<body>
<div id="login-screen">
<div class="login-box">
<h2 style="color:var(--accent); font-weight:800;">VEÍCULOS MASTER</h2>
<p style="color:var(--text-dim); font-size: 13px; margin-bottom: 20px;">Controle Total</p>
<input type="text" id="user" placeholder="Usuário">
<input type="password" id="pass" placeholder="Senha">
<button class="btn-primary" onclick="login()">ACESSAR PAINEL</button>
</div>
</div>
<div id="app">
<div class="top-header">
<h1 style="font-size:16px; color:var(--accent); font-weight:800;">AUDITORIA MASTER</h1>
<button class="btn-sair" onclick="logout()">SAIR</button>
</div>
<div class="tabs">
<button class="tab-btn active" onclick="showTab('tab-dash', event)">📊 DASHBOARD</button>
<button class="tab-btn" onclick="showTab('tab-abast', event)">⛽ ABASTECIMENTOS</button>
<button class="tab-btn" onclick="showTab('tab-veic', event)">🚗 VEÍCULOS</button>
<button class="tab-btn" onclick="showTab('tab-posto', event)">🏪 POSTOS</button>
<button class="tab-btn" onclick="showTab('tab-motorista', event)">👤 MOTORISTAS</button>
</div>
<div id="tab-dash" class="main-container">
<div class="card" style="height: 300px;"><canvas id="mainChart"></canvas></div>
</div>
<div id="tab-abast" class="main-container" style="display:none">
<div class="table-wrapper"><table id="tbl-abast">
<thead><tr><th>DATA</th><th>POSTO</th><th>VEÍCULO</th><th class="txt-right">LITROS</th><th class="txt-right">KM ATUAL</th><th class="txt-right">TOTAL</th><th class="txt-center">AÇÕES</th></tr></thead>
<tbody></tbody></table></div>
</div>
<div id="tab-veic" class="main-container" style="display:none">
<div class="table-wrapper"><table id="tbl-veic">
<thead><tr><th>PLACA</th><th>MODELO</th><th>MARCA</th><th>ANO</th><th>COR</th><th>RENAVAM</th><th class="txt-right">KM ATUAL</th><th class="txt-center">AÇÕES</th></tr></thead>
<tbody></tbody></table></div>
</div>
<div id="tab-posto" class="main-container" style="display:none">
<div class="table-wrapper"><table id="tbl-posto">
<thead><tr><th>NOME POSTO</th><th>CNPJ</th><th>CIDADE</th><th>UF</th><th>CEP</th><th class="txt-center">AÇÕES</th></tr></thead>
<tbody></tbody></table></div>
</div>
<div id="tab-motorista" class="main-container" style="display:none">
<div class="table-wrapper"><table id="tbl-motorista">
<thead><tr><th>NOME</th><th>TELEFONE</th><th>CPF</th><th>CNH</th><th>EMAIL</th><th class="txt-center">AÇÕES</th></tr></thead>
<tbody></tbody></table></div>
</div>
</div>
<script>
const SUPABASE_URL = "https://gspdlrenyrzbkxlvyugc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzcGRscmVueXJ6Ymt4bHZ5dWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODU0NzAsImV4cCI6MjA5MDQ2MTQ3MH0.UWfkWvOh4qMDEcByVL-KZ6ejJ80V7wJlDOFH76TywaI";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const EMPRESA_ID = "64e10505-0992-48b6-a461-616c609cbc03";
let store = { data: { veiculos: [], postos: [], abastecimentos: [], motoristas: [] } };

const clean = (v) => (v === null || v === undefined) ? "" : v;
const fMoeda = (v) => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
const fMilhar = (v) => Number(v).toLocaleString('pt-BR');
const fCPF = (v) => clean(v).replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
const fCNPJ = (v) => clean(v).replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
const fTel = (v) => clean(v).replace(/(\d{2})(\d{1})(\d{4})(\d{4})/, "($1) $2 $3-$4");

async function login() {
document.getElementById('login-screen').style.display = 'none';
document.getElementById('app').style.display = 'flex';
init();
}
async function init() {
const [v, p, a, m] = await Promise.all([
db.from("veiculo_veiculos").select("*").eq("empresa_id", EMPRESA_ID),
db.from("postos_veiculos").select("*").eq("empresa_id", EMPRESA_ID).order('nome_posto', { ascending: true }),
db.from("abastecimento_veiculos").select("*, postos_veiculos(nome_posto), veiculo_veiculos(placa)").eq("empresa_id", EMPRESA_ID).order("data_abastecimento", {ascending:false}),
db.from("motoristas_veiculos").select("*").eq("empresa_id", EMPRESA_ID)
]);
store.data.veiculos = v.data || [];
store.data.postos = p.data || [];
store.data.abastecimentos = a.data || [];
store.data.motoristas = m.data || [];
renderAll();
}
function renderAll() {
renderTable('tbl-abast', store.data.abastecimentos, r => `
<td>${new Date(r.data_abastecimento).toLocaleDateString('pt-BR')}</td>
<td>${clean(r.postos_veiculos?.nome_posto)}</td>
<td>${clean(r.veiculo_veiculos?.placa)}</td>
<td class="txt-right">${r.litros}</td>
<td class="txt-right">${fMilhar(r.quilometragem)}</td>
<td class="txt-right">${fMoeda(r.valor_total)}</td>
<td class="txt-center">${actions('abastecimento_veiculos', r.id)}</td>
`);
renderTable('tbl-veic', store.data.veiculos, r => `
<td data-col="placa">${clean(r.placa)}</td>
<td data-col="modelo">${clean(r.modelo)}</td>
<td data-col="marca">${clean(r.marca)}</td>
<td data-col="ano">${clean(r.ano)}</td>
<td data-col="cor">${clean(r.cor)}</td>
<td data-col="renavam">${clean(r.renavam)}</td>
<td class="txt-right" data-col="km_atual">${fMilhar(r.km_atual)}</td>
<td class="txt-center">${actions('veiculo_veiculos', r.id)}</td>
`);
renderTable('tbl-posto', store.data.postos, r => `
<td data-col="nome_posto">${clean(r.nome_posto)}</td>
<td data-col="cnpj">${fCNPJ(r.cnpj)}</td>
<td data-col="cidade">${clean(r.cidade)}</td>
<td data-col="uf">${clean(r.uf)}</td>
<td data-col="cep">${clean(r.cep)}</td>
<td class="txt-center">${actions('postos_veiculos', r.id)}</td>
`);
renderTable('tbl-motorista', store.data.motoristas, r => `
<td data-col="nome">${clean(r.nome)}</td>
<td data-col="telefone">${fTel(r.telefone)}</td>
<td data-col="cpf">${fCPF(r.cpf)}</td>
<td data-col="cnh">${clean(r.cnh)}</td>
<td data-col="email">${clean(r.email)}</td>
<td class="txt-center">${actions('motoristas_veiculos', r.id)}</td>
`);
}
function actions(tb, id) {
return `<div class="actions">
<button class="btn-action btn-edit" onclick="enableEdit(this, '${tb}', '${id}')">✏️</button>
<button class="btn-action btn-del" onclick="del('${tb}', '${id}')">🗑️</button>
</div>`;
}
function enableEdit(btn, table, id) {
const row = btn.closest('tr');
const cells = row.querySelectorAll('td[data-col]');
const isEditing = btn.innerText === "💾";
if (!isEditing) {
cells.forEach(c => c.contentEditable = "true");
btn.innerText = "💾";
btn.style.background = "#22c55e";
} else {
const updates = {};
cells.forEach(c => {
let val = c.innerText.replace(/[R$\.\s-]/g, '').replace(',', '.');
updates[c.dataset.col] = isNaN(val) || val === "" ? c.innerText : parseFloat(val);
c.contentEditable = "false";
});
save(table, id, updates);
btn.innerText = "✏️";
btn.style.background = "#3b82f6";
}
}
async function save(table, id, data) {
const { error } = await db.from(table).update(data).eq('id', id);
if(!error) console.log('Salvo'); else alert("Erro ao salvar");
}
async function del(table, id) {
if(confirm("Excluir registro?")) {
await db.from(table).delete().eq('id', id);
init();
}
}
function renderTable(id, data, rowFn) {
const tbody = document.querySelector(`#${id} tbody`);
if(tbody) tbody.innerHTML = data.map(r => `<tr>${rowFn(r)}</tr>`).join('');
}
function showTab(id, e) {
document.querySelectorAll('.main-container').forEach(t => t.style.display = 'none');
document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
document.getElementById(id).style.display = 'flex';
e.target.classList.add('active');
}
function logout() { location.reload(); }
window.onload = login;
</script>
</body>
</html>
