<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Dashboard Fleet Audit Neto - V3</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://unpkg.com/tesseract.js@v4.1.1/dist/tesseract.min.js"></script>
<style>
:root{--bg:#121212;--card:#1e1e1e;--text:#fff;--accent:#00ff88;--border:#333;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;margin:0;padding:20px;}
.header{text-align:center;background:var(--card);padding:20px;border-radius:10px;margin-bottom:20px;}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:20px;}
.kpi{background:var(--card);padding:20px;border-radius:10px;text-align:center;box-shadow:0 4px 8px rgba(0,0,0,0.3);}
.kpi span{font-size:2em;color:var(--accent);font-weight:bold;}
#costChart{max-height:400px;background:var(--card);border-radius:10px;padding:20px;margin-bottom:20px;}
.tables,.scanner-section{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:20px;margin-bottom:20px;}
table{background:var(--card);border-radius:10px;overflow:hidden;box-shadow:0 4px 8px rgba(0,0,0,0.3);width:100%;}
th,td{padding:8px;text-align:left;border-bottom:1px solid var(--border);}
th{background:#333;}
.scanner{background:var(--card);padding:20px;border-radius:10px;text-align:center;}
#video{width:100%;max-width:400px;border-radius:10px;}
button{background:var(--accent);color:#000;border:none;padding:10px 20px;margin:5px;border-radius:5px;cursor:pointer;font-weight:bold;}
#loginModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;}
.login-form{background:var(--card);padding:40px;border-radius:10px;text-align:center;}
input{display:block;margin:10px auto;padding:10px;width:200px;background:#333;color:var(--text);border:1px solid var(--border);border-radius:5px;}
#expired{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);color:#ff4444;padding:40px;border-radius:10px;text-align:center;font-size:1.5em;z-index:1000;}
</style>
</head>
<body>
<div id="loginModal">
<div class="login-form">
<h2>Login - Usuários Veículos</h2>
<input id="userId" type="number" placeholder="Digite Usuario ID">
<button onclick="doLogin()">Entrar</button>
</div>
</div>
<div id="expired" style="display:none;">
Assinatura expirada. Válida até Maio 2027.
</div>
<div id="dashboard" style="display:none;">
<div class="header">
<h1>Dashboard Fleet Audit Neto - V3</h1>
<button onclick="logout()" style="float:right;">Logout</button>
</div>
<div class="kpis">
<div class="kpi">Custo Médio por Km: <span id="avgCostKm">--</span> R$/km</div>
</div>
<canvas id="costChart"></canvas>
<div class="tables">
<table id="tbl_monthly"><thead><tr></tr></thead><tbody></tbody></table>
<table id="tbl_usuarios_veiculos"><thead><tr></tr></thead><tbody></tbody></table>
<table id="tbl_motoristas_veiculos"><thead><tr></tr></thead><tbody></tbody></table>
<table id="tbl_veiculo_veiculos"><thead><tr></tr></thead><tbody></tbody></table>
<table id="tbl_postos_veiculos"><thead><tr></tr></thead><tbody></tbody></table>
<table id="tbl_abastecimento_veiculos"><thead><tr></tr></thead><tbody></tbody></table>
</div>
<div class="scanner-section">
<div class="scanner">
<h3>Scanner OCR / QRCode</h3>
<video id="video" autoplay></video>
<canvas id="canvas" style="display:none;"></canvas>
<button onclick="scanQR()">Scan QR</button>
<button onclick="scanOCR()">Scan OCR</button>
</div>
</div>
</div>
<script>
const expirationDate=new Date('2027-05-01T00:00:00');
if(new Date()>expirationDate){document.getElementById('expired').style.display='block';throw new Error('Expired');}
const usuarios_veiculos=[{id:1,usuario_id:1,veiculo_id:1},{id:2,usuario_id:2,veiculo_id:2}];
const motoristas_veiculos=[{id:1,motorista_id:1,veiculo_id:1,data_inicio:'2024-01-01'},{id:2,motorista_id:2,veiculo_id:2,data_inicio:'2024-01-01'}];
const veiculo_veiculos=[{id:1,placa:'ABC-1234',modelo:'Fiat Uno',ano:2020},{id:2,placa:'DEF-5678',modelo:'VW Gol',ano:2021}];
const postos_veiculos=[{id:1,posto_id:1,veiculo_id:1},{id:2,posto_id:2,veiculo_id:2}];
const abastecimento_veiculos=[{data:'2024-01-15',km_anterior:10000,km_atual:10500,litros:50,custo:250,usuario_id:1,veiculo_id:1,posto_id:1,motorista_id:1},{data:'2024-02-20',km_anterior:10500,km_atual:11020,litros:52,custo:260,usuario_id:1,veiculo_id:1,posto_id:1,motorista_id:1},{data:'2024-03-10',km_anterior:11020,km_atual:11530,litros:51,custo:255,usuario_id:1,veiculo_id:1,posto_id:2,motorista_id:1},{data:'2024-04-05',km_anterior:11530,km_atual:12040,litros:49,custo:245,usuario_id:1,veiculo_id:1,posto_id:1,motorista_id:1},{data:'2024-05-18',km_anterior:12040,km_atual:12560,litros:53,custo:265,usuario_id:1,veiculo_id:1,posto_id:2,motorista_id:1},{data:'2024-06-12',km_anterior:12560,km_atual:13050,litros:50,custo:250,usuario_id:1,veiculo_id:1,posto_id:1,motorista_id:1}];
let currentUser=null;
let costChart=null;
function doLogin(){const uid=parseInt(document.getElementById('userId').value);if(usuarios_veiculos.some(u=>u.usuario_id===uid)){currentUser=uid;localStorage.setItem('currentUser',uid);document.getElementById('loginModal').style.display='none';document.getElementById('dashboard').style.display='block';initDashboard();}else{alert('Usuario ID não encontrado nas tabelas novas.');}}
function logout(){localStorage.removeItem('currentUser');currentUser=null;document.getElementById('dashboard').style.display='none';document.getElementById('loginModal').style.display='flex';}
function initDashboard(){const userAbastecs=abastecimento_veiculos.filter(a=>a.usuario_id===currentUser);userAbastecs.forEach(a=>{a.km=a.km_atual-a.km_anterior;a.kml=a.km/a.litros;});const totalKm=userAbastecs.reduce((s,a)=>s+a.km,0);const totalLitros=userAbastecs.reduce((s,a)=>s+a.litros,0);const totalCusto=userAbastecs.reduce((s,a)=>s+a.custo,0);const avgCostKm=totalKm?totalCusto/totalKm:0;document.getElementById('avgCostKm').textContent=avgCostKm.toFixed(4);const monthly={};userAbastecs.forEach(a=>{const m=a.data.slice(0,7);if(!monthly[m])monthly[m]={km:0,litros:0,custo:0};monthly[m].km+=a.km;monthly[m].litros+=a.litros;monthly[m].custo+=a.custo;});const monthsSorted=Object.keys(monthly).sort();const monthlyRows=monthsSorted.map(m=>{const r=monthly[m];return{mes:m,'Km Total':r.km.toFixed(0),'Litros Total':r.litros.toFixed(1),'Consumo Real (Km/L)':(r.km/r.litros).toFixed(2),'Consumo Financeiro (R$)':r.custo.toFixed(2)};});renderTable('tbl_monthly',monthlyRows,['Mês','Km Total','Litros Total','Consumo Real (Km/L)','Consumo Financeiro (R$)']);renderTable('tbl_usuarios_veiculos',usuarios_veiculos,['ID','Usuario ID','Veiculo ID']);renderTable('tbl_motoristas_veiculos',motoristas_veiculos,['ID','Motorista ID','Veiculo ID','Data Início']);renderTable('tbl_veiculo_veiculos',veiculo_veiculos,['ID','Placa','Modelo','Ano']);renderTable('tbl_postos_veiculos',postos_veiculos,['ID','Posto ID','Veiculo ID']);const abastRows=userAbastecs.map(a=>({data:a.data,'Km Anterior':a.km_anterior,'Km Atual':a.km_atual,Km:a.km.toFixed(0),'Km/L':a.kml.toFixed(2),Litros:a.litros,'Custo (R$)':a.custo,'Usuario ID':a.usuario_id,'Veiculo ID':a.veiculo_id,'Posto ID':a.posto_id,'Motorista ID':a.motorista_id}));renderTable('tbl_abastecimento_veiculos',abastRows,['Data','Km Anterior','Km Atual','Km','Km/L','Litros','Custo (R$)','Usuario ID','Veiculo ID','Posto ID','Motorista ID']);const ctx=document.getElementById('costChart').getContext('2d');costChart=new Chart(ctx,{type:'bar',data:{labels:monthsSorted,datasets:[{label:'Custos Mensais (R$)',data:monthsSorted.map(m=>monthly[m].custo),backgroundColor:'rgba(0,255,136,0.6)',borderColor:'rgba(0,255,136,1)',borderWidth:1}]},options:{scales:{y:{beginAtZero:true}}}});initScanner();}
function renderTable(tableId,data,headers){const table=document.getElementById(tableId);const thead=table.querySelector('thead tr');thead.innerHTML=headers.map(h=>`<th>${h}</th>`).join('');const tbody=table.querySelector('tbody');tbody.innerHTML='';data.forEach(row=>{const tr=document.createElement('tr');headers.forEach(h=>{const td=document.createElement('td');let val=row[h]||'';if(typeof val==='number')val=val.toFixed(2);td.textContent=val;tr.appendChild(td);});tbody.appendChild(tr);});}
let video,canvas,ctxc;function initScanner(){video=document.getElementById('video');canvas=document.getElementById('canvas');ctxc=canvas.getContext('2d');navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(stream=>{video.srcObject=stream;video.play();tick();}).catch(e=>console.error('Camera error:',e));}
function tick(){if(video.readyState===video.HAVE_ENOUGH_DATA){canvas.width=video.videoWidth;canvas.height=video.videoHeight;ctxc.drawImage(video,0,0,canvas.width,canvas.height);}requestAnimationFrame(tick);}
function scanQR(){const imageData=ctxc.getImageData(0,0,canvas.width,canvas.height);const code=jsQR(imageData.data,imageData.width,imageData.height);if(code){alert('QR Code detectado: '+code.data);}else{alert('Nenhum QR Code encontrado.');}}
async function scanOCR(){try{const{data:{text}}=await Tesseract.recognize(canvas.toDataURL(),'por+eng');alert('Texto OCR: '+text.trim());}catch(e){alert('Erro no OCR: '+e.message);}}
if(localStorage.getItem('currentUser')){currentUser=parseInt(localStorage.getItem('currentUser'));document.getElementById('loginModal').style.display='none';document.getElementById('dashboard').style.display='block';initDashboard();}
</script>
</body>
</html>
