<script>

/* ESTADO GLOBAL */
let iaBox
let VID=null
let graficoConsumo,graficoGasto
let tipoGrafico="consumo"
let filtroInicio=null
let filtroFim=null
/* CNPJ AUTO (VERSÃO LIMPA E CORRETA) */
let timerCNPJ=null
let ultimoCNPJBuscado=null

function initCNPJAuto(){
const cnpjInput=document.getElementById("cnpjBusca")
if(!cnpjInput)return

cnpjInput.addEventListener("input",()=>{
let v=cnpjInput.value.replace(/\D/g,"")

v=v.replace(/^(\d{2})(\d)/,"$1.$2")
v=v.replace(/^(\d{2})\.(\d{3})(\d)/,"$1.$2.$3")
v=v.replace(/\.(\d{3})(\d)/,".$1/$2")
v=v.replace(/(\d{4})(\d)/,"$1-$2")

cnpjInput.value=v

let limpo=v.replace(/\D/g,"")

clearTimeout(timerCNPJ)

if(limpo.length===14){
timerCNPJ=setTimeout(()=>{
if(limpo!==ultimoCNPJBuscado){
ultimoCNPJBuscado=limpo
buscarCNPJ_PRO(limpo)
}
},600)
}
})
}

function getCacheCNPJ(cnpj){
return JSON.parse(localStorage.getItem("cnpj_"+cnpj)||"null")
}
function setCacheCNPJ(cnpj,data){
localStorage.setItem("cnpj_"+cnpj,JSON.stringify(data))
}

function validarCNPJ(cnpj){
cnpj=cnpj.replace(/\D/g,"")
if(cnpj.length!==14)return false
if(/^(\d)\1+$/.test(cnpj))return false
let t=cnpj.length-2,d=cnpj.substring(0,t),dv=cnpj.substring(t),s=0,p=t-7
for(let i=t;i>=1;i--){s+=d.charAt(t-i)*p--;if(p<2)p=9}
let r=s%11<2?0:11-s%11
if(r!=dv.charAt(0))return false
t=t+1;d=cnpj.substring(0,t);s=0;p=t-7
for(let i=t;i>=1;i--){s+=d.charAt(t-i)*p--;if(p<2)p=9}
r=s%11<2?0:11-s%11
return r==dv.charAt(1)
}
  
async function buscarCNPJ_PRO(cnpjRaw){
let cnpj=cnpjRaw.replace(/\D/g,"")
if(!validarCNPJ(cnpj)){
alert("CNPJ inválido")
return
}
let cache=getCacheCNPJ(cnpj)
if(cache){
preencherPosto(cache)
return
}
let dados=null
/* 🔥 BRASILAPI */
try{
let r=await fetch("https://brasilapi.com.br/api/cnpj/v1/"+cnpj)
if(r.ok){
let j=await r.json()
dados={
nome:j.razao_social,
cidade:j.municipio,
uf:j.uf,
logradouro:j.logradouro,
numero:j.numero,
cep:j.cep
}
}
}catch(e){}
/* 🔥 SE FALTAR DADOS → RECEITAWS */
if(!dados || !dados.logradouro){
try{
let r=await fetch("https://receitaws.com.br/v1/cnpj/"+cnpj)
let j=await r.json()
if(j.status!=="ERROR"){
dados={
nome:j.nome,
cidade:j.municipio,
uf:j.uf,
logradouro:j.logradouro,
numero:j.numero,
cep:j.cep
}
}
}catch(e){}
}
if(!dados){
alert("Não foi possível consultar o CNPJ")
return
}
setCacheCNPJ(cnpj,dados)
preencherPosto(dados)
}

function preencherPosto(d){
p_nome.value=d.nome||""
p_cidade.value=(d.cidade||"")+"-"+(d.uf||"")
p_endereco.value=d.logradouro||"NÃO INFORMADO"
p_numero.value=d.numero||"-"
p_uf.value=d.uf||""
p_cep.value=(d.cep||"").replace(/\D/g,"")
p_cnpj.value=cnpjBusca.value||""
if(postoInput)postoInput.value=d.nome||""
}

function trocarGrafico(tipo){
tipoGrafico=tipo||"consumo"
render()
}
function calcularIndicadores(lista){
if(!lista.length)return null
let totalGasto=0
let totalLitros=0
let consumos=[]
let totalKm=0
for(let i=0;i<lista.length;i++){
let atual=lista[i]
let anterior=lista[i+1]
totalGasto+=Number(atual.valor_total||0)
totalLitros+=Number(atual.litros||0)
if(anterior&&atual.quilometragem&&anterior.quilometragem){
let km=atual.quilometragem-anterior.quilometragem
if(km>0&&atual.litros>0){
let consumo=km/atual.litros
consumos.push(consumo)
totalKm+=km
}
}
}
let mediaConsumo=consumos.length?(consumos.reduce((a,b)=>a+b,0)/consumos.length):0
let melhor=Math.max(...consumos,0)
let pior=Math.min(...consumos,0)
let custoKm=totalKm>0?(totalGasto/totalKm):0
return{totalGasto,totalLitros,mediaConsumo,melhor,pior,custoKm,totalAbastecimentos:lista.length}
}
function renderKPIs(d){
let el=document.getElementById("kpis")
if(!el||!d)return
let total=Number(d.totalGasto||0)
let litros=Number(d.totalLitros||0)
let media=Number(d.mediaConsumo||0)
let custo=Number(d.custoKm||0)
let melhor=Number(d.melhor||0)
let pior=Number(d.pior||0)
let qtd=Number(d.totalAbastecimentos||0)
el.innerHTML=`
<div class="item">💰 Total<br><b>R$ ${total.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div class="item">⛽ Litros<br><b>${litros.toLocaleString("pt-BR",{minimumFractionDigits:1})}</b></div>
<div class="item">📈 Km/L<br><b>${media.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div class="item">🚗 Custo/KM<br><b>R$ ${custo.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div class="item">🏆 Melhor<br><b>${melhor.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div class="item">⚠️ Pior<br><b>${pior.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div class="item">📊 Registros<br><b>${qtd}</b></div>
`
}
  
function renderDashboard(lista){
if(!Array.isArray(lista)||!lista.length)return
let dados=[...lista]
if(filtroInicio)dados=dados.filter(x=>x.data_abastecimento>=filtroInicio)
if(filtroFim)dados=dados.filter(x=>x.data_abastecimento<=filtroFim)
if(!dados.length){
if(graficoConsumo)graficoConsumo.destroy()
if(graficoGasto)graficoGasto.destroy()
return
}
dados=dados.sort((a,b)=>new Date(a.data_abastecimento)-new Date(b.data_abastecimento))
let labels=dados.map(x=>fData(x.data_abastecimento))
let consumo=[null]
for(let i=1;i<dados.length;i++){
let atual=dados[i]
let anterior=dados[i-1]
if(atual.tanque!=="cheio"||anterior.tanque!=="cheio"){consumo.push(null);continue}
let kmAtual=Number(atual.quilometragem||0)
let kmAnterior=Number(anterior.quilometragem||0)
let litros=Number(atual.litros||0)
let kmRodado=kmAtual-kmAnterior
if(kmRodado>0&&litros>0){consumo.push(kmRodado/litros)}else{consumo.push(null)}
}
let valoresTotal=dados.map(x=>Number(x.valor_total||0))
let valoresLitros=dados.map(x=>Number(x.litros||0))
let tipo=tipoGrafico||"consumo"
let dataset=[]
let labelGrafico=""
if(tipo==="consumo"){dataset=consumo;labelGrafico="Km/L"}

function mediaMovel(arr,periodo){
let res=[]
for(let i=0;i<arr.length;i++){
let soma=0,cont=0
for(let j=i-periodo+1;j<=i;j++){
if(j>=0&&arr[j]!=null){
soma+=arr[j]
cont++
}
}
res.push(cont?soma/cont:null)
}
return res
}

function calcularAutonomia(lista){
if(!Array.isArray(lista)||lista.length<2)return null
let dados=[...lista].sort((a,b)=>new Date(b.data_abastecimento)-new Date(a.data_abastecimento))
let consumos=[]
for(let i=0;i<dados.length-1;i++){
let a=dados[i],b=dados[i+1]
if(a.tanque!=="cheio"||b.tanque!=="cheio")continue
let kmA=Number(a.quilometragem||0),kmB=Number(b.quilometragem||0),lit=Number(a.litros||0)
let rodado=kmA-kmB
if(rodado>0&&lit>0)consumos.push(rodado/lit)
}
if(!consumos.length)return null
let media=consumos.reduce((x,y)=>x+y,0)/consumos.length
let ultimoKm=Number(dados[0].quilometragem||0)
/* 🔧 ajuste aqui se quiser por veículo no futuro */
let capacidade=60
let autonomia=media*capacidade
return{media,autonomia,capacidade,ultimoKm}
}

function capturarImagem(){
let canvas=canvasOCR
let video=videoOCR
let ctx=canvas.getContext("2d")
/* 🔥 GARANTE TAMANHO REAL */
canvas.width=video.videoWidth||1280
canvas.height=video.videoHeight||720

ctx.drawImage(video,0,0,canvas.width,canvas.height)
/* 🔥 MELHORA CONTRASTE */
let imgData=ctx.getImageData(0,0,canvas.width,canvas.height)
let data=imgData.data
for(let i=0;i<data.length;i+=4){
let avg=(data[i]+data[i+1]+data[i+2])/3
let v=avg>140?255:0
data[i]=data[i+1]=data[i+2]=v
}
ctx.putImageData(imgData,0,0)

let img=canvas.toDataURL("image/jpeg",0.95)
previewOCR.src=img
previewOCR.style.display="block"

setTimeout(async()=>{
try{
if(typeof tentarQRImagem==="function"){
let qr=await tentarQRImagem(previewOCR.src)
if(qr){
alert("🔳 QR detectado automaticamente!")
await processarQR(qr)
fecharOCR()
}
}else{
console.warn("⚠️ Função tentarQRImagem não definida")
}
}catch(e){
console.error("Erro QR:",e)
}
},300)
}

function preprocessarImagem(src){
return new Promise(resolve=>{
let img=new Image()
img.onload=()=>{
let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

let imageData=ctx.getImageData(0,0,canvas.width,canvas.height)
let data=imageData.data

for(let i=0;i<data.length;i+=4){
let avg=(data[i]+data[i+1]+data[i+2])/3

// 🔥 ajuste profissional (não estoura)
let val=avg>140?255:0

data[i]=val
data[i+1]=val
data[i+2]=val
}

ctx.putImageData(imageData,0,0)

resolve(canvas.toDataURL())
}
img.src=src
})
}


async function tentarQRImagem(){

function processarCupomInteligente(text){
text=text.replace(/\r/g,"\n").toLowerCase()

/* 🔥 CNPJ */
let cnpj=(text.match(/\d{2}\.\d{3}\.\d{3}\/\d{4}\-\d{2}/)||[""])[0]

/* 🔥 NOME DO POSTO (MELHORADO) */
let nomePosto=""
let matchPosto=text.match(/(?:posto|auto\s?posto|rede)\s+([a-z0-9\s\-]+)/i)
if(matchPosto && matchPosto[1]){
nomePosto=matchPosto[1].trim()
}

/* 🔥 VALORES */
let total=(text.match(/total\s*[r\$]*\s*([\d\.,]+)/)||[])[1]
let litros=(text.match(/(\d+[\.,]\d+)\s*l/)||[])[1]
let valorLitro=(text.match(/(\d+[\.,]\d+)\s*(?:\/l|litro)/)||[])[1]

/* 🔥 KM */
let km=(text.match(/km[\s:]*([\d]{3,7})/)||[])[1]

/* 🔥 COMBUSTÍVEL (MAIS COMPLETO) */
let combustivelRaw=(text.match(/gasolina\s+aditivada|gasolina|etanol|álcool|diesel\s?s10|diesel|gnv/i)||[""])[0]

/* 🔥 NORMALIZA */
if(total)total=total.replace(",",".")
if(litros)litros=litros.replace(",",".")
if(valorLitro)valorLitro=valorLitro.replace(",",".")
if(!valorLitro && total && litros){
valorLitro=(parseFloat(total)/parseFloat(litros)).toFixed(3)
}

/* 🔥 NORMALIZA COMBUSTÍVEL */
let combustivel=normalizarCombustivel(combustivelRaw)

/* 🔥 PREENCHE MODAL CONFIRMAÇÃO */
c_valor.value=total||""
c_litros.value=litros||""
c_valorLitro.value=valorLitro||""
c_km.value=km||""
c_combustivel.value=combustivel||""
c_cnpj.value=cnpj||""
c_posto.value=nomePosto?nomePosto.toUpperCase():""

/* 🔥 BUSCA CNPJ (se existir) */
if(cnpj)buscarPostoPorCNPJ(cnpj)

/* 🔥 ABRE CONFIRMAÇÃO */
modalConfirmacao.style.display="flex"
}

function normalizarCombustivel(c){
c=c.toLowerCase()
if(c.includes("aditiv"))return "Gasolina Aditivada"
if(c.includes("gasolina"))return "Gasolina Comum"
if(c.includes("etanol")||c.includes("alcool"))return "Álcool"
if(c.includes("diesel"))return "Diesel"
if(c.includes("gnv"))return "GNV"
return "Gasolina Comum"
}

function analisarAbastecimentos(lista){
if(!lista||lista.length<2)return null
let dados=[...lista].sort((a,b)=>new Date(b.data_abastecimento)-new Date(a.data_abastecimento))
let alertas=[]
let sugestoes=[]
let consumos=[]
for(let i=0;i<dados.length-1;i++){
let atual=dados[i]
let anterior=dados[i+1]
let kmAtual=Number(atual.quilometragem||0)
let kmAnterior=Number(anterior.quilometragem||0)
let litros=Number(atual.litros||0)
let valor=Number(atual.valor_total||0)
let kmRodado=kmAtual-kmAnterior
if(atual.tanque==="cheio" && anterior.tanque==="cheio" && kmRodado>0 && litros>0){
let consumo=kmRodado/litros
consumos.push(consumo)
if(consumo<5)alertas.push("⚠️ Consumo muito baixo detectado")
if(consumo>20)alertas.push("⚠️ Consumo muito alto (possível erro)")
}
if(valor/litros>10)alertas.push("⚠️ Valor por litro muito alto")
if(kmRodado<0)alertas.push("🚨 KM inconsistente (Inconsistência. Reveja a edição dos dados)")
}
let media=consumos.reduce((a,b)=>a+b,0)/consumos.length||0
let ultimo=consumos[0]||0
if(ultimo<media*0.8)sugestoes.push("🔻 Consumo abaixo do normal, verificar veículo ou realizar manutenção")
if(ultimo>media*1.2)sugestoes.push("🔺 Consumo melhorou, manter padrão, tire o pé do acelerador e sinta no bolso")
return{alertas,sugestoes,media,ultimo}
}

function melhorPosto(lista){
let mapa={}
lista.forEach(x=>{
let nome=x.postos?.nome_posto||"Desconhecido"
let litros=Number(x.litros||0)
let valor=Number(x.valor_total||0)
if(!mapa[nome])mapa[nome]={litros:0,valor:0}
mapa[nome].litros+=litros
mapa[nome].valor+=valor
})
let melhor=null
let menor=999
Object.keys(mapa).forEach(p=>{
let media=mapa[p].valor/mapa[p].litros
if(media<menor){
menor=media
melhor=p
}
})
return{posto:melhor,preco:menor}
}

async function processarCupomCompleto(){

if(!previewOCR.src)return alert("Capture o cupom primeiro")

iaBox.innerHTML="✂️ Ajustando imagem automaticamente..."

try{

/* 🔥 2. TENTA QR PRIMEIRO (MAIS RÁPIDO) */

qr=await tentarQRImagem()

}

/* 🔥 3. OCR */

let img=await preprocessarImagem(recortada)

const worker=await Tesseract.createWorker("por")

const {data:{text}}=await worker.recognize(img)

await worker.terminate()

if(!text || text.length<10){
iaBox.innerHTML="❌ Não foi possível ler. Recorte melhor."
return
}

/* 🔥 4. IA */
let dados=extrairDadosIA(text)

preencherFormulario(dados)

iaBox.innerHTML="✅ Dados extraídos com sucesso"

}catch(e){
console.error(e)
iaBox.innerHTML="❌ Erro ao processar"
}
}

function extrairDadosIA(text){

text=text.replace(/\r/g,"\n").toLowerCase()

let dados={}

/* 🔥 CNPJ */
dados.cnpj=(text.match(/\d{2}\.\d{3}\.\d{3}\/\d{4}\-\d{2}/)||[""])[0]

/* 🔥 VALOR TOTAL */
dados.total=(text.match(/total\s*[r\$]*\s*([\d\.,]+)/)||[])[1]

/* 🔥 LITROS */
dados.litros=(text.match(/(\d+[\.,]\d+)\s*l/)||[])[1]

/* 🔥 VALOR/LITRO */
dados.valor_litro=(text.match(/(\d+[\.,]\d+)\s*(?:\/l|litro)/)||[])[1]

/* 🔥 KM */
dados.km=(text.match(/km[\s:]*([\d]{3,7})/)||[])[1]

/* 🔥 COMBUSTÍVEL INTELIGENTE */
if(text.includes("aditivada"))dados.combustivel="Gasolina Aditivada"
else if(text.includes("gasolina"))dados.combustivel="Gasolina Comum"
else if(text.includes("etanol")||text.includes("alcool"))dados.combustivel="Álcool"
else if(text.includes("diesel"))dados.combustivel="Diesel"
else if(text.includes("gnv"))dados.combustivel="GNV"
else dados.combustivel="Gasolina Comum"

/* 🔥 AUTO-CÁLCULO */
if(!dados.valor_litro && dados.total && dados.litros){
dados.valor_litro=(parseFloat(dados.total.replace(",", "."))/parseFloat(dados.litros.replace(",", "."))).toFixed(3)
}

return dados
}


async function processarQRCompleto(url){

try{

iaBox.innerHTML="🌐 Consultando SEFAZ..."

let res=await fetch(url)
let html=await res.text()

/* 🔥 EXTRAÇÃO SIMPLES DO HTML */
let total=(html.match(/R\$ ?([\d\.,]+)/)||[])[1]
let litros=(html.match(/([\d\.,]+)\s*l/)||[])[1]

let dados={
total:total,
litros:litros,
valor_litro: total&&litros ? (parseFloat(total.replace(",", "."))/parseFloat(litros.replace(",", "."))).toFixed(3):"",
combustivel:"Gasolina Comum"
}

preencherFormulario(dados)

iaBox.innerHTML="✅ Dados via QR carregados"

}catch(e){
console.error(e)
iaBox.innerHTML="⚠️ QR falhou, usando OCR..."
processarCupomCompleto()
}
}

function preencherFormulario(d){

if(d.total)valor.value=d.total.replace(",",".")
if(d.litros)litros.value=d.litros.replace(",",".")
if(d.valor_litro)valor_litro.value=d.valor_litro
if(d.km)km.value=d.km

if(d.combustivel){
v_combustivel.value=d.combustivel
}

/* 🔥 POSTO POR CNPJ */
if(d.cnpj){
buscarPostoPorCNPJ(d.cnpj)
}

}

async function autoRecorteCupom(src){
return new Promise(resolve=>{
let img=new Image()
img.onload=()=>{
let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")
canvas.width=img.width
canvas.height=img.height
ctx.drawImage(img,0,0)

/* 🔥 PRETO/BRANCO SUAVE */
let imageData=ctx.getImageData(0,0,canvas.width,canvas.height)
let data=imageData.data

for(let i=0;i<data.length;i+=4){
let avg=(data[i]+data[i+1]+data[i+2])/3
let val=avg>160?255:0
data[i]=val
data[i+1]=val
data[i+2]=val
}
ctx.putImageData(imageData,0,0)

/* 🔥 DETECTAR ÁREA DO CUPOM */
let top=canvas.height
let bottom=0
let left=canvas.width
let right=0

for(let y=0;y<canvas.height;y++){
for(let x=0;x<canvas.width;x++){
let i=(y*canvas.width+x)*4
if(data[i]<200){ // pixel escuro
if(y<top)top=y
if(y>bottom)bottom=y
if(x<left)left=x
if(x>right)right=x
}
}
}

/* 🔥 MARGEM */
let margem=20
top=Math.max(0,top-margem)
left=Math.max(0,left-margem)
bottom=Math.min(canvas.height,bottom+margem)
right=Math.min(canvas.width,right+margem)

let w=right-left
let h=bottom-top

if(w<50 || h<50){
console.warn("⚠️ Recorte inválido, usando imagem original")
resolve(src)
return
}
/* 🔥 CORTAR */
let recorte=document.createElement("canvas")
recorte.width=w
recorte.height=h

recorte.getContext("2d").drawImage(
canvas,
left,top,w,h,
0,0,w,h
)

resolve(recorte.toDataURL())
}
img.src=src
})
}

async function executarAutoRecorte(){
if(!previewOCR.src)return
let r=await autoRecorteCupom(previewOCR.src)
previewOCR.src=r
