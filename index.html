/* ====================================================020 CAMERA CONTROL==================================================== */
let stream=null
async function abrirCamera(){
if(stream)return
stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
video.srcObject=stream
video.style.display="block"
}
function fecharCamera(){
if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
video.style.display="none"
}
/* ====================================================030 OCR==================================================== */
async function capturar(){
if(!stream)await abrirCamera()
const ctx=canvas.getContext("2d")
canvas.width=video.videoWidth
canvas.height=video.videoHeight
ctx.drawImage(video,0,0)
ocr.innerText="Lendo..."
const {data:{text}}=await Tesseract.recognize(canvas,"por")
const dados=interpretar(text)
ocr.innerHTML=`Valor: ${dados.valor||"-"} | CNPJ: ${dados.cnpj||"-"}`
if(dados.valor)valor.value=dados.valor
fecharCamera()
}
/* ====================================================031 INTERPRETAR==================================================== */
function interpretar(txt){
txt=txt.toUpperCase()
let valor=null,cnpj=null
let v=txt.match(/\d{1,3}(\.\d{3})*,\d{2}/g)
if(v){valor=Math.max(...v.map(x=>parseFloat(x.replace(/\./g,"").replace(",","."))))}
let c=txt.match(/\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}/)
if(c)cnpj=c[0]
return{valor,cnpj}
}
/* ====================================================040 SALVAR==================================================== */
async function salvar(){

await db.from("abastecimentos").update({

valor_total:parseFloat(valor.value),
quilometragem:parseFloat(km.value)
}).eq("id",window.EDIT_ID)
window.EDIT_ID=null
}else{
await db.from("abastecimentos").insert({
veiculo_id:VID,
litros:parseFloat(litros.value),

})
}
await db.from("veiculos").update({km_atual:parseFloat(km.value)}).eq("id",VID)
litros.value=""
valor.value=""
km.value=""
render()
}

/* ====================================================060 – GRAFICO==================================================== */
function renderGrafico(labels,data){
const el=document.getElementById("grafico")
if(!el)return
const ctx=el.getContext("2d")
if(chart){chart.destroy()}
chart=new Chart(ctx,{
type:"line",
data:{

datasets:[{

}]
},

easing:"easeOutQuart"
},

})
}
/* ====================================================045 – GPS==================================================== */
function iniciarGPS(){
if(!navigator.geolocation){
gps.innerText="GPS não suportado"
return
}
gps.innerText="Localizando..."
navigator.geolocation.watchPosition(pos=>{
const lat=pos.coords.latitude.toFixed(6)
const lon=pos.coords.longitude.toFixed(6)
gps.innerHTML=`📍 ${lat}, ${lon}`
},err=>{
gps.innerText="Erro GPS"
})
}
/* ====================================================070 CSV IMPORT==================================================== */
async function importarCSV(file){
const text=await file.text()
const linhas=text.split("\n").slice(1)
for(const l of linhas){
if(!l.trim())continue
const c=l.split(",")
await db.from("abastecimentos").insert({
veiculo_id:VID,
litros:parseFloat(c[1]),
valor_total:parseFloat(c[2]),
quilometragem:parseFloat(c[3]),
data_abastecimento:c[0]
})
}
render()
}

})
/* ====================================================100 – RENDER DASHBOARD PROFISSIONAL==================================================== */
async function render(){
let {data}=await db.from("abastecimentos").select("*").eq("veiculo_id",VID).order("data_abastecimento",{ascending:true})
if(!data)data=[]
const filtro=document.getElementById("filtroPeriodo")?.value
const di=document.getElementById("dataInicio")?.value
const df=document.getElementById("dataFim")?.value

if(!filtro || filtro==="all"){
// 🔥 NÃO FILTRA → mostra tudo (2025 + 2026)
}
else if(filtro==="mes"){
const hoje=new Date()
const mesAtual=hoje.toISOString().slice(0,7)
data=data.filter(a=>a.data_abastecimento?.startsWith(mesAtual))
}
else if(filtro==="periodo" && di && df){
data=data.filter(a=>{
const d=a.data_abastecimento?.slice(0,10)
return d>=di && d<=df
})
}
if(lista){
lista.innerHTML=data.map(a=>`
<div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:10px">
<div id="view_${a.id}" style="flex:1;font-size:14px">
📅 ${formatarData(a.data_abastecimento)} - ⛽ ${a.litros||0}L - 💰 R$ ${Number(a.valor_total||0).toFixed(2)} - 📍 ${a.quilometragem||0} km
</div>
<div id="edit_${a.id}" style="display:none;flex:1;gap:5px">
<input id="lit_${a.id}" value="${a.litros||0}" style="width:60px">
<input id="val_${a.id}" value="${a.valor_total||0}" style="width:80px">
<input id="km_${a.id}" value="${a.quilometragem||0}" style="width:80px">
</div>
<div style="display:flex;gap:5px">
<button onclick="editarInline('${a.id}')">✏️</button>
<button onclick="salvarInline('${a.id}')" id="btnSave_${a.id}" style="display:none">💾</button>
<button onclick="cancelarInline('${a.id}')" id="btnCancel_${a.id}" style="display:none">❌</button>
<button onclick="excluir('${a.id}')">🗑️</button>
</div>
</div>
`).join("")
}
if(data.length<2){
kpi.innerHTML=""
alerta.innerHTML=""
return
}
let consumo=[],labels=[],totalCons=0,count=0,totalValor=0,totalKm=0
let melhor=0,pior=999
for(let i=1;i<data.length;i++){
let kmDiff=(data[i].quilometragem||0)-(data[i-1].quilometragem||0)
let litros=data[i].litros||0
if(litros<=0||kmDiff<=0)continue
let cons=kmDiff/litros
consumo.push(cons)
labels.push(i)
totalCons+=cons
count++
if(cons>melhor)melhor=cons
if(cons<pior)pior=cons
totalValor+=(data[i].valor_total||0)
totalKm+=kmDiff
}
if(count===0){kpi.innerHTML="";return}
let media=(totalCons/count).toFixed(2)
let custoKm=(totalKm>0?(totalValor/totalKm):0).toFixed(2)
kpi.innerHTML=`
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<div class="card"><b>Média</b><br>${media} km/l</div>
<div class="card"><b>Custo/KM</b><br>R$ ${custoKm}</div>
<div class="card"><b>Melhor</b><br>${melhor.toFixed(2)}</div>
<div class="card"><b>Pior</b><br>${pior.toFixed(2)}</div>
</div>
`
if(media<6){alerta.innerHTML='⚠ Consumo elevado'}else if(media>9){alerta.innerHTML='🚀 Excelente consumo'}else{alerta.innerHTML=''}
renderGrafico(labels,consumo)
let meses={}
data.forEach((a,i)=>{
let mes=a.data_abastecimento?.slice(0,7)
if(!mes)return
if(!meses[mes])meses[mes]={km:0,litros:0}
if(i>0){
let kmDiff=(a.quilometragem||0)-(data[i-1].quilometragem||0)
let litros=a.litros||0
if(kmDiff>0&&litros>0){
meses[mes].km+=kmDiff
meses[mes].litros+=litros
}
}
})
let labelsMes=[],consumoMes=[]
Object.keys(meses).sort((a,b)=>new Date(a)-new Date(b)).forEach(m=>{
if(meses[m].litros>0){
labelsMes.push(formatarMes(m))
consumoMes.push(meses[m].km/meses[m].litros)
}
})
renderGraficoMensal(labelsMes,consumoMes)
detalheBox.innerHTML=`
<div class="card">
<b>Total gasto:</b> R$ ${totalValor.toFixed(2)}<br>
<b>Total KM:</b> ${totalKm}<br>
<b>Consumo médio:</b> ${media} km/l
</div>
`
}

/* =============FORMATAR DATA================================================== */
function formatarData(d){
const dt=new Date(d)
return dt.toLocaleDateString("pt-BR")
}
/* =============FORMATAR MÊS================================================== */
function formatarMes(m){
const d=new Date(m+"-01")
return d.toLocaleDateString("pt-BR",{month:"2-digit",year:"numeric"})
}

/* ======103 PDF PROFISSIONAL==================================================== */
async function exportarPDF(){
const {jsPDF}=window.jspdf
const doc=new jsPDF()
/* ================= DADOS ================= */
const uid=localStorage.getItem("uid")

let {data:veiculo}=await db.from("veiculos").select("*").eq("id",VID).single()
let {data:usuario}=await db.from("usuarios").select("*").eq("id",uid).single()

if(filtro==="mes"){
const hoje=new Date()
const mesAtual=hoje.toISOString().slice(0,7)
abast=abast.filter(a=>a.data_abastecimento.startsWith(mesAtual))
}
/* ================= CABEÇALHO ================= */

doc.setFontSize(10)
doc.text(`Motorista: ${usuario?.nome||"-"}`,10,18)
doc.text(`Veículo: ${veiculo?.modelo||"-"} (${veiculo?.placa||"-"})`,10,24)
doc.text(`Combustível: ${veiculo?.combustivel||"-"}`,10,30)
doc.text(`Período: ${filtro==="mes"?"Mês atual":"Completo"}`,10,36)
/* ================= LINHA ================= */
let y=45
doc.setFontSize(9)
doc.text("Data",10,y)
doc.text("Litros",45,y)
doc.text("Valor",75,y)
doc.text("KM",110,y)
y+=5
/* ================= DADOS ================= */
let totalLitros=0,totalValor=0

abast.forEach(a=>{
if(y>280){
doc.addPage()
y=10
}
const data=formatarData(a.data_abastecimento)
const litros=Number(a.litros).toFixed(2)
const valor=Number(a.valor_total).toFixed(2)
const km=a.quilometragem

doc.text(data,10,y)
doc.text(litros,45,y)
doc.text("R$ "+valor,75,y)
doc.text(String(km),110,y)
y+=6

totalLitros+=Number(a.litros)
totalValor+=Number(a.valor_total)
})
/* ================= TOTAIS ================= */
y+=5
doc.setFontSize(11)
doc.text("Resumo:",10,y)
y+=6
doc.setFontSize(10)
doc.text(`Total Litros: ${totalLitros.toFixed(2)} L`,10,y)
y+=6
doc.text(`Total Gasto: R$ ${totalValor.toFixed(2)}`,10,y)
/* ================= DOCUMENTAÇÃO (FUTURO) ================= */
y+=10
doc.setFontSize(11)
doc.text("Documentação:",10,y)
y+=6
doc.setFontSize(9)
doc.text("IPVA: -",10,y)
y+=5
doc.text("Seguro: -",10,y)
y+=5
doc.text("CNH: -",10,y)
/* ================= SALVAR ================= */
doc.save("relatorio_consumo.pdf")
}

toggle.innerText="−"
const titleClone=title.cloneNode(true)
header.appendChild(titleClone)
header.appendChild(toggle)
const content=document.createElement("div")
content.className="collapsible-content"
Array.from(card.children).forEach(el=>{
if(el.tagName==="H3")return
content.appendChild(el)
})
card.innerHTML=""
card.appendChild(header)
card.appendChild(content)
if(index!=activeIndex){
card.classList.add("collapsed")
toggle.innerText="+"
}
header.onclick=()=>{
cards.forEach(c=>{
c.classList.add("collapsed")
const t=c.querySelector(".toggle")
if(t)t.innerText="+"
})
card.classList.remove("collapsed")
toggle.innerText="−"
localStorage.setItem("accordion",index)
}
})
})

  
</script>
</div>
