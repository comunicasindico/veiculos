function hojeISO(){
const d=new Date()
const local=new Date(d.getTime()-d.getTimezoneOffset()*60000)
return local.toISOString().slice(0,10)
}
function toISODateLocal(d){
if(!d)return""
if(typeof d==="string")return d.slice(0,10)
const local=new Date(d.getTime()-d.getTimezoneOffset()*60000)
return local.toISOString().slice(0,10)
}
function fromISOToBR(iso){
if(!iso)return"-"
const s=iso.slice(0,10)
const[y,m,dd]=s.split("-")
return`${dd}/${m}/${y}`
}

/* ====================================================031 INTERPRETAR==================================================== */
function interpretarNota(txt){
txt=txt.toUpperCase()
/* REMOVE RUÍDO */
txt=txt.replace(/\s+/g," ")
/* ================= VALOR ================= */
let valores=[...txt.matchAll(/\d{1,3}(\.\d{3})*,\d{2}/g)]
let valor=null
if(valores.length){
valor=Math.max(...valores.map(v=>parseFloat(v[0].replace(/\./g,"").replace(",", "."))))
}
/* ================= CNPJ ================= */
let cnpjMatch=txt.match(/\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}/)
let cnpj=cnpjMatch?cnpjMatch[0]:null
/* ================= COMBUSTÍVEL ================= */
let tipo=""
if(txt.includes("GASOLINA"))tipo="Gasolina"
if(txt.includes("ETANOL"))tipo="Etanol"
if(txt.includes("DIESEL"))tipo="Diesel"
/* ================= FALLBACK VALOR ================= */
if(!valor){
let simples=txt.match(/TOTAL.*?(\d+,\d{2})/)
if(simples){
valor=parseFloat(simples[1].replace(",","."))
}
}
return{
valor:valor?valor.toFixed(2):null,
cnpj,
tipo
}
}

if(!a.data_abastecimento)return false
const d=a.data_abastecimento.substring(0,10)
return d>=di&&d<=df
}).sort((a,b)=>a.data_abastecimento.localeCompare(b.data_abastecimento))
/* HISTÓRICO COMPACTO */
/* ====================================================030 – HISTÓRICO PROFISSIONAL==================================================== */
let grupos={}
data.forEach((a,i)=>{
let chave=(a.data_abastecimento||"").slice(0,7)
if(!chave)return
if(!grupos[chave])grupos[chave]=[]
grupos[chave].push(a)
})
let html=""

let arr=grupos[m]
let totalMes=0,totalKmMes=0,totalLitros=0

totalMes+=(a.valor_total||0)
})

totalLitros+=litros

function renderGraficoMensal(labels,data){
const el=document.getElementById("graficoMensal")
if(!el)return
const ctx=el.getContext("2d")
if(chartMensal){chartMensal.destroy()}
const media=data.reduce((a,b)=>a+b,0)/data.length||0
const cores=data.map(v=>{if(v>=10)return "rgba(34,197,94,0.9)";if(v>=7)return "rgba(59,130,246,0.9)";return "rgba(239,68,68,0.9)"})
const gradient=ctx.createLinearGradient(0,0,0,300)
gradient.addColorStop(0,"rgba(34,197,94,0.9)")
gradient.addColorStop(1,"rgba(34,197,94,0.2)")
chartMensal=new Chart(ctx,{
type:"bar",
data:{
labels:labels,
datasets:[
{type:"bar",label:"Consumo",data:data,backgroundColor:gradient,borderRadius:12,barThickness:28},
{type:"line",label:"Média",data:Array(labels.length).fill(media),borderColor:"#22c55e",borderWidth:2,pointRadius:0,tension:0.4}
]
},
options:{
responsive:true,
maintainAspectRatio:false,
animation:{duration:1200,easing:"easeOutQuart"},
plugins:{
legend:{display:false},
tooltip:{
backgroundColor:"#020617",
titleColor:"#22c55e",
bodyColor:"#fff",
borderColor:"#22c55e",
borderWidth:1,
callbacks:{label:function(ctx){return " "+Number(ctx.raw).toFixed(2)+" km/l"}}
}
},
scales:{
x:{ticks:{color:"#9ca3af",font:{size:12}},grid:{display:false}},
y:{beginAtZero:true,ticks:{color:"#9ca3af",callback:(v)=>v+" km/l"},grid:{color:"rgba(255,255,255,0.05)"}}
}
}
})
}

/* ======103 PDF PROFISSIONAL==================================================== */
async function exportarPDF(){
const {jsPDF}=window.jspdf
const doc=new jsPDF()
/* ================= DADOS ================= */
const uid=localStorage.getItem("uid")

let {data:veiculo}=await db.from("veiculos").select("*").eq("id",VID).single()
let {data:usuario}=await db.from("usuarios").select("*").eq("id",uid).single()
let {data:abast}=await db.from("abastecimentos").select("*").eq("veiculo_id",VID).order("data_abastecimento",{ascending:true})
/* ================= FILTRO ================= */
const filtro=document.getElementById("filtroPeriodo")?.value
if(filtro==="mes"){
const hoje=new Date()
const mesAtual=hoje.toISOString().slice(0,7)
abast=abast.filter(a=>a.data_abastecimento.startsWith(mesAtual))
}
/* ================= CABEÇALHO ================= */
doc.setFontSize(14)
doc.text("RELATÓRIO DE CONSUMO",10,10)

doc.setFontSize(10)
doc.text(`Motorista: ${usuario?.nome||"-"}`,10,18)
doc.text(`Veículo: ${veiculo?.modelo||"-"} (${veiculo?.placa||"-"})`,10,24)
doc.text(`Combustível: ${veiculo?.combustivel||"-"}`,10,30)
doc.text(`Período: ${filtro==="mes"?"Mês atual":"Completo"}`,10,36)
/* ================= LINHA ================= */
let y=45
doc.setFontSize(9)
doc.text("Data",10,y)
doc.text("Litros",45,y)
doc.text("Valor",75,y)
doc.text("KM",110,y)
y+=5
/* ================= DADOS ================= */
let totalLitros=0,totalValor=0

abast.forEach(a=>{
if(y>280){
doc.addPage()
y=10
}
const data=formatarData(a.data_abastecimento)
const litros=Number(a.litros).toFixed(2)
const valor=Number(a.valor_total).toFixed(2)
const km=a.quilometragem

doc.text(data,10,y)
doc.text(litros,45,y)
doc.text("R$ "+valor,75,y)
doc.text(String(km),110,y)
y+=6

totalLitros+=Number(a.litros)
totalValor+=Number(a.valor_total)
})
/* ================= TOTAIS ================= */
y+=5
doc.setFontSize(11)
doc.text("Resumo:",10,y)
y+=6
doc.setFontSize(10)
doc.text(`Total Litros: ${totalLitros.toFixed(2)} L`,10,y)
y+=6
doc.text(`Total Gasto: R$ ${totalValor.toFixed(2)}`,10,y)
/* ================= DOCUMENTAÇÃO (FUTURO) ================= */
y+=10
doc.setFontSize(11)
doc.text("Documentação:",10,y)
y+=6
doc.setFontSize(9)
doc.text("IPVA: -",10,y)
y+=5
doc.text("Seguro: -",10,y)
y+=5
doc.text("CNH: -",10,y)
/* ================= SALVAR ================= */
doc.save("relatorio_consumo.pdf")
}

function melhorarImagem(canvas){
const ctx=canvas.getContext("2d")
const imgData=ctx.getImageData(0,0,canvas.width,canvas.height)
const d=imgData.data
for(let i=0;i<d.length;i+=4){
let r=d[i],g=d[i+1],b=d[i+2]
let cinza=0.3*r+0.59*g+0.11*b
cinza=cinza>140?255:0
d[i]=d[i+1]=d[i+2]=cinza
}
ctx.putImageData(imgData,0,0)
}
/* ===============FUNCTION ocr============= */
function extrairDadosNota(txt){
txt=txt.toUpperCase().replace(/\s+/g," ")
let valores=[...txt.matchAll(/\d{1,3}(\.\d{3})*,\d{2}/g)]
let listaValores=valores.map(v=>parseFloat(v[0].replace(/\./g,"").replace(",", ".")))
let valor=null
if(listaValores.length){
valor=listaValores.sort((a,b)=>b-a)[0]
if(valor<5&&listaValores.length>1){
valor=listaValores.sort((a,b)=>b-a)[1]
}
}
let cnpjMatch=txt.match(/\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}/)
let cnpj=cnpjMatch?cnpjMatch[0]:null
let tipo=null
if(txt.includes("GASOLINA"))tipo="Gasolina"
if(txt.includes("ETANOL"))tipo="Etanol"
if(txt.includes("DIESEL"))tipo="Diesel"
let posto=null
if(txt.includes("SHELL"))posto="Shell"
if(txt.includes("IPIRANGA"))posto="Ipiranga"
if(txt.includes("PETROBRAS"))posto="Petrobras"
if(txt.includes("BR "))posto="BR"
if(!valor){
let match=txt.match(/TOTAL.*?(\d+,\d{2})/)
if(match){
valor=parseFloat(match[1].replace(",","."))
}
}
return{valor:valor?valor.toFixed(2):null,cnpj,tipo,posto}
}
