<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Veículos</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow-x: hidden; }
        .gold { color: #facc15; }
        .border-gold { border: 2px solid #facc15; border-radius: 12px; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('img/bcveiculos.png') center/cover no-repeat; display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: none; }
        .login-box { background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(10px); padding: 40px; width: 90%; max-width: 400px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.1); border: 1px solid #facc15; border-radius: 8px; color: white; }
        .login-box button { width: 100%; padding: 12px; margin: 10px 0; background: #facc15; color: #020617; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #app { display: none; height: 100vh; position: relative; }
        #header { position: fixed; top: 0; left: 0; right: 0; height: 50px; background: #020617; border-bottom: 2px solid #facc15; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
        #page-title { font-size: 1.2em; font-weight: bold; }
        #logout-btn { background: #facc15; color: #020617; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
        #screens { display: flex; height: 100vh; transition: transform 0.3s ease; width: 400%; }
        .screen { width: 25%; padding: 60px 20px 80px; overflow-y: auto; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 20px; margin: 20px 0; }
        .kpi-card { background: rgba(255,255,255,0.05); padding: 20px; text-align: center; border-radius: 12px; border: 1px solid rgba(250,204,21,0.3); }
        .kpi-card h3 { font-size: 2em; color: #facc15; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        canvas { background: #020617; border-radius: 12px; border: 1px solid rgba(250,204,21,0.3); }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin: 20px 0; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border-left: 4px solid #facc15; }
        .card h3 { color: #facc15; margin-bottom: 10px; }
        .card button { background: #facc15; color: #020617; border: none; padding: 8px 16px; margin: 5px 5px 0 0; border-radius: 6px; cursor: pointer; }
        .card button.del { background: #ef4444; color: white; }
        #bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: #020617; border-top: 2px solid #facc15; display: flex; z-index: 100; }
        .nav-btn { flex: 1; background: none; border: none; color: white; padding: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.8em; }
        .nav-btn.active { background: #facc15; color: #020617; border-radius: 12px 12px 0 0; margin: 0 5px; }
        .nav-icon { font-size: 1.5em; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 200; }
        .modal-content { background: #020617; padding: 30px; width: 90%; max-width: 500px; border-radius: 16px; border: 2px solid #facc15; max-height: 80vh; overflow-y: auto; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.1); border: 1px solid #facc15; border-radius: 8px; color: white; }
        .modal-content button { width: 48%; padding: 12px; margin: 10px 1%; background: #facc15; color: #020617; border: none; border-radius: 8px; cursor: pointer; }
        #qr-modal .modal-content { text-align: center; }
        #qr-scanner { width: 300px; height: 300px; margin: 20px auto; }
        .btn-ocr-qr { background: #facc15; color: #020617; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; margin: 10px; font-weight: bold; }
        .btn-ocr-qr:hover { opacity: 0.9; }
        #abast-list { margin-top: 20px; }
        @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box border-gold">
            <h2><i class="fas fa-car"></i> Gestão de Veículos</h2>
            <input id="login-email" type="email" placeholder="Email" />
            <input id="login-pass" type="password" placeholder="Senha" />
            <button onclick="handleLogin()">Entrar</button>
            <button onclick="handleSignup()">Cadastrar</button>
        </div>
    </div>
    <div id="app">
        <div id="header">
            <span id="page-title">Dashboard</span>
            <button id="logout-btn" onclick="handleLogout()" title="Sair"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        <div id="screens">
            <div id="dashboard" class="screen">
                <h1 class="gold"><i class="fas fa-tachometer-alt"></i> Dashboard</h1>
                <div class="kpi-grid">
                    <div class="kpi-card border-gold">
                        <h3 id="kpi-km">0</h3>
                        <p>Total KM</p>
                    </div>
                    <div class="kpi-card border-gold">
                        <h3 id="kpi-kml">0</h3>
                        <p>KM/L Médio</p>
                    </div>
                    <div class="kpi-card border-gold">
                        <h3 id="kpi-litros">0</h3>
                        <p>Total Litros</p>
                    </div>
                </div>
                <div class="charts-grid">
                    <canvas id="chart1" width="400" height="200"></canvas>
                    <canvas id="chart2" width="400" height="200"></canvas>
                </div>
                <button class="btn-ocr-qr border-gold" onclick="showAbastModal()">Novo Abastecimento</button>
            </div>
            <div id="motoristas" class="screen">
                <h1 class="gold"><i class="fas fa-users"></i> Motoristas</h1>
                <button class="btn-ocr-qr border-gold" onclick="showMotoristaModal()">Novo Motorista</button>
                <div id="motoristas-list" class="card-grid"></div>
            </div>
            <div id="veiculos" class="screen">
                <h1 class="gold"><i class="fas fa-car"></i> Veículos</h1>
                <button class="btn-ocr-qr border-gold" onclick="showVeiculoModal()">Novo Veículo</button>
                <div id="veiculos-list" class="card-grid"></div>
            </div>
            <div id="postos" class="screen">
                <h1 class="gold"><i class="fas fa-gas-pump"></i> Postos</h1>
                <button class="btn-ocr-qr border-gold" onclick="showPostoModal()">Novo Posto</button>
                <div id="postos-list" class="card-grid"></div>
            </div>
        </div>
        <div id="bottom-nav">
            <button class="nav-btn active" onclick="showScreen(0)"><i class="nav-icon fas fa-tachometer-alt"></i>Dashboard</button>
            <button class="nav-btn" onclick="showScreen(1)"><i class="nav-icon fas fa-users"></i>Motoristas</button>
            <button class="nav-btn" onclick="showScreen(2)"><i class="nav-icon fas fa-car"></i>Veículos</button>
            <button class="nav-btn" onclick="showScreen(3)"><i class="nav-icon fas fa-gas-pump"></i>Postos</button>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-motorista" class="modal">
        <div class="modal-content">
            <h2 id="modal-motorista-title">Novo Motorista</h2>
            <form onsubmit="saveMotorista(event)">
                <input id="m-nome" placeholder="Nome" required />
                <input id="m-cpf" placeholder="CPF" required />
                <input id="m-cnh" placeholder="CNH" required />
                <button type="submit">Salvar</button>
                <button type="button" onclick="hideModal('modal-motorista')">Cancelar</button>
            </form>
        </div>
    </div>
    <div id="modal-veiculo" class="modal">
        <div class="modal-content">
            <h2 id="modal-veiculo-title">Novo Veículo</h2>
            <form onsubmit="saveVeiculo(event)">
                <input id="v-placa" placeholder="Placa" required />
                <input id="v-renavam" placeholder="Renavam" required />
                <input id="v-ipva" type="date" placeholder="IPVA" />
                <input id="v-licenciamento" type="date" placeholder="Licenciamento" />
                <button type="submit">Salvar</button>
                <button type="button" onclick="hideModal('modal-veiculo')">Cancelar</button>
            </form>
        </div>
    </div>
    <div id="modal-posto" class="modal">
        <div class="modal-content">
            <h2 id="modal-posto-title">Novo Posto</h2>
            <form onsubmit="savePosto(event)">
                <input id="p-nome" placeholder="Nome" required />
                <input id="p-cnpj" placeholder="CNPJ" required />
                <button type="submit">Salvar</button>
                <button type="button" onclick="hideModal('modal-posto')">Cancelar</button>
            </form>
        </div>
    </div>
    <div id="modal-abast" class="modal">
        <div class="modal-content">
            <h2>Novo Abastecimento</h2>
            <form onsubmit="saveAbast(event)">
                <select id="ab-motorista" required><option>Selecione Motorista</option></select>
                <select id="ab-veiculo" required><option>Selecione Veículo</option></select>
                <select id="ab-posto" required><option>Selecione Posto</option></select>
                <input id="ab-km-inicial" type="number" placeholder="KM Inicial" required />
                <input id="ab-km-final" type="number" placeholder="KM Final" required />
                <input id="ab-litros" type="number" step="0.01" placeholder="Litros" required />
                <input id="ab-data" type="date" required />
                <button type="button" class="btn-ocr-qr" onclick="startQRScanner()">Scanner QR Code</button>
                <button type="button" class="btn-ocr-qr" onclick="startOCR()">OCR Cupom</button>
                <button type="submit">Salvar</button>
                <button type="button" onclick="hideModal('modal-abast')">Cancelar</button>
            </form>
        </div>
    </div>
    <div id="qr-modal" class="modal">
        <div class="modal-content">
            <h2>Scanner QR Code</h2>
            <div id="qr-scanner"></div>
            <button onclick="stopQRScanner()">Cancelar</button>
        </div>
    </div>

    <script>
        // Globals
        let currentScreen = 0;
        const screenNames = ['dashboard', 'motoristas', 'veiculos', 'postos'];
        const screenTitles = ['Dashboard', 'Motoristas', 'Veículos', 'Postos'];
        let motoristas = [], veiculos = [], postos = [], abastecimentos = [];
        let charts = [];
        let session = null;
        let currentEdit = {};
        let html5QrScanner = null;

        // Supabase
        const SUPABASE_URL = 'https://gspdlrenyrzbkxlvyugc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzcGRscmVueXJ6Ymt4bHZ5dWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODU0NzAsImV4cCI6MjA5MDQ2MTQ3MH0.UWfkWvOh4qMDEcByVL-KZ6ejJ80V7wJlDOFH76TywaI'; // REPLACE WITH YOUR KEY
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Init
        async function init() {
            await initAuth();
            setupSwipe();
        }

        async function initAuth() {
            const { data: { session: s } } = await db.auth.getSession();
            session = s;
            if (session) {
                showApp();
            } else {
                showLogin();
            }
            db.auth.onAuthStateChange((event, s) => {
                session = s;
                if (s) {
                    showApp();
                } else {
                    showLogin();
                }
            });
        }

        function showLogin() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'none';
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('logout-btn').style.display = 'block';
            loadAllData();
            showScreen(0);
        }

        async function loadAllData() {
            const [ms, vs, ps, abs] = await Promise.all([
                db.from('motoristas').select('*'),
                db.from('veiculos').select('*'),
                db.from('postos').select('*'),
                db.from('abastecimentos').select('*')
            ]);
            motoristas = ms.data || [];
            veiculos = vs.data || [];
            postos = ps.data || [];
            abastecimentos = abs.data || [];
        }

        // Auth handlers
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;
            const { error } = await db.auth.signInWithPassword({ email, password });
            if (error) alert('Erro: ' + error.message);
        }

        async function handleSignup() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;
            const { error } = await db.auth.signUp({ email, password });
            if (error) alert('Erro: ' + error.message);
            else alert('Confirme seu email!');
        }

        async function handleLogout() {
            await db.auth.signOut();
        }

        // Navigation
        function showScreen(index) {
            currentScreen = Math.max(0, Math.min(3, index));
            document.getElementById('screens').style.transform = `translateX(-${currentScreen * 25}%)`;
            updateNav();
            document.getElementById('page-title').textContent = screenTitles[currentScreen];
            loadScreenData();
        }

        function updateNav() {
            document.querySelectorAll('.nav-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === currentScreen);
            });
        }

        function loadScreenData() {
            switch (currentScreen) {
                case 0: loadDashboard(); break;
                case 1: loadMotoristas(); break;
                case 2: loadVeiculos(); break;
                case 3: loadPostos(); break;
            }
        }

        // Swipe
        function setupSwipe() {
            const screensEl = document.getElementById('screens');
            let startX = 0;
            let currentX = 0;

            screensEl.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
            }, { passive: false });

            screensEl.addEventListener('touchmove', (e) => {
                e.preventDefault();
                currentX = e.touches[0].clientX;
                const delta = currentX - startX;
                screensEl.style.transition = 'none';
                screensEl.style.transform = `translateX(calc(-${currentScreen * 25}% + ${delta}px))`;
            }, { passive: false });

            screensEl.addEventListener('touchend', () => {
                const delta = currentX - startX;
                screensEl.style.transition = 'transform 0.3s ease';
                if (delta > 50 && currentScreen < 3) {
                    showScreen(currentScreen + 1);
                } else if (delta < -50 && currentScreen > 0) {
                    showScreen(currentScreen - 1);
                } else {
                    showScreen(currentScreen);
                }
            });
        }

        // Dashboard
        async function loadDashboard() {
            const { data: abs } = await db.from('abastecimentos').select('*').order('data', { ascending: false });
            abastecimentos = abs || [];

            let totalKm = 0, totalLitros = 0;
            abs.forEach(a => {
                totalKm += (a.km_final - a.km_inicial);
                totalLitros += a.litros;
            });
            const avgKml = totalLitros ? (totalKm / totalLitros).toFixed(2) : 0;

            document.getElementById('kpi-km').textContent = totalKm.toLocaleString();
            document.getElementById('kpi-kml').textContent = avgKml;
            document.getElementById('kpi-litros').textContent = totalLitros.toFixed(0);

            destroyCharts();
            renderCharts(abs);
        }

        function destroyCharts() {
            charts.forEach(chart => chart.destroy());
            charts = [];
        }

        function renderCharts(abs) {
            // Line chart: KM por data
            abs.sort((a, b) => new Date(a.data) - new Date(b.data));
            const labels1 = abs.slice(0, 20).map(a => new Date(a.data).toLocaleDateString('pt-BR'));
            const data1 = abs.slice(0, 20).map(a => a.km_final - a.km_inicial);
            const ctx1 = document.getElementById('chart1').getContext('2d');
            charts.push(new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: labels1,
                    datasets: [{ label: 'KM Percorridos', data: data1, borderColor: '#facc15', backgroundColor: 'rgba(250,204,21,0.2)', tension: 0.4 }]
                },
                options: {
                    responsive: true,
                    scales: { x: { ticks: { color: 'white' } }, y: { beginAtZero: true, ticks: { color: 'white' } } },
                    plugins: { legend: { labels: { color: 'white' } } },
                    elements: { point: { radius: 4 } }
                }
            }));

            // Pie chart: Litros por posto
            const postoLitros = {};
            abs.forEach(a => {
                postoLitros[a.posto_id] = (postoLitros[a.posto_id] || 0) + a.litros;
            });
            const labels2 = Object.keys(postoLitros).map(id => postos.find(p => p.id === id)?.nome || `Posto ${id}`).slice(0, 10);
            const data2 = Object.values(postoLitros).slice(0, 10);
            const ctx2 = document.getElementById('chart2').getContext('2d');
            charts.push(new Chart(ctx2, {
                type: 'pie',
                data: {
                    labels: labels2,
                    datasets: [{ data: data2, backgroundColor: ['#facc15', '#eab308', '#ca8a04', '#a16207', '#854d0e'] }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: 'white' } } }
                }
            }));
        }

        // Motoristas CRUD
        async function loadMotoristas() {
            const { data } = await db.from('motoristas').select('*').order('nome');
            motoristas = data || [];
            renderMotoristas();
        }

        function renderMotoristas() {
            let html = '';
            motoristas.forEach(m => {
                html += `
                    <div class="card border-gold">
                        <h3>${m.nome}</h3>
                        <p><strong>CPF:</strong> ${m.cpf}</p>
                        <p><strong>CNH:</strong> ${m.cnh}</p>
                        <button onclick="editMotorista('${m.id}')">Editar</button>
                        <button class="del" onclick="deleteMotorista('${m.id}')">Excluir</button>
                    </div>
                `;
            });
            document.getElementById('motoristas-list').innerHTML = html;
        }

        function showMotoristaModal(editId = null) {
            currentEdit = { type: 'motorista', id: editId, mode: editId ? 'edit' : 'add' };
            document.getElementById('modal-motorista-title').textContent = editId ? 'Editar Motorista' : 'Novo Motorista';
            if (editId) {
                const m = motoristas.find(x => x.id === editId);
                document.getElementById('m-nome').value = m.nome;
                document.getElementById('m-cpf').value = m.cpf;
                document.getElementById('m-cnh').value = m.cnh;
            } else {
                document.getElementById('m-nome').value = '';
                document.getElementById('m-cpf').value = '';
                document.getElementById('m-cnh').value = '';
            }
            document.getElementById('modal-motorista').style.display = 'flex';
        }

        async function saveMotorista(e) {
            e.preventDefault();
            const nome = document.getElementById('m-nome').value;
            const cpf = document.getElementById('m-cpf').value;
            const cnh = document.getElementById('m-cnh').value;
            const payload = { nome, cpf, cnh };
            let error;
            if (currentEdit.mode === 'add') {
                ({ error } = await db.from('motoristas').insert([payload]));
            } else {
                ({ error } = await db.from('motoristas').update(payload).eq('id', currentEdit.id));
            }
            if (error) {
                alert('Erro: ' + error.message);
            } else {
                hideModal('modal-motorista');
                loadMotoristas();
            }
        }

        async function deleteMotorista(id) {
            if (confirm('Excluir motorista?')) {
                const { error } = await db.from('motoristas').delete().eq('id', id);
                if (error) alert('Erro: ' + error.message);
                else loadMotoristas();
            }
        }

        function editMotorista(id) {
            showMotoristaModal(id);
        }

        // Veiculos CRUD (similar)
        async function loadVeiculos() {
            const { data } = await db.from('veiculos').select('*').order('placa');
            veiculos = data || [];
            renderVeiculos();
        }

        function renderVeiculos() {
            let html = '';
            veiculos.forEach(v => {
                html += `
                    <div class="card border-gold">
                        <h3>${v.placa}</h3>
                        <p><strong>Renavam:</strong> ${v.renavam}</p>
                        <p><strong>IPVA:</strong> ${v.ipva || 'N/I'}</p>
                        <p><strong>Licenciamento:</strong> ${v.licenciamento || 'N/I'}</p>
                        <button onclick="editVeiculo('${v.id}')">Editar</button>
                        <button class="del" onclick="deleteVeiculo('${v.id}')">Excluir</button>
                    </div>
                `;
            });
            document.getElementById('veiculos-list').innerHTML = html;
        }

        function showVeiculoModal(editId = null) {
            currentEdit = { type: 'veiculo', id: editId, mode: editId ? 'edit' : 'add' };
            document.getElementById('modal-veiculo-title').textContent = editId ? 'Editar Veículo' : 'Novo Veículo';
            if (editId) {
                const v = veiculos.find(x => x.id === editId);
                document.getElementById('v-placa').value = v.placa;
                document.getElementById('v-renavam').value = v.renavam;
                document.getElementById('v-ipva').value = v.ipva || '';
                document.getElementById('v-licenciamento').value = v.licenciamento || '';
            } else {
                document.getElementById('v-placa').value = '';
                document.getElementById('v-renavam').value = '';
                document.getElementById('v-ipva').value = '';
                document.getElementById('v-licenciamento').value = '';
            }
            document.getElementById('modal-veiculo').style.display = 'flex';
        }

        async function saveVeiculo(e) {
            e.preventDefault();
            const placa = document.getElementById('v-placa').value;
            const renavam = document.getElementById('v-renavam').value;
            const ipva = document.getElementById('v-ipva').value;
            const licenciamento = document.getElementById('v-licenciamento').value;
            const payload = { placa, renavam, ipva, licenciamento };
            let error;
            if (currentEdit.mode === 'add') {
                ({ error } = await db.from('veiculos').insert([payload]));
            } else {
                ({ error } = await db.from('veiculos').update(payload).eq('id', currentEdit.id));
            }
            if (error) {
                alert('Erro: ' + error.message);
            } else {
                hideModal('modal-veiculo');
                loadVeiculos();
            }
        }

        async function deleteVeiculo(id) {
            if (confirm('Excluir veículo?')) {
                const { error } = await db.from('veiculos').delete().eq('id', id);
                if (error) alert('Erro: ' + error.message);
                else loadVeiculos();
            }
        }

        function editVeiculo(id) {
            showVeiculoModal(id);
        }

        // Postos CRUD (similar)
        async function loadPostos() {
            const { data } = await db.from('postos').select('*').order('nome');
            postos = data || [];
            renderPostos();
        }

        function renderPostos() {
            let html = '';
            postos.forEach(p => {
                html += `
                    <div class="card border-gold">
                        <h3>${p.nome}</h3>
                        <p><strong>CNPJ:</strong> ${p.cnpj}</p>
                        <button onclick="editPosto('${p.id}')">Editar</button>
                        <button class="del" onclick="deletePosto('${p.id}')">Excluir</button>
                    </div>
                `;
            });
            document.getElementById('postos-list').innerHTML = html;
        }

        function showPostoModal(editId = null) {
            currentEdit = { type: 'posto', id: editId, mode: editId ? 'edit' : 'add' };
            document.getElementById('modal-posto-title').textContent = editId ? 'Editar Posto' : 'Novo Posto';
            if (editId) {
                const p = postos.find(x => x.id === editId);
                document.getElementById('p-nome').value = p.nome;
                document.getElementById('p-cnpj').value = p.cnpj;
            } else {
                document.getElementById('p-nome').value = '';
                document.getElementById('p-cnpj').value = '';
            }
            document.getElementById('modal-posto').style.display = 'flex';
        }

        async function savePosto(e) {
            e.preventDefault();
            const nome = document.getElementById('p-nome').value;
            const cnpj = document.getElementById('p-cnpj').value;
            const payload = { nome, cnpj };
            let error;
            if (currentEdit.mode === 'add') {
                ({ error } = await db.from('postos').insert([payload]));
            } else {
                ({ error } = await db.from('postos').update(payload).eq('id', currentEdit.id));
            }
            if (error) {
                alert('Erro: ' + error.message);
            } else {
                hideModal('modal-posto');
                loadPostos();
            }
        }

        async function deletePosto(id) {
            if (confirm('Excluir posto?')) {
                const { error } = await db.from('postos').delete().eq('id', id);
                if (error) alert('Erro: ' + error.message);
                else loadPostos();
            }
        }

        function editPosto(id) {
            showPostoModal(id);
        }

        // Abastecimento
        function showAbastModal() {
            populateSelects();
            document.getElementById('ab-data').valueAsDate = new Date();
            document.getElementById('modal-abast').style.display = 'flex';
        }

        function populateSelects() {
            const mSel = document.getElementById('ab-motorista');
            mSel.innerHTML = '<option>Selecione Motorista</option>';
            motoristas.forEach(m => {
                mSel.innerHTML += `<option value="${m.id}">${m.nome}</option>`;
            });
            const vSel = document.getElementById('ab-veiculo');
            vSel.innerHTML = '<option>Selecione Veículo</option>';
            veiculos.forEach(v => {
                vSel.innerHTML += `<option value="${v.id}">${v.placa}</option>`;
            });
            const pSel = document.getElementById('ab-posto');
            pSel.innerHTML = '<option>Selecione Posto</option>';
            postos.forEach(p => {
                pSel.innerHTML += `<option value="${p.id}">${p.nome}</option>`;
            });
        }

        async function saveAbast(e) {
            e.preventDefault();
            const motorista_id = document.getElementById('ab-motorista').value;
            const veiculo_id = document.getElementById('ab-veiculo').value;
            const posto_id = document.getElementById('ab-posto').value;
            const km_inicial = parseFloat(document.getElementById('ab-km-inicial').value);
            const km_final = parseFloat(document.getElementById('ab-km-final').value);
            const litros = parseFloat(document.getElementById('ab-litros').value);
            const data = document.getElementById('ab-data').value;
            const { error } = await db.from('abastecimentos').insert([{ motorista_id, veiculo_id, posto_id, km_inicial, km_final, litros, data }]);
            if (error) {
                alert('Erro: ' + error.message);
            } else {
                hideModal('modal-abast');
                loadDashboard();
            }
        }

        // QR Scanner
        function startQRScanner() {
            document.getElementById('qr-modal').style.display = 'flex';
            Html5Qrcode.getCameras().then(devices => {
                if (devices && devices.length) {
                    html5QrScanner = new Html5Qrcode('qr-scanner');
                    const config = { fps: 10, qrbox: { width: 250, height: 250 } };
                    html5QrScanner.start(
                        devices[0].id,
                        config,
                        decodedText => {
                            try {
                                const data = JSON.parse(decodedText);
                                document.getElementById('ab-litros').value = data.litros || '';
                                document.getElementById('ab-km-final').value = data.km || '';
                                // Find and select posto, etc.
                                const postoOpt = Array.from(document.getElementById('ab-posto').options).find(opt => opt.text.includes(data.posto || ''));
                                if (postoOpt) postoOpt.selected = true;
                                stopQRScanner();
                            } catch (e) {
                                alert('QR inválido: ' + e.message);
                            }
                        },
                        error => {}
                    ).catch(err => console.error('Scanner error:', err));
                } else {
                    alert('Nenhuma câmera encontrada');
                }
            }).catch(err => console.error(err));
        }

        function stopQRScanner() {
            if (html5QrScanner) {
                html5QrScanner.stop().then(() => {
                    html5QrScanner = null;
                }).catch(err => console.error(err));
            }
            document.getElementById('qr-modal').style.display = 'none';
        }

        // OCR
        async function startOCR() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    try {
                        const { data: { text } } = await Tesseract.recognize(file, 'por', {
                            logger: m => console.log(m)
                        });
                        // Simple parse (customize regex as needed)
                        const litrosMatch = text.match(/litro[s]?[:\s]*([0-9,\.]+)/i);
                        if (litrosMatch) {
                            document.getElementById('ab-litros').value = parseFloat(litrosMatch[1].replace(',', '.'));
                        }
                        const kmMatch = text.match(/km[:\s]*([0-9]+)/i);
                        if (kmMatch) {
                            document.getElementById('ab-km-final').value = kmMatch[1];
                        }
                        alert('Dados extraídos do cupom! Verifique os campos.');
                    } catch (err) {
                        alert('Erro no OCR: ' + err.message);
                    }
                }
            };
            input.click();
        }

        // Utils
        function hideModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Close modals on outside click
        window.onclick = (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.style.display = 'none';
            }
        };

        init();
    </script>
</body>
</html>
