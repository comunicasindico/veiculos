<script>
const db=supabase.createClient("https://gspdlrenyrzbkxlvyugc.supabase.co","sb_publishable_MQRr8O1saGmGz3nsMg1g-Q_8ZIK6yrw")
let VID=null,graficoPrincipal,dadosGlobal=[],tipoGrafico="total",filtroInicio=null,filtroFim=null
function fData(d){if(!d)return"-";let x=d.split("T")[0].split("-");return x[2]+"/"+x[1]}
document.addEventListener("DOMContentLoaded",async()=>{if(window.data)data.value=new Date().toISOString().slice(0,10);if(localStorage.getItem("empresa")){document.getElementById("telaLogin").style.display="none";document.getElementById("app").style.display="block";await carregarTudo();render()}else{document.body.classList.add("login")}})
async function login(){let usuario=(user.value||"").trim(),senha=(pass.value||"").trim();if(!usuario||!senha)return alert("Informe usuário e senha");let{data,error}=await db.from("usuarios").select("*").ilike("usuario_apelido",usuario);if(error)return alert("Erro conexão");if(!data||!data.length)return alert("Usuário não encontrado");let u=data[0];if(u.senha_hash!==senha)return alert("Senha incorreta");localStorage.setItem("empresa",u.empresa_id);document.getElementById("telaLogin").style.display="none";document.getElementById("app").style.display="block";await carregarTudo();render()}
function logout(){localStorage.removeItem("empresa");location.reload()}
function aplicarFiltro(){filtroInicio=document.getElementById("filtroInicio").value||null;filtroFim=document.getElementById("filtroFim").value||null;render()}
function trocarGrafico(t){tipoGrafico=t;renderGrafico(dadosGlobal)}
async function carregarTudo(){let emp=localStorage.getItem("empresa");if(!emp)return;let{data:veiculos}=await db.from("veiculos").select("*").eq("empresa_id",emp);let{data:postos}=await db.from("postos").select("*").eq("empresa_id",emp);let{data:motoristas}=await db.from("motoristas").select("*").eq("empresa_id",emp);if(veiculoSel){veiculoSel.innerHTML=veiculos&&veiculos.length?veiculos.map(v=>`<option value="${v.id}">${v.modelo||v.placa||"Veículo"}</option>`).join(""):`<option value="">Nenhum veículo</option>`;VID=veiculos&&veiculos.length?veiculos[0].id:null}if(postoSel){postoSel.innerHTML=postos&&postos.length?postos.map(p=>`<option value="${p.id}">${p.nome_posto||"-"}</option>`).join(""):`<option value="">Sem postos</option>`}if(v_motorista){v_motorista.innerHTML=motoristas&&motoristas.length?motoristas.map(m=>`<option value="${m.id}">${m.nome||"-"}</option>`).join(""):`<option value="">Sem motoristas</option>`}}
async function render(){if(veiculoSel&&veiculoSel.value)VID=veiculoSel.value;if(!VID)return;let query=db.from("abastecimentos").select("*,postos(nome_posto)").eq("veiculo_id",VID);if(filtroInicio)query=query.gte("data_abastecimento",filtroInicio);if(filtroFim)query=query.lte("data_abastecimento",filtroFim);let{data,error}=await query.order("data_abastecimento",{ascending:false});if(error)return console.error(error);dadosGlobal=data||[];if(!dadosGlobal.length){lista.innerHTML="<div class='item'>Sem histórico</div>";renderGrafico([]);return}lista.innerHTML=dadosGlobal.map(a=>`<div class="item"><div class="itemContent"><div><b>${fData(a.data_abastecimento)}</b> | ${a.postos?.nome_posto||"-"}</div><div style="font-size:11px;color:#94a3b8">R$ ${Number(a.valor_total||0).toFixed(2)} | ${a.litros}L | KM ${a.quilometragem||"-"}</div></div></div>`).join("");renderGrafico(dadosGlobal)}
function renderGrafico(lista){if(!lista||!lista.length)return;let dados=[...lista].sort((a,b)=>new Date(a.data_abastecimento)-new Date(b.data_abastecimento));let labels=dados.map(x=>fData(x.data_abastecimento));let dataset=[];if(tipoGrafico==="total"){dataset=dados.map(x=>Number(x.valor_total||0))}if(tipoGrafico==="litros"){dataset=dados.map(x=>Number(x.litros||0))}if(tipoGrafico==="consumo"){dataset=[];for(let i=1;i<dados.length;i++){let km=dados[i].quilometragem-dados[i-1].quilometragem;let l=dados[i].litros;if(km>0&&l>0)dataset.push(km/l)}}if(graficoPrincipal)graficoPrincipal.destroy();graficoPrincipal=new Chart(document.getElementById("graficoPrincipal"),{type:"line",data:{labels:labels,datasets:[{label:tipoGrafico,data:dataset,borderWidth:2,tension:.3}]}});renderKPIs(dados)}
function renderKPIs(lista){let total=lista.reduce((s,x)=>s+Number(x.valor_total||0),0);let litros=lista.reduce((s,x)=>s+Number(x.litros||0),0);let consumo=0;if(lista.length>1){let km=lista[lista.length-1].quilometragem-lista[0].quilometragem;if(litros>0)consumo=km/litros}kpis.innerHTML=`<div class="item" onclick="trocarGrafico('total')">💰 R$ ${total.toFixed(2)}</div><div class="item" onclick="trocarGrafico('litros')">⛽ ${litros.toFixed(1)}</div><div class="item" onclick="trocarGrafico('consumo')">📈 ${consumo.toFixed(2)} km/l</div>`}
async function salvar(){if(!data.value)data.value=new Date().toISOString().slice(0,10);if(!VID)return alert("Selecione veículo");let emp=localStorage.getItem("empresa");let postoId=postoSel.value||null;let v_total=parseFloat(valor.value)||0;let v_litros=parseFloat(litros.value)||0;let v_km=parseFloat(km.value)||0;if(v_total<=0||v_litros<=0)return alert("Dados inválidos");let v_valorLitro=v_litros>0?(v_total/v_litros):0;let{error}=await db.from("abastecimentos").insert({empresa_id:emp,veiculo_id:VID,posto_id:postoId,valor_total:v_total,litros:v_litros,quilometragem:v_km,data_abastecimento:data.value,valor_litro:v_valorLitro,tanque:"cheio"});if(error)return alert("Erro ao salvar");valor.value="";litros.value="";km.value="";render()}
if(window.veiculoSel&&!veiculoSel._bind){veiculoSel.addEventListener("change",()=>{VID=veiculoSel.value;render()});veiculoSel._bind=true}
function abrirTela(t){document.querySelectorAll(".tela").forEach(e=>e.style.display="none");let el=document.getElementById("tela_"+t);if(el)el.style.display="block"}
</script>

  <script>
async function executarAutoRecorte(){if(!previewOCR.src)return;let r=await autoRecorteCupom(previewOCR.src);previewOCR.src=r}
async function autoRecorteCupom(src){return new Promise(resolve=>{let img=new Image();img.onload=()=>{let canvas=document.createElement("canvas"),ctx=canvas.getContext("2d");canvas.width=img.width;canvas.height=img.height;ctx.drawImage(img,0,0);let imageData=ctx.getImageData(0,0,canvas.width,canvas.height),data=imageData.data;for(let i=0;i<data.length;i+=4){let avg=(data[i]+data[i+1]+data[i+2])/3;let val=avg>160?255:0;data[i]=val;data[i+1]=val;data[i+2]=val}ctx.putImageData(imageData,0,0);let top=canvas.height,bottom=0,left=canvas.width,right=0;for(let y=0;y<canvas.height;y++){for(let x=0;x<canvas.width;x++){let i=(y*canvas.width+x)*4;if(data[i]<200){if(y<top)top=y;if(y>bottom)bottom=y;if(x<left)left=x;if(x>right)right=x}}}let margem=20;top=Math.max(0,top-margem);left=Math.max(0,left-margem);bottom=Math.min(canvas.height,bottom+margem);right=Math.min(canvas.width,right+margem);let w=right-left,h=bottom-top;if(w<50||h<50){resolve(src);return}let recorte=document.createElement("canvas");recorte.width=w;recorte.height=h;recorte.getContext("2d").drawImage(canvas,left,top,w,h,0,0,w,h);resolve(recorte.toDataURL())};img.src=src})}
async function abrirCameraOCR(){modalOCR.style.display="flex";previewOCR.style.display="none";let stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});videoOCR.srcObject=stream}
function capturarImagem(){let canvas=canvasOCR,video=videoOCR,ctx=canvas.getContext("2d");canvas.width=video.videoWidth;canvas.height=video.videoHeight;ctx.drawImage(video,0,0);let img=canvas.toDataURL("image/jpeg",0.95);previewOCR.src=img;previewOCR.style.display="block"}
async function processarCupomCompleto(){if(!previewOCR.src)return alert("Capture primeiro");iaBox.style.display="block";iaBox.innerHTML="Processando...";let recortada=await autoRecorteCupom(previewOCR.src);previewOCR.src=recortada;let qr=await tentarQRImagem();if(qr){await processarQRCompleto(qr);return}let worker=await Tesseract.createWorker("por");let {data:{text}}=await worker.recognize(recortada);await worker.terminate();if(!text||text.length<10){iaBox.innerHTML="Erro OCR";return}let dados=extrairDadosIA(text);preencherFormulario(dados);iaBox.innerHTML="OK"}
async function tentarQRImagem(){try{if(!window.arquivoOCR)return null;const html5QrCode=new Html5Qrcode("qr-temp");let res=await html5QrCode.scanFile(window.arquivoOCR,true);html5QrCode.clear();return res}catch(e){return null}}
async function processarQRCompleto(url){try{let res=await fetch(url);let html=await res.text();let total=(html.match(/R\$ ?([\d\.,]+)/)||[])[1];let litros=(html.match(/([\d\.,]+)\s*l/)||[])[1];preencherFormulario({total:total,litros:litros,valor_litro:total&&litros?(parseFloat(total.replace(",", "."))/parseFloat(litros.replace(",", "."))).toFixed(3):""});iaBox.innerHTML="QR OK"}catch(e){processarCupomCompleto()}}
function extrairDadosIA(text){text=text.replace(/\r/g,"\n").toLowerCase();let dados={};dados.cnpj=(text.match(/\d{2}\.\d{3}\.\d{3}\/\d{4}\-\d{2}/)||[""])[0];dados.total=(text.match(/total\s*[r\$]*\s*([\d\.,]+)/)||[])[1];dados.litros=(text.match(/(\d+[\.,]\d+)\s*l/)||[])[1];dados.valor_litro=(text.match(/(\d+[\.,]\d+)\s*(?:\/l|litro)/)||[])[1];dados.km=(text.match(/km[\s:]*([\d]{3,7})/)||[])[1];if(text.includes("aditiv"))dados.combustivel="Gasolina Aditivada";else if(text.includes("gasolina"))dados.combustivel="Gasolina";else if(text.includes("etanol")||text.includes("alcool"))dados.combustivel="Álcool";else if(text.includes("diesel"))dados.combustivel="Diesel";if(!dados.valor_litro&&dados.total&&dados.litros){dados.valor_litro=(parseFloat(dados.total.replace(",", "."))/parseFloat(dados.litros.replace(",", "."))).toFixed(3)}return dados}
function preencherFormulario(d){if(d.total)valor.value=d.total.replace(",",".");if(d.litros)litros.value=d.litros.replace(",",".");if(d.valor_litro)valor_litro.value=d.valor_litro;if(d.km)km.value=d.km;if(d.cnpj)buscarPostoPorCNPJ(d.cnpj)}
async function buscarPostoPorCNPJ(cnpj){try{let limpo=cnpj.replace(/\D/g,"");let res=await fetch("https://receitaws.com.br/v1/cnpj/"+limpo);let json=await res.json();if(!json.nome)return;postoInput.value=json.nome}catch(e){}}
function fecharOCR(){modalOCR.style.display="none";let stream=videoOCR.srcObject;if(stream)stream.getTracks().forEach(t=>t.stop())}
function ativarCrop(){cropMode=true}
function startCrop(e){if(!cropMode)return;startX=e.offsetX;startY=e.offsetY}
function endCrop(e){if(!cropMode)return;endX=e.offsetX;endY=e.offsetY;let canvas=canvasOCR,ctx=canvas.getContext("2d"),img=new Image();img.src=previewOCR.src;img.onload=function(){let w=Math.abs(endX-startX),h=Math.abs(endY-startY);canvas.width=w;canvas.height=h;ctx.drawImage(img,startX,startY,w,h,0,0,w,h);previewOCR.src=canvas.toDataURL("image/jpeg",1);cropMode=false}}
let cropMode=false,startX,startY,endX,endY
let qrScanner=null
function abrirQR(){modalQR.style.display="flex";qrScanner=new Html5Qrcode("readerQR");qrScanner.start({facingMode:"environment"},{fps:10,qrbox:250},(msg)=>{processarQR(msg);fecharQR()})}
function fecharQR(){modalQR.style.display="none";if(qrScanner)qrScanner.stop().then(()=>qrScanner.clear())}
async function processarQR(url){if(!url.includes("sefaz"))return alert("QR inválido");let res=await fetch(url);let html=await res.text();let total=(html.match(/R\$ ?([\d\.,]+)/)||[])[1];if(total)valor.value=total.replace(",",".");alert("QR OK")}
function toggleForm(id){
let form=document.getElementById(id)
let lista=id==="formMotorista"?listaMotoristas:id==="formVeiculo"?listaVeiculos:listaPostos
if(!form||!lista)return
if(form.style.display==="none"||!form.style.display){
form.style.display="block"
lista.style.display="none"
}else{
form.style.display="none"
lista.style.display="block"
}
}
function cancelarMotorista(){
formMotorista.style.display="none"
listaMotoristas.style.display="block"
m_nome.value=""
m_tel.value=""
if(m_cpf)m_cpf.value=""
window.editMotoristaId=null
}
function cancelarVeiculo(){
formVeiculo.style.display="none"
listaVeiculos.style.display="block"
v_placa.value=""
v_marca.value=""
v_modelo.value=""
v_ano.value=""
v_cor.value=""
v_renavam.value=""
v_combustivel.value=""
v_km.value=""
v_ipva.value=""
v_licenciamento.value=""
window.editVeiculoId=null
}
function cancelarPosto(){
formPosto.style.display="none"
listaPostos.style.display="block"
p_nome.value=""
p_cnpj.value=""
p_cidade.value=""
p_endereco.value=""
p_numero.value=""
p_uf.value=""
p_cep.value=""
window.editPostoId=null
}
async function salvarMotorista(){
let emp=localStorage.getItem("empresa")
let payload={empresa_id:emp,nome:(m_nome.value||""),telefone:(m_tel.value||""),cpf:(m_cpf?.value||"")}
let error=null
if(window.editMotoristaId){
({error}=await db.from("motoristas").update(payload).eq("id",window.editMotoristaId))
}else{
({error}=await db.from("motoristas").insert(payload))
}
if(error)return alert("Erro")
cancelarMotorista()
await carregarTudo()
}
window.editarMotorista=function(id,nome,tel,cpf){
window.editMotoristaId=id
m_nome.value=nome||""
m_tel.value=tel||""
if(m_cpf)m_cpf.value=cpf||""
formMotorista.style.display="block"
listaMotoristas.style.display="none"
}
async function salvarVeiculo(){
let emp=localStorage.getItem("empresa")
let payload={
empresa_id:emp,
placa:(v_placa.value||"").toUpperCase(),
marca:v_marca.value,
modelo:v_modelo.value,
ano:parseInt(v_ano.value)||null,
cor:v_cor.value,
renavam:v_renavam.value,
combustivel_principal:v_combustivel.value,
km_atual:parseFloat(v_km.value)||0,
vencimento_ipva:v_ipva.value||null,
vencimento_licenciamento:v_licenciamento.value||null,
motorista_id:v_motorista.value||null
}
let error=null
if(window.editVeiculoId){
({error}=await db.from("veiculos").update(payload).eq("id",window.editVeiculoId))
}else{
({error}=await db.from("veiculos").insert(payload))
}
if(error)return alert("Erro")
cancelarVeiculo()
await carregarTudo()
}
window.editarVeiculo=function(id,placa,marca,modelo,ano,cor,renavam,comb,km,ipva,lic,motorista){
window.editVeiculoId=id
v_placa.value=placa||""
v_marca.value=marca||""
v_modelo.value=modelo||""
v_ano.value=ano||""
v_cor.value=cor||""
v_renavam.value=renavam||""
v_combustivel.value=comb||""
v_km.value=km||""
v_ipva.value=(ipva||"").split("T")[0]
v_licenciamento.value=(lic||"").split("T")[0]
v_motorista.value=motorista||""
formVeiculo.style.display="block"
listaVeiculos.style.display="none"
}
async function salvarPosto(){
let emp=localStorage.getItem("empresa")
let payload={
empresa_id:emp,
nome_posto:p_nome.value,
cnpj:p_cnpj.value,
cidade:p_cidade.value,
endereco:p_endereco.value,
numero:p_numero.value,
uf:p_uf.value,
cep:p_cep.value
}
let error=null
if(window.editPostoId){
({error}=await db.from("postos").update(payload).eq("id",window.editPostoId))
}else{
({error}=await db.from("postos").insert(payload))
}
if(error)return alert("Erro")
cancelarPosto()
await carregarTudo()
}
window.editarPosto=function(id,nome,cidade,cnpj){
window.editPostoId=id
p_nome.value=nome||""
p_cidade.value=cidade||""
p_cnpj.value=cnpj||""
formPosto.style.display="block"
listaPostos.style.display="none"
}
async function excluir(t,id){
if(!confirm("Excluir?"))return
if(t==="abastecimentos")return alert("Registro protegido")
await db.from(t).delete().eq("id",id)
await carregarTudo()
render()
}
function renderListas(motoristas,veiculos,postos){
if(listaMotoristas){
listaMotoristas.innerHTML=motoristas.map(x=>`
<div class="item">
<div>${x.nome}</div>
<div class="actions">
<button onclick="editarMotorista('${x.id}','${x.nome}','${x.telefone}','${x.cpf}')">✏️</button>
<button onclick="excluir('motoristas','${x.id}')">🗑</button>
</div>
</div>`).join("")
}
if(listaVeiculos){
listaVeiculos.innerHTML=veiculos.map(x=>`
<div class="item">
<div>${x.modelo} | ${x.placa}</div>
<div class="actions">
<button onclick="editarVeiculo('${x.id}','${x.placa}','${x.marca}','${x.modelo}','${x.ano}','${x.cor}','${x.renavam}','${x.combustivel_principal}','${x.km_atual}','${x.vencimento_ipva}','${x.vencimento_licenciamento}','${x.motorista_id}')">✏️</button>
<button onclick="excluir('veiculos','${x.id}')">🗑</button>
</div>
</div>`).join("")
}
if(listaPostos){
listaPostos.innerHTML=postos.map(x=>`
<div class="item">
<div>${x.nome_posto} | ${x.cnpj||"-"}</div>
<div class="actions">
<button onclick="editarPosto('${x.id}','${x.nome_posto}','${x.cidade}','${x.cnpj}')">✏️</button>
<button onclick="excluir('postos','${x.id}')">🗑</button>
</div>
</div>`).join("")
}
}

renderListas(motoristas||[],veiculos||[],postos||[])

  
</script>
