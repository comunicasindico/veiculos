<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">
<link rel="icon" href="img/192x192.png">
<link rel="apple-touch-icon" href="img/192x192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>IA Veículo Master</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5"></script>

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.container{max-width:720px;margin:auto;padding:10px}
.card{background:#0b1220;padding:12px;border-radius:12px;margin-top:10px}
input,select{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:none;background:#020617;color:#fff}
button{width:100%;padding:12px;margin-top:6px;border:none;border-radius:10px;background:#22c55e;color:#000;font-weight:bold}
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.item{background:#111827;padding:8px;border-radius:8px;margin-top:6px;font-size:12px}
.row{display:flex;justify-content:space-between}
.alerta{color:#f87171;font-weight:bold}
#telaLogin{background:url("img/bancocomunicaveiculos.png") no-repeat center center fixed;background-size:cover;display:flex;justify-content:center;align-items:center;height:100vh}
#telaLogin::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(2,6,23,0.75)}
#loginBox{position:relative;z-index:1;width:280px}
.headerApp{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,#020617,#0f172a);padding:10px;border-bottom:1px solid rgba(255,255,255,0.05)}
.logoArea{font-size:18px;font-weight:bold;text-align:center;margin-bottom:6px;color:#22c55e}
.headerApp{position:sticky;top:0;background:#020617;padding:10px;border-bottom:1px solid #111}
.logoArea{text-align:center;font-weight:bold;color:#22c55e;margin-bottom:6px}
.menuTabs{display:flex;gap:6px}
.menuTabs button{flex:1;background:#111827;color:#9ca3af;border:none;border-radius:10px;padding:10px}
.menuTabs button.active{background:#22c55e;color:#000}

</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="telaLogin">
<div id="loginBox">
<h2 style="text-align:center">🚗 IA Veículo(s) Master</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- ================= APP ================= -->
<div id="app" class="container" style="display:none">

<!-- HEADER -->
<div class="headerApp">
<div class="logoArea">🚗 IA Veículo(s)</div>
<div class="menuTabs">
<button onclick="abrirTela('combustivel')" id="tab_combustivel">⛽</button>
<button onclick="abrirTela('motorista')" id="tab_motorista">👨</button>
<button onclick="abrirTela('veiculo')" id="tab_veiculo">🚗</button>
<button onclick="abrirTela('posto')" id="tab_posto">🏪</button>
</div>
</div>

<!-- ================= COMBUSTÍVEL ================= -->
<div id="tela_combustivel" class="tela">

<div class="card">
<select id="veiculoSel"></select>
</div>

<div class="card kpi" id="kpi"></div>
<div id="alerta" class="alerta"></div>

<div class="card">
<h3>📷 OCR Cupom</h3>
<video id="video" autoplay style="display:none"></video>
<button onclick="capturar()">Capturar</button>
<canvas id="canvas"></canvas>
<div id="ocr"></div>

<button onclick="toggleManual()">Manual</button>

<div id="manualBox" style="display:none">
<input id="m_valor" placeholder="Valor">
<input id="m_litros" placeholder="Litros">
<input id="m_tipo" placeholder="Combustível">
<input id="m_posto" placeholder="Posto">

<select id="motoristaSel"></select>
<select id="postoSel"></select>

<select id="m_tanque">
<option value="cheio">Tanque Cheio</option>
<option value="parcial">Parcial</option>
</select>

<button onclick="usarManual()">Aplicar</button>
</div>
</div>

<div class="card">
<h3>⛽ Abastecimento</h3>
<input id="valor" placeholder="Valor">
<input id="litros" placeholder="Litros">
<input id="km" placeholder="KM">

<select id="tanque">
<option value="cheio">Tanque Cheio</option>
<option value="parcial">Parcial</option>
</select>

<button onclick="salvar()">Salvar</button>
</div>

<div class="card">
<canvas id="grafico"></canvas>
</div>

<div class="card">
<h3>📊 Histórico Completo</h3>
<div id="lista"></div>
</div>

</div>

<!-- ================= MOTORISTAS ================= -->
<div id="tela_motorista" class="tela" style="display:none">

<div class="card">
<h3>👨 Cadastro Motorista</h3>
<input id="m_nome" placeholder="Nome">
<button onclick="salvarMotorista()">Salvar</button>
</div>

<div class="card">
<h3>📋 Lista</h3>
<div id="listaMotoristas"></div>
</div>

</div>

<!-- ================= VEÍCULOS ================= -->
<div id="tela_veiculo" class="tela" style="display:none">

<div class="card">
<h3>🚗 Cadastro Veículo</h3>
<input id="v_modelo" placeholder="Modelo">
<input id="v_placa" placeholder="Placa">
<button onclick="salvarVeiculo()">Salvar</button>
</div>

<div class="card">
<h3>📋 Lista</h3>
<div id="listaVeiculos"></div>
</div>

</div>

<!-- ================= POSTOS ================= -->
<div id="tela_posto" class="tela" style="display:none">

<div class="card">
<h3>🏪 Cadastro Posto</h3>
<input id="p_nome" placeholder="Nome">
<input id="p_cnpj" placeholder="CNPJ">
<input id="p_cidade" placeholder="Cidade">
<input id="p_uf" placeholder="UF">
<input id="p_endereco" placeholder="Endereço">
<input id="p_bairro" placeholder="Bairro">
<button onclick="salvarPosto()">Salvar</button>
</div>

<div class="card">
<h3>📋 Lista</h3>
<div id="listaPostos"></div>
</div>

</div>

</div>

</body>

<script>
const db=supabase.createClient("https://gspdlrenyrzbkxlvyugc.supabase.co","sb_publishable_MQRr8O1saGmGz3nsMg1g-Q_8ZIK6yrw")
let VID=null,chart=null,stream=null,dadosOCR=null

function hojeISO(){const d=new Date();const l=new Date(d.getTime()-d.getTimezoneOffset()*60000);return l.toISOString().slice(0,10)}
function brData(d){if(!d)return"-";let s=d.split("T")[0];let[y,m,dd]=s.split("-");return`${dd}/${m}/${y.slice(2)}`}
function safe(v){return v??"-"}
function moeda(v){return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function parse(v){return parseFloat((v||"0").replace(/\./g,"").replace(",", "."))}

/* LOGIN */
async function login(){
const{data}=await db.from("usuarios").select("*").eq("usuario_apelido",user.value.toLowerCase())
if(!data||!data.length)return alert("Usuário não encontrado")
if(data[0].senha_hash!==pass.value)return alert("Senha incorreta")
localStorage.setItem("empresa",data[0].empresa_id)
localStorage.setItem("uid",data[0].id)
init()
}

/* INIT */
async function init(){
let uid=localStorage.getItem("uid")
if(!uid)return mostrarLogin()

mostrarApp()

let{data,error}=await db.from("veiculos").select("*").eq("empresa_id",localStorage.getItem("empresa"))
if(error)return alert("Erro veículos")

if(!data||!Array.isArray(data))data=[]

if(!data.length){
veiculoSel.innerHTML="<option>Nenhum veículo</option>"
return
}

veiculoSel.innerHTML=data.map(v=>`<option value="${v.id}">${v.modelo||"-"}</option>`).join("")
VID=data[0].id

await carregarCadastros()
render()
}

function mostrarLogin(){telaLogin.style.display="flex";app.style.display="none"}
function mostrarApp(){telaLogin.style.display="none";app.style.display="block"}
function abrirTela(t){
document.querySelectorAll(".tela").forEach(el=>el.style.display="none")
document.querySelectorAll(".menuTabs button").forEach(b=>b.classList.remove("active"))
document.getElementById("tela_"+t).style.display="block"
document.getElementById("tab_"+t).classList.add("active")
}
/* CADASTROS */
async function carregarCadastros(){
let{data:postos}=await db.from("postos").select("*")
if(!Array.isArray(postos))postos=[]
postoSel.innerHTML=postos.map(p=>`<option value="${p.id}">${p.nome_posto||"-"}</option>`).join("")

let{data:motoristas}=await db.from("motoristas").select("*")
if(!Array.isArray(motoristas))motoristas=[]
motoristaSel.innerHTML=motoristas.map(m=>`<option value="${m.id}">${m.nome||"-"}</option>`).join("")
}

/* OCR */
async function capturar(){
stream=await navigator.mediaDevices.getUserMedia({video:true})
video.srcObject=stream
video.style.display="block"
await new Promise(r=>setTimeout(r,1200))
const ctx=canvas.getContext("2d")
canvas.width=video.videoWidth
canvas.height=video.videoHeight
ctx.drawImage(video,0,0)
const{data:{text}}=await Tesseract.recognize(canvas,"por")
dadosOCR=extrair(text)

if(dadosOCR.valor>1000||dadosOCR.litros>150)alert("⚠ OCR suspeito")

valor.value=dadosOCR.valor||""
litros.value=dadosOCR.litros||""

ocr.innerHTML=`💰 ${dadosOCR.valor} | ⛽ ${dadosOCR.litros}`
}

/* EXTRAIR */
function extrair(txt){
txt=txt.toUpperCase().replace(/\s+/g," ")
let valores=[...txt.matchAll(/\d{1,3}(\.\d{3})*,\d{2}/g)]
let valor=valores.length?Math.max(...valores.map(v=>parse(v[0]))):0
let l=txt.match(/(\d+,\d{3})\s*L/)
let litros=l?parseFloat(l[1].replace(",", ".")):0
return{valor,litros}
}

/* SALVAR */
async function salvar(){
const v=parse(valor.value)
const l=parseFloat(litros.value)
const k=parseFloat(km.value)
const posto_id=postoSel.value
const motorista_id=motoristaSel.value

if(!v||!l||!k)return alert("Preencha tudo")

await db.from("abastecimentos").insert({
empresa_id:localStorage.getItem("empresa"),
veiculo_id:VID,
motorista_id,
posto_id,
valor_total:v,
litros:l,
valor_litro:(v/l),
quilometragem:k,
tanque:tanque.value,
data_abastecimento:hojeISO()
})

render()
}

/* IA */
function IA(data){
let totalKm=0,totalValor=0,cons=[]
for(let i=1;i<data.length;i++){
let km=data[i].quilometragem-data[i-1].quilometragem
let l=data[i].litros
if(km>0&&l>0){
let c=km/l
if(data[i].tanque==="cheio")cons.push(c)
totalKm+=km
totalValor+=data[i].valor_total
}
}
return{media:cons.length?cons.reduce((a,b)=>a+b,0)/cons.length:0,custo:totalKm?totalValor/totalKm:0}
}

/* HISTÓRICO */
function renderHistorico(data){
let html=""
for(let i=data.length-1;i>=0;i--){
let a=data[i]
html+=`
<div class="item">
<div class="row"><span>${brData(a.data_abastecimento)}</span><span>${a.quilometragem} km</span></div>
<div class="row"><span>${a.litros} L</span><span>${moeda(a.valor_total)}</span></div>
<div class="row"><span>${a.tanque}</span><span>${a.valor_litro?.toFixed(2)||"-"}/L</span></div>
</div>`
}
lista.innerHTML=html
}

/* RENDER */
async function render(){
let empresa=localStorage.getItem("empresa")
let{data,error}=await db.from("abastecimentos").select("*").eq("veiculo_id",VID).eq("empresa_id",empresa).order("data_abastecimento",{ascending:true})

if(error)return console.error(error)

if(!data||!Array.isArray(data))data=[]

if(!data.length){
lista.innerHTML="<div>Sem dados</div>"
return
}

renderHistorico(data)

let ia=IA(data)

kpi.innerHTML=`
<div>Média ${ia.media.toFixed(2)}</div>
<div>Custo/km ${ia.custo.toFixed(2)}</div>
`

let labels=[],vals=[]
for(let i=1;i<data.length;i++){
let km=data[i].quilometragem-data[i-1].quilometragem
let l=data[i].litros
if(km>0&&l>0){
labels.push(i)
vals.push(km/l)
}
}

if(chart)chart.destroy()
chart=new Chart(grafico,{type:"line",data:{labels,datasets:[{data:vals}]}})
}
</script>

</body>
</html>
