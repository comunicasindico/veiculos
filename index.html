<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Banco Comunica Veículos PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#020617;color:#fff}
#login{position:fixed;width:100%;height:100%;background:url("img/bcveiculos.png") center/cover;display:flex;justify-content:center;align-items:center}
.loginBox{background:rgba(0,0,0,.7);padding:30px;border-radius:16px;width:320px}
.loginBox input{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;background:#111;color:#fff}
.loginBox button{width:100%;margin-top:10px;padding:12px;border:none;border-radius:10px;background:#facc15;color:#000;font-weight:bold}

#app{display:none;height:100vh}
#header{height:50px;background:#020617;border-bottom:2px solid #facc15;display:flex;align-items:center;justify-content:space-between;padding:0 15px}
#pages{display:flex;height:calc(100vh - 110px);transition:.3s}
.page{width:100vw;padding:10px;overflow-y:auto}
#nav{position:fixed;bottom:0;width:100%;display:flex;background:#020617;border-top:2px solid #facc15}
#nav button{flex:1;padding:10px;background:none;border:none;color:#fff}

.card{background:#111;padding:15px;border-radius:12px;margin-bottom:10px}
.kpi{display:flex;justify-content:space-between;margin-bottom:10px}
input,select{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:none;background:#1e293b;color:#fff}
.btn{background:#22c55e;color:#000;padding:10px;border-radius:8px;border:none;margin-top:10px;width:100%}
</style>
</head>

<body>

<div id="login">
<div class="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>
</div>

<div id="app">
<div id="header">
<span>Banco Comunica</span>
<button onclick="logout()">Sair</button>
</div>

<div id="pages">

<!-- DASHBOARD -->
<div class="page">
<div class="card">
<div class="kpi"><span>Total KM</span><b id="kpiKm">0</b></div>
<div class="kpi"><span>KM/L</span><b id="kpiKml">0</b></div>
<div class="kpi"><span>Litros</span><b id="kpiLitros">0</b></div>
</div>
<canvas id="chart"></canvas>
</div>

<!-- ABAST -->
<div class="page">
<div class="card">
<select id="veiculoSel"></select>
<input id="data" type="date">
<input id="valor" placeholder="Valor">
<input id="litros" placeholder="Litros">
<input id="km" placeholder="KM">
<button class="btn" onclick="salvar()">Salvar</button>
</div>
<div id="lista"></div>
</div>

<!-- VEICULOS -->
<div class="page">
<div class="card">
<input id="placa" placeholder="Placa">
<input id="modelo" placeholder="Modelo">
<button class="btn" onclick="salvarVeiculo()">Salvar</button>
</div>
<div id="listaVeiculos"></div>
</div>

<!-- POSTOS -->
<div class="page">
<div class="card">
<input id="nomePosto" placeholder="Nome">
<button class="btn" onclick="salvarPosto()">Salvar</button>
</div>
<div id="listaPostos"></div>
</div>

</div>

<div id="nav">
<button onclick="go(0)">🏠</button>
<button onclick="go(1)">⛽</button>
<button onclick="go(2)">🚗</button>
<button onclick="go(3)">🏪</button>
</div>
</div>

<script>

/* SUPABASE */
const db=supabase.createClient(
"https://gspdlrenyrzbkxlvyugc.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzcGRscmVueXJ6Ymt4bHZ5dWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODU0NzAsImV4cCI6MjA5MDQ2MTQ3MH0.UWfkWvOh4qMDEcByVL-KZ6ejJ80V7wJlDOFH76TywaI"
)

let dados=[]

async function login(){
let {data,error}=await db.auth.signInWithPassword({
email:email.value,
password:senha.value
})
if(error){alert(error.message);return}
start()
}

function logout(){location.reload()}

async function start(){
login.style.display="none"
app.style.display="block"
await carregar()
render()
}

/* LOAD */
async function carregar(){
let {data}=await db.from("abastecimentos").select("*")
dados=data||[]

let v=await db.from("veiculos").select("*")
veiculoSel.innerHTML=v.data.map(x=>`<option value="${x.id}">${x.placa}</option>`).join("")
}

/* SALVAR */
async function salvar(){
await db.from("abastecimentos").insert({
veiculo_id:veiculoSel.value,
data:data.value,
valor:parseFloat(valor.value)||0,
litros:parseFloat(litros.value)||0,
km:parseFloat(km.value)||0
})
await carregar()
render()
}

/* RENDER */
function render(){
let html=""
let totalKm=0,litros=0

dados.forEach(d=>{
totalKm+=d.km||0
litros+=d.litros||0
html+=`<div class="card">${d.data} R$ ${d.valor}</div>`
})

lista.innerHTML=html

let kml=litros?totalKm/litros:0

kpiKm.innerText=totalKm.toFixed(0)
kpiKml.innerText=kml.toFixed(2)
kpiLitros.innerText=litros.toFixed(0)

if(window.chart)chart.destroy()
chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{labels:["KM","Litros"],datasets:[{data:[totalKm,litros]}]}
})
}

/* CRUD */
async function salvarVeiculo(){
await db.from("veiculos").insert({placa:placa.value,modelo:modelo.value})
placa.value="";modelo.value=""
await carregar()
}

async function salvarPosto(){
await db.from("postos").insert({nome:nomePosto.value})
nomePosto.value=""
await carregar()
}

/* NAV */
function go(i){
document.getElementById("pages").style.transform="translateX(-"+(i*100)+"vw)"
}

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
let d=new Date()
d.setMinutes(d.getMinutes()-d.getTimezoneOffset())
data.value=d.toISOString().slice(0,10)
})

</script>
</body>
</html>
