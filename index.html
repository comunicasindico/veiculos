<script>

function UID(){return localStorage.getItem("usuario_id")}
let iaBox
let VID=null
let USER_ID=UID()
let EMPRESA_ID=EMP()
let graficoConsumo,graficoGasto
let tipoGrafico="consumo"
let filtroInicio=null
let filtroFim=null
let currentPage=0
const SUPABASE_URL="https://gspdlrenyrzbkxlvyugc.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzcGRscmVueXJ6Ymt4bHZ5dWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODU0NzAsImV4cCI6MjA5MDQ2MTQ3MH0.UWfkWvOh4qMDEcByVL-KZ6ejJ80V7wJlDOFH76TywaI"
window.db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

function goTo(i){
currentPage=i
let pages=document.getElementById("pages")
if(pages)pages.style.transform="translateX(-"+(i*100)+"%)"

b.classList.toggle("active",idx===i)
})

if(i===1)render()
}

function fData(d){
if(!d)return "-"
let x=d.split("T")[0].split("-")
return x[2]+"/"+x[1]
}

/* LOGIN */
async function login(){
let usuario=(user.value||"").trim().toLowerCase()
let senha=(pass.value||"").trim()

if(!usuario||!senha){
alert("Informe usuário e senha")
return
}

let {data,error}=await db
.from("usuarios")
.select("*")
.ilike("usuario_apelido",usuario)

if(error){
console.error(error)
alert("Erro conexão")
return
}

if(!data || !data.length){
alert("Usuário não encontrado")
return
}

let userDB=data.find(u=>u.usuario_apelido.toLowerCase().trim()===usuario)

if(!userDB){
alert("Usuário não encontrado")
return
}

if(userDB.senha_hash!==senha){
alert("Senha incorreta")
return
}

localStorage.setItem("empresa",userDB.empresa_id)
localStorage.setItem("usuario_id",userDB.id)

init()
}

function abrirCadastro(){
alert("Cadastro em breve")
}

/* INIT */
async function init(){
document.getElementById("menuHome")?.remove()
document.body.classList.remove("login")
telaLogin.style.display="none"

async function carregarTudo(){
let emp=EMP()
let uid=UID()
if(!emp)return console.error("sem empresa")

let elMotoristas=document.getElementById("listaMotoristas")
let elPostos=document.getElementById("listaPostos")
let elVeiculos=document.getElementById("listaVeiculos")
let selMotorista=document.getElementById("v_motorista")
let selPosto=document.getElementById("postoSel")
let selVeiculo=document.getElementById("veiculoSel")

/* ========================= */
/* 🔥 MOTORISTAS */
/* ========================= */
let qMotoristas=db.from("motoristas").select("*").eq("empresa_id",emp)
if(uid)qMotoristas=qMotoristas.eq("usuario_id",uid)
let {data:motoristas,error:e1}=await qMotoristas
if(e1){console.error("motoristas erro:",e1);motoristas=[]}
motoristas=motoristas||[]

let mapMotoristas={}
motoristas.forEach(x=>mapMotoristas[x.id]=x.nome)

if(elMotoristas){
elMotoristas.innerHTML=motoristas.length
?motoristas.map(x=>`<div class="item">
<div class="itemContent">
<div><b>${x.nome||"-"}</b></div>
<div style="font-size:11px;color:#94a3b8">
CNH: ${x.cnh||"-"} | Tel: ${x.telefone||"-"}
</div>
<div style="font-size:11px;color:#94a3b8">
Email: ${x.email||"-"}
</div>
</div>
</div>`).join("")
:`<div class="item">Nenhum motorista</div>`
}

if(selMotorista){
selMotorista.innerHTML=motoristas.length
?motoristas.map(x=>`<option value="${x.id}">${x.nome}</option>`).join("")
:`<option value="">Sem motoristas</option>`
}

/* ========================= */
/* 🔥 POSTOS */
/* ========================= */
let qPostos=db.from("postos").select("*").eq("empresa_id",emp)
let {data:postos,error:e2}=await qPostos
if(e2){console.error("postos erro:",e2);postos=[]}
postos=postos||[]

if(elPostos){
elPostos.innerHTML=postos.length
?postos.map(x=>`<div class="item"><b>${x.nome_posto||"-"}</b></div>`).join("")
:`<div class="item">Nenhum posto</div>`
}

if(selPosto){
selPosto.innerHTML=postos.length
?postos.map(x=>`<option value="${x.id}">${x.nome_posto}</option>`).join("")
:`<option value="">Sem postos</option>`
}

/* ========================= */
/* 🔥 VEÍCULOS */
/* ========================= */
let qVeiculos=db.from("veiculos").select("*").eq("empresa_id",emp)
if(uid)qVeiculos=qVeiculos.eq("usuario_id",uid)
let {data:veiculos,error:e3}=await qVeiculos
if(e3){console.error("veiculos erro:",e3);veiculos=[]}
veiculos=veiculos||[]

if(selVeiculo){
if(veiculos.length){
selVeiculo.innerHTML=veiculos.map(x=>`<option value="${x.id}">${x.modelo||x.placa||"Veículo"}</option>`).join("")
if(!VID||!veiculos.find(v=>v.id===VID)){
VID=veiculos[0].id
}
selVeiculo.value=VID
}else{
selVeiculo.innerHTML=`<option value="">Sem veículo</option>`
VID=null
}
}

if(elVeiculos){
elVeiculos.innerHTML=veiculos.length
?veiculos.map(x=>`<div class="item"><div class="itemContent"><b>${x.modelo||"-"}</b> | ${x.placa||"-"}</div></div>`).join("")
:`<div class="item">Nenhum veículo</div>`
}

/* 🔥 BIND SELECT VEÍCULO */
if(selVeiculo&&!selVeiculo._bind){
selVeiculo.addEventListener("change",()=>{
VID=selVeiculo.value
render()
})
selVeiculo._bind=true
}

/* 🔥 NÃO CRIAR AUTOMÁTICO */
if(!veiculos.length){
console.warn("⚠️ Nenhum veículo cadastrado")
VID=null
return
}

/* 🔥 RENDER FINAL */
if(VID){
setTimeout(()=>render(),50)
}
}

async function salvar(){
let emp=EMP()
let uid=UID()
if(!emp||!uid)return alert("Sessão inválida")
if(!VID)return alert("Selecione veículo")

let v_total=parseFloat(valor.value)||0
let v_litros=parseFloat(litros.value)||0
let v_km=parseFloat(km.value)||0
let v_data=data.value

if(!v_data)return alert("Informe data")
if(v_total<=0)return alert("Valor inválido")
if(v_litros<=0)return alert("Litros inválido")

let v_valorLitro=v_litros>0?(v_total/v_litros):0

/* 🔥 MONTA OBJETO LIMPO */
let payload={
empresa_id:emp,
veiculo_id:VID,
valor_total:v_total,
litros:v_litros,
quilometragem:v_km,
data_abastecimento:v_data
}

/* 🔥 CAMPOS OPCIONAIS (SÓ ENVIA SE EXISTIR) */
if(uid)payload.usuario_id=uid
if(postoSel && postoSel.value)payload.posto_id=postoSel.value
if(v_valorLitro)payload.valor_litro=v_valorLitro
if(tanque && tanque.value)payload.tanque=tanque.value

console.log("📦 INSERT:",payload)

/* 🔥 EXECUTA */
let {error}=await db.from("abastecimentos").insert(payload)

if(error){
console.error("❌ ERRO SUPABASE:",error)
alert("Erro ao salvar: "+error.message)
return
}

alert("✅ Salvo com sucesso")

valor.value=""
litros.value=""
km.value=""

render()
}

/* 🔥 RENDER PRINCIPAL */
async function render(){
if(!db)return
let vs=document.getElementById("veiculoSel")
if(vs&&vs.value)VID=vs.value
if(!VID)return
let listaEl=document.getElementById("lista")
let {data,error}=await db.from("abastecimentos").select("*,postos(nome_posto)").eq("veiculo_id",VID).eq("empresa_id",EMP()).order("data_abastecimento",{ascending:false})
if(error){listaEl.innerHTML="Erro";return}
if(!data||!data.length){
listaEl.innerHTML="<div class='item'>Sem histórico</div>"
renderDashboard([])
return
}
listaEl.innerHTML=data.map(a=>{
let valor=Number(a.valor_total||0)
let litros=Number(a.litros||0)
let km=Number(a.quilometragem||0)
return `<div class="item"><div class="itemContent"><div><b>${fData(a.data_abastecimento)}</b> | ${a.postos?.nome_posto||"-"}</div><div style="font-size:11px;color:#94a3b8">R$ ${valor.toFixed(2)} | ${litros}L | KM ${km}</div></div></div>`
}).join("")
renderDashboard(data)
}

/* 🔥 INDICADORES */
function calcularIndicadores(lista){
if(!lista.length)return null
let totalGasto=0,totalLitros=0,totalKm=0,consumos=[]
for(let i=0;i<lista.length;i++){
let a=lista[i]
let b=lista[i+1]
totalGasto+=Number(a.valor_total||0)
totalLitros+=Number(a.litros||0)
if(b){
let km=a.quilometragem-b.quilometragem
if(km>0&&a.litros>0){
let c=km/a.litros
consumos.push(c)
totalKm+=km
}
}
}
let media=consumos.length?consumos.reduce((x,y)=>x+y)/consumos.length:0
return{
totalGasto,
totalLitros,
mediaConsumo:media,
melhor:Math.max(...consumos,0),
pior:Math.min(...consumos,0),
custoKm:totalKm?totalGasto/totalKm:0,
totalAbastecimentos:lista.length
}
}

/* 🔥 DASHBOARD */
function renderDashboard(lista){
if(!Array.isArray(lista))return
let dados=[...lista]
if(filtroInicio)dados=dados.filter(x=>x.data_abastecimento>=filtroInicio)
if(filtroFim)dados=dados.filter(x=>x.data_abastecimento<=filtroFim)
if(!dados.length)return
dados=dados.sort((a,b)=>new Date(a.data_abastecimento)-new Date(b.data_abastecimento))
let labels=dados.map(x=>fData(x.data_abastecimento))
let consumo=[null]
for(let i=1;i<dados.length;i++){
let a=dados[i],b=dados[i-1]
let km=a.quilometragem-b.quilometragem
if(km>0&&a.litros>0)consumo.push(km/a.litros);else consumo.push(null)
}
let total=dados.map(x=>Number(x.valor_total||0))
let litrosArr=dados.map(x=>Number(x.litros||0))
let dataset=consumo
if(tipoGrafico==="total")dataset=total
if(tipoGrafico==="litros")dataset=litrosArr
if(graficoConsumo)graficoConsumo.destroy()
graficoConsumo=new Chart(graficoConsumoEl,{
type:"line",
data:{labels,datasets:[{data:dataset,borderWidth:2}]},
options:{responsive:true}
})
let ind=calcularIndicadores(dados)
renderKPIs(ind)
}

/* =========================================================
🔥 EXTRAÇÃO INTELIGENTE
========================================================= */
function extrairDadosIA(text){
if(!text)return{}
text=text.replace(/\r/g,"\n").toLowerCase()
let num=v=>v?v.replace(/\./g,"").replace(",","."):""
let dados={}
dados.cnpj=(text.match(/\d{2}\.\d{3}\.\d{3}\/\d{4}\-\d{2}/)||[])[0]||(text.match(/\d{14}/)||[])[0]||""
let total=text.match(/total\s*(r\$)?\s*([\d\.,]+)/)
dados.total=total?num(total[2]):""
let litros=text.match(/([\d\.,]+)\s*(l|litros)/)
dados.litros=litros?num(litros[1]):""
let vl=text.match(/([\d\.,]+)\s*(\/l|litro)/)
dados.valor_litro=vl?num(vl[1]):""
let km=text.match(/km[\s:]*([\d]{3,7})/)
dados.km=km?km[1]:""
if(text.includes("aditivada"))dados.combustivel="Gasolina Aditivada"
else if(text.includes("gasolina"))dados.combustivel="Gasolina Comum"
else if(text.includes("etanol")||text.includes("alcool"))dados.combustivel="Álcool"
else if(text.includes("diesel"))dados.combustivel="Diesel"
else if(text.includes("gnv"))dados.combustivel="GNV"
else dados.combustivel="Gasolina Comum"
if(!dados.total&&!dados.litros)return null
return dados
}

/* =========================================================
🔥 AUTO RECORTE
========================================================= */
async function autoRecorteCupom(src){
return new Promise(resolve=>{
let img=new Image()
img.onload=()=>{
let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")
canvas.width=img.width
canvas.height=img.height
ctx.drawImage(img,0,0)
let imageData=ctx.getImageData(0,0,canvas.width,canvas.height)
let data=imageData.data
for(let i=0;i<data.length;i+=4){
let avg=(data[i]+data[i+1]+data[i+2])/3
let val=avg>160?255:0
data[i]=val;data[i+1]=val;data[i+2]=val
}
ctx.putImageData(imageData,0,0)
resolve(canvas.toDataURL())
}
img.src=src
})
}

function analisarAbastecimentos(lista){
if(!lista||lista.length<2)return null
let dados=[...lista].sort((a,b)=>new Date(b.data_abastecimento)-new Date(a.data_abastecimento))
let alertas=[]
let sugestoes=[]
let consumos=[]
for(let i=0;i<dados.length-1;i++){
let a=dados[i]
let b=dados[i+1]
let kmA=Number(a.quilometragem||0)
let kmB=Number(b.quilometragem||0)
let litros=Number(a.litros||0)
let valor=Number(a.valor_total||0)
let kmRodado=kmA-kmB
if(a.tanque==="cheio"&&b.tanque==="cheio"&&kmRodado>0&&litros>0){
let consumo=kmRodado/litros
consumos.push(consumo)
if(consumo<5)alertas.push("⚠️ Consumo muito baixo")
if(consumo>20)alertas.push("⚠️ Consumo muito alto")
}
let preco=litros>0?valor/litros:0
if(preco>10)alertas.push("⚠️ Preço combustível alto")
if(preco<2)alertas.push("⚠️ Preço suspeito")
if(kmRodado<0)alertas.push("🚨 KM inconsistente")
}
let media=consumos.length?consumos.reduce((a,b)=>a+b,0)/consumos.length:0
let ultimo=consumos[0]||0
if(ultimo<media*0.8)sugestoes.push("🔻 Consumo piorou")
if(ultimo>media*1.2)sugestoes.push("🔺 Consumo melhorou")
return{alertas,sugestoes,media,ultimo}
}

function calcularAutonomia(lista){
if(!Array.isArray(lista)||lista.length<2)return null
let dados=[...lista].sort((a,b)=>new Date(b.data_abastecimento)-new Date(a.data_abastecimento))
let consumos=[]
for(let i=0;i<dados.length-1;i++){
let a=dados[i],b=dados[i+1]
if(a.tanque!=="cheio"||b.tanque!=="cheio")continue
let kmA=Number(a.quilometragem||0)
let kmB=Number(b.quilometragem||0)
let litros=Number(a.litros||0)
let rodado=kmA-kmB
if(rodado>0&&litros>0)consumos.push(rodado/litros)
}
if(!consumos.length)return null
let media=consumos.reduce((x,y)=>x+y)/consumos.length
let capacidade=60
let autonomia=media*capacidade
return{media,autonomia}
}

function melhorPosto(lista){
let mapa={}
lista.forEach(x=>{
let nome=x.postos?.nome_posto||"Desconhecido"
let litros=Number(x.litros||0)
let valor=Number(x.valor_total||0)
if(!mapa[nome])mapa[nome]={litros:0,valor:0}
mapa[nome].litros+=litros
mapa[nome].valor+=valor
})
let melhor=null,menor=999
Object.keys(mapa).forEach(p=>{
let media=mapa[p].valor/mapa[p].litros
if(media<menor){menor=media;melhor=p}
})
return{posto:melhor,preco:menor}
}

function renderIA(lista){
let el=document.getElementById("iaBox")
if(!el)return
let analise=analisarAbastecimentos(lista)
if(!analise){el.style.display="none";return}
el.style.display="block"
el.innerHTML=`<div style="font-weight:bold">🤖 IA Veículo</div>
<div style="font-size:12px">Média: ${analise.media.toFixed(2)} km/l | Último: ${analise.ultimo.toFixed(2)}</div>
${analise.alertas.map(a=>`<div style="color:#f59e0b;font-size:12px">${a}</div>`).join("")}
${analise.sugestoes.map(s=>`<div style="color:#22c55e;font-size:12px">${s}</div>`).join("")}`
let auto=calcularAutonomia(lista)
if(auto){
el.innerHTML+=`<div style="font-size:12px">🚗 Autonomia: ${auto.autonomia.toFixed(0)} km</div>`
}
let mp=melhorPosto(lista)
if(mp&&mp.posto){
el.innerHTML+=`<div style="font-size:12px">🏪 Melhor posto: ${mp.posto} (R$ ${mp.preco.toFixed(2)}/L)</div>`
}
}

/* 🔥 VALIDAÇÃO AVANÇADA */
function validarAbastecimentoAvancado(){
let v=parseFloat(valor.value)||0
let l=parseFloat(litros.value)||0
let kmAtual=parseFloat(km.value)||0
if(v<=0||l<=0)return
let preco=v/l
if(preco>10||preco<2)alert("⚠️ Valor/L suspeito")
if(l>120)alert("⚠️ Litros muito alto")
if(kmAtual<1000)alert("⚠️ KM baixo")
}

/* 🔥 EVENTOS AUTOMÁTICOS */
document.addEventListener("DOMContentLoaded",()=>{
document.body.classList.add("login")
window.graficoConsumoEl=document.getElementById("graficoConsumo")
window.graficoGastoEl=document.getElementById("graficoGasto")
let inputData=document.getElementById("data")
if(inputData&&!inputData.value){
let hoje=new Date()
let offset=hoje.getTimezoneOffset()
hoje=new Date(hoje.getTime()-offset*60000)
inputData.value=hoje.toISOString().slice(0,10)
}
if(typeof initCNPJAuto==="function")initCNPJAuto()
if(EMP()){
document.body.classList.remove("login")
init()
}
})

window.addEventListener("load",()=>{
if(window.Tesseract){console.log("OCR OK")}else{console.warn("OCR FAIL")}
})

/* 🔥 DASH TOGGLE */
function toggleDash(){
let el=document.getElementById("dashContent")
let icon=document.getElementById("dashIcon")
if(!el)return
if(el.style.display==="none"){
el.style.display="block"
icon.innerText="⬇️"
}else{
el.style.display="none"
icon.innerText="⬆️"
}
}

/* 🔥 FILTRO */
function aplicarFiltro(){
filtroInicio=document.getElementById("filtroInicio").value||null
filtroFim=document.getElementById("filtroFim").value||null
render()
}
function carregarSelectsPadrao(){

if(vs&&vs.options.length){
VID=vs.value
}
let ps=document.getElementById("postoSel")
if(ps&&ps.options.length){
ps.value=ps.options[0].value
}
}
function trocarGrafico(tipo){
tipoGrafico=tipo||"consumo"
render()
}
