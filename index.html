<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fleet Audit Neto V3 - Perícia</title>
<link rel="icon" href="data:,">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
:root{--bg:#0f172a;--card:#1e293b;--accent:#22c55e;--danger:#ef4444;--border:#334155;--text:#f8fafc;}
body{margin:0;font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
.container{max-width:1400px;margin:0 auto;padding:20px;}
.card{background:var(--card);padding:20px;border-radius:12px;box-shadow:0 10px 15px -3px rgba(0,0,0,0.5);border:1px solid var(--border);margin-bottom:20px;}
h1,h2{color:var(--accent);text-align:center;}
input,select,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid var(--border);background:#0f172a;color:#fff;font-size:16px;}
button{background:var(--accent);color:#000;font-weight:bold;cursor:pointer;border:none;}
button:hover{opacity:0.9;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.kpi-val{font-size:2.5em;font-weight:bold;color:var(--accent);display:block;}
.shake-red{animation:shake 0.8s infinite;border-left:5px solid var(--danger);background:rgba(239,68,68,0.1);}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.tabs{display:flex;gap:10px;margin-bottom:20px;overflow-x:auto;}
.tab-btn{flex:1;background:var(--card);min-width:150px;}
.tab-btn.active{background:var(--accent);color:#000;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{padding:12px;text-align:left;border-bottom:1px solid var(--border);}
th{background:var(--border);color:var(--accent);}
#login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,0.98);z-index:9999;display:flex;justify-content:center;align-items:center;}
.login-box{width:350px;text-align:center;}
#video{width:100%;max-width:400px;border-radius:10px;border:2px solid var(--accent);display:none;}
</style>
</head>
<body>
<div id="login-screen">
<div class="login-box card">
<h2>🚗 Fleet Audit Neto</h2>
<input type="text" id="user" placeholder="Usuário (neto)">
<input type="password" id="pass" placeholder="Senha (1234)">
<button onclick="login()">Acessar Auditoria</button>
<p style="font-size:12px;color:#94a3b8;margin-top:15px;">PIX: 69 984311978 - R$ 48,00/ano</p>
</div>
</div>
<div id="app" style="display:none;" class="container">
<header class="card">
<h1>Dashboard Fleet Audit Neto - V3</h1>
<p style="text-align:center;">Assinatura ativa até: <strong>31/05/2027</strong></p>
</header>
<div class="kpi-grid">
<div class="card">Km/L Médio <span id="kpi-kml" class="kpi-val">--</span></div>
<div class="card">Custo/Km Médio <span id="kpi-custokm" class="kpi-val">--</span></div>
<div class="card">Gasto Total <span id="kpi-total" class="kpi-val">--</span></div>
</div>
<div class="card"><canvas id="mainChart" height="300"></canvas></div>
<div class="tabs">
<button class="tab-btn active" onclick="showTab('tab-abast')">Abastecimentos</button>
<button class="tab-btn" onclick="showTab('tab-veic')">Veículos</button>
<button class="tab-btn" onclick="showTab('tab-ia')">Módulo IA (OCR/QR)</button>
</div>
<div id="tab-abast" class="tab-content">
<div class="card">
<h3>Novo Abastecimento</h3>
<input type="date" id="abast-data">
<select id="sel-veic"></select>
<input type="number" id="abast-km" placeholder="Km Atual">
<input type="number" id="abast-litros" placeholder="Litros" step="0.01">
<input type="number" id="abast-custo" placeholder="Valor Total (R$)" step="0.01">
<button onclick="salvarAbastecimento()">Salvar Registro</button>
</div>
<table id="tbl-abast"><thead><tr><th>Data</th><th>Veículo</th><th>Km</th><th>Km/L</th><th>Custo/Km</th><th>Total</th></tr></thead><tbody></tbody></table>
</div>
<div id="tab-veic" class="tab-content" style="display:none;">
<table id="tbl-veic"><thead><tr><th>ID</th><th>Placa</th><th>Modelo</th><th>Último Km</th></tr></thead><tbody></tbody></table>
</div>
<div id="tab-ia" class="tab-content" style="display:none;">
<div class="card">
<h3>OCR - Recibo Fiscal</h3>
<input type="file" id="ocr-file" accept="image/*" onchange="processarOCR(event)">
<p id="ocr-status"></p>
</div>
<div class="card">
<h3>QR Code - Ativos</h3>
<button onclick="iniciarQR()">Abrir Scanner</button>
<video id="video" playsinline></video>
<p id="qr-result"></p>
</div>
</div>
</div>
<script>
let data = {
veiculos: [{id:'58fdc6af-0156-40b7-a628-4799ffab108a', placa:'TIGGO8', modelo:'Chery Tiggo 8', km: 0}],
abastecimentos: [],
config: {vencimento: '2027-05-31'}
};
let chart;
function login() {
const u = document.getElementById('user').value;
const p = document.getElementById('pass').value;
if(u === 'neto' && p === '1234') {
const v = new Date(data.config.vencimento);
if(new Date() > v) { return alert('Assinatura Expirada!'); }
document.getElementById('login-screen').style.display = 'none';
document.getElementById('app').style.display = 'block';
init();
} else { alert('Credenciais Inválidas'); }
}
function init() {
renderTables();
updateDash();
renderChart();
popularSelect();
}
function popularSelect() {
const s = document.getElementById('sel-veic');
s.innerHTML = data.veiculos.map(v => `<option value="${v.id}">${v.placa}</option>`).join('');
}
function salvarAbastecimento() {
const vid = document.getElementById('sel-veic').value;
const km = parseFloat(document.getElementById('abast-km').value);
const lit = parseFloat(document.getElementById('abast-litros').value);
const val = parseFloat(document.getElementById('abast-custo').value);
const dat = document.getElementById('abast-data').value;
const vObj = data.veiculos.find(v => v.id === vid);
const kmAnt = vObj.km;
if(km <= kmAnt) { return alert('Erro: Km atual menor que anterior!'); }
const kml = (km - kmAnt) / lit;
const ckm = val / (km - kmAnt);
data.abastecimentos.push({data: dat, veic: vObj.placa, km: km, kml: kml, ckm: ckm, total: val});
vObj.km = km;
init();
}
function updateDash() {
const totalVal = data.abastecimentos.reduce((s, a) => s + a.total, 0);
const avgKml = data.abastecimentos.length ? data.abastecimentos.reduce((s, a) => s + a.kml, 0) / data.abastecimentos.length : 0;
const avgCkm = data.abastecimentos.length ? data.abastecimentos.reduce((s, a) => s + a.ckm, 0) / data.abastecimentos.length : 0;
document.getElementById('kpi-total').innerText = 'R$ ' + totalVal.toFixed(2);
document.getElementById('kpi-kml').innerText = avgKml.toFixed(2);
document.getElementById('kpi-custokm').innerText = 'R$ ' + avgCkm.toFixed(3);
if(avgKml > 0 && avgKml < 8) { document.getElementById('kpi-kml').parentElement.classList.add('shake-red'); }
else { document.getElementById('kpi-kml').parentElement.classList.remove('shake-red'); }
}
function renderTables() {
const b = document.querySelector('#tbl-abast tbody');
b.innerHTML = data.abastecimentos.map(a => `<tr class="${a.kml < 8 ? 'shake-red' : ''}"><td>${a.data}</td><td>${a.veic}</td><td>${a.km}</td><td>${a.kml.toFixed(2)}</td><td>R$ ${a.ckm.toFixed(3)}</td><td>R$ ${a.total.toFixed(2)}</td></tr>`).join('');
const bv = document.querySelector('#tbl-veic tbody');
bv.innerHTML = data.veiculos.map(v => `<tr><td>${v.id}</td><td>${v.placa}</td><td>${v.modelo}</td><td>${v.km}</td></tr>`).join('');
}
function renderChart() {
const ctx = document.getElementById('mainChart').getContext('2d');
if(chart) chart.destroy();
chart = new Chart(ctx, {
type: 'bar',
data: {
labels: data.abastecimentos.map(a => a.data),
datasets: [{label: 'Custo R$', data: data.abastecimentos.map(a => a.total), backgroundColor: '#22c55e'}]
},
options: { responsive: true, scales: { y: { beginAtZero: true } } }
});
}
function showTab(id) {
document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
document.getElementById(id).style.display = 'block';
event.target.classList.add('active');
}
async function processarOCR(event) {
const file = event.target.files[0];
document.getElementById('ocr-status').innerText = 'Lendo cupom...';
const res = await Tesseract.recognize(file, 'por');
document.getElementById('ocr-status').innerText = 'Concluído!';
const text = res.data.text;
const lMatch = text.match(/(\d+[,.]\d+)\s*(litros|l)/i);
const vMatch = text.match(/(r\$|total)\s*(\d+[,.]\d+)/i);
if(lMatch) document.getElementById('abast-litros').value = lMatch[1].replace(',', '.');
if(vMatch) document.getElementById('abast-custo').value = vMatch[1].replace(',', '.');
}
function iniciarQR() {
const v = document.getElementById('video');
v.style.display = 'block';
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(s => {
v.srcObject = s;
requestAnimationFrame(scanQR);
});
}
function scanQR() {
const v = document.getElementById('video');
if(v.readyState === v.HAVE_ENOUGH_DATA) {
const canvas = document.createElement('canvas');
canvas.width = v.videoWidth; canvas.height = v.videoHeight;
const ctx = canvas.getContext('2d');
ctx.drawImage(v, 0, 0);
const img = ctx.getImageData(0,0, canvas.width, canvas.height);
const code = jsQR(img.data, img.width, img.height);
if(code) {
document.getElementById('qr-result').innerText = 'Ativo ID: ' + code.data;
document.getElementById('sel-veic').value = code.data;
v.srcObject.getTracks().forEach(t => t.stop());
v.style.display = 'none';
}
}
if(v.srcObject) requestAnimationFrame(scanQR);
}
</script>
</body>
</html>
