<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">
<link rel="icon" href="img/192x192.png">
<!-- 🍎 APPLE (IPHONE) -->
<link rel="apple-touch-icon" href="img/192x192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>IA Frota Master</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5"></script>

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.container{max-width:720px;margin:auto;padding:10px}
.card{background:#0b1220;padding:12px;border-radius:12px;margin-top:10px}
input,select{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:none;background:#020617;color:#fff}
button{width:100%;padding:12px;margin-top:6px;border:none;border-radius:10px;background:#22c55e;color:#000;font-weight:bold}
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.item{background:#111827;padding:8px;border-radius:8px;margin-top:6px;font-size:12px}
.row{display:flex;justify-content:space-between}
.alerta{color:#f87171;font-weight:bold}
#telaLogin{background:url("img/bancocomunicaveiculos.png") no-repeat center center fixed;background-size:cover;}
#telaLogin::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(2,6,23,0.75);z-index:0;}
#loginBox{position:relative;z-index:1;}
/* ===== CENTRALIZA NA TELA ===== */
.login-container{display:flex;justify-content:center;align-items:center;height:100vh;}
#telaLogin{display:flex;justify-content:center;align-items:center;height:100vh;width:100%;}

  
</style>
</head>
<body>

<div id="telaLogin" class="login-container">
<div id="loginBox">
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>
</div>

<div id="app" class="container" style="display:none">

<div class="card">
<select id="veiculoSel"></select>
</div>

<div class="card kpi" id="kpi"></div>
<div id="alerta" class="alerta"></div>

<div class="card">
<h3>📷 OCR Cupom</h3>
<video id="video" autoplay style="display:none"></video>
<button onclick="capturar()">Capturar</button>
<canvas id="canvas"></canvas>
<div id="ocr"></div>
<button onclick="toggleManual()">Manual</button>
<div id="manualBox" style="display:none">
<input id="m_valor" placeholder="Valor">
<input id="m_litros" placeholder="Litros">
<input id="m_tipo" placeholder="Combustível">
<input id="m_posto" placeholder="Posto">
<select id="m_tanque">
<option value="cheio">Tanque Cheio</option>
<option value="parcial">Parcial</option>
</select>
<button onclick="usarManual()">Aplicar</button>
</div>
</div>

<div class="card">
<h3>⛽ Abastecimento</h3>
<input id="valor">
<input id="litros">
<input id="km">
<select id="tanque">
<option value="cheio">Tanque Cheio</option>
<option value="parcial">Parcial</option>
</select>
<button onclick="salvar()">Salvar</button>
</div>

<div class="card">
<canvas id="grafico"></canvas>
</div>

<div class="card">
<h3>Histórico Completo</h3>
<div id="lista"></div>
</div>

</div>

<script>
const db=supabase.createClient("https://gspdlrenyrzbkxlvyugc.supabase.co","sb_publishable_MQRr8O1saGmGz3nsMg1g-Q_8ZIK6yrw")
let VID=null,chart=null,stream=null,dadosOCR=null
function hojeISO(){const d=new Date();const l=new Date(d.getTime()-d.getTimezoneOffset()*60000);return l.toISOString().slice(0,10)}
function brData(d){
if(!d)return"-"
let data=d.split("T")[0]
const[y,m,dd]=data.split("-")
return`${dd}/${m}/${y.slice(2)}`
}
function safe(v){return v===undefined||v===null||v===""?"-":v}
function moeda(v){return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function parse(v){return parseFloat((v||"0").replace(/\./g,"").replace(",", "."))}
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}

async function login(){
const{data}=await db.from("usuarios").select("*").eq("usuario_apelido",user.value.toLowerCase())
if(!data||!data.length)return alert("Erro")
if(data[0].senha_hash!==pass.value)return alert("Senha")
localStorage.setItem("empresa",data[0].empresa_id)
loginBox.style.display="none"
app.style.display="block"
init()
mostrarApp()
}
function mostrarLogin(){
document.body.classList.add("login")
document.getElementById("telaLogin").style.display="flex"
document.getElementById("app").style.display="none"
}

function mostrarApp(){
document.body.classList.remove("login")
document.getElementById("telaLogin").style.display="none"
document.getElementById("app").style.display="block"
}
async function init(){
let{data}=await db.from("veiculos").select("*").eq("empresa_id",localStorage.getItem("empresa"))
veiculoSel.innerHTML=data.map(v=>`<option value="${v.id}">${v.modelo}</option>`).join("")
VID=data[0].id
const uid=localStorage.getItem("uid")
if(!uid){
mostrarLogin()
return
}else{
mostrarApp()
}
render()
}
async function capturar(){
stream=await navigator.mediaDevices.getUserMedia({video:true})
video.srcObject=stream
video.style.display="block"
await new Promise(r=>setTimeout(r,1500))
const ctx=canvas.getContext("2d")
canvas.width=video.videoWidth
canvas.height=video.videoHeight
ctx.drawImage(video,0,0)
const{data:{text}}=await Tesseract.recognize(canvas,"por")
dadosOCR=extrair(text)
ocr.innerHTML=`Valor:${dadosOCR.valor} Litros:${dadosOCR.litros}`
valor.value=dadosOCR.valor
litros.value=dadosOCR.litros
if(dadosOCR.cnpjLimpo){
const info=await buscarCNPJ(dadosOCR.cnpjLimpo)
if(info){
dadosOCR.posto=info.fantasia||info.nome
dadosOCR.cidade=info.cidade
dadosOCR.uf=info.uf
dadosOCR.endereco=info.endereco
dadosOCR.bairro=info.bairro
}
}
}
function extrair(txt){
txt=txt.toUpperCase().replace(/\s+/g," ")
let valores=[...txt.matchAll(/\d{1,3}(\.\d{3})*,\d{2}/g)]
let valor=valores.length?Math.max(...valores.map(v=>parse(v[0]))):0
let l=txt.match(/(\d+,\d{3})\s*L/)
let litros=l?parseFloat(l[1].replace(",", ".")):0
let cnpjMatch=txt.match(/\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}/)
let cnpj=cnpjMatch?cnpjMatch[0]:null
let cnpjLimpo=cnpj?cnpj.replace(/\D/g,""):null
return{valor,litros,cnpj,cnpjLimpo}
}
function toggleManual(){
manualBox.style.display=manualBox.style.display==="none"?"block":"none"
}
function usarManual(){
valor.value=parse(m_valor.value)
litros.value=parseFloat(m_litros.value)
dadosOCR={tipo:m_tipo.value,posto:m_posto.value}
}
async function salvar(){
const v=parse(valor.value)
const l=parseFloat(litros.value)
const k=parseFloat(km.value)
const vl=v/l
await db.from("abastecimentos").insert({
empresa_id:localStorage.getItem("empresa"),
veiculo_id:VID,
valor_total:v,
litros:l,
quilometragem:k,
valor_litro:(l>0?(v/l):0),
tanque:tanque.value,
posto:dadosOCR?.posto||"",
cidade:dadosOCR?.cidade||"",
uf:dadosOCR?.uf||"",
cnpj:dadosOCR?.cnpj||"",
endereco:dadosOCR?.endereco||"",
bairro:dadosOCR?.bairro||"",
tipo_combustivel:dadosOCR?.tipo||"",
data_abastecimento:hojeISO()
})
render()
}
function IA(data){
let consumo=[],fraude=0,totalKm=0,totalValor=0
for(let i=1;i<data.length;i++){
let km=data[i].quilometragem-data[i-1].quilometragem
let l=data[i].litros
if(km>0&&l>0){
let c=km/l
if(data[i].tanque==="cheio")consumo.push(c)
if(c<4||c>15)fraude++
totalKm+=km
totalValor+=data[i].valor_total
}
}
let media=consumo.length?consumo.reduce((a,b)=>a+b,0)/consumo.length:0
return{media,custo:totalKm?totalValor/totalKm:0,fraude}
}
async function buscarCNPJ(cnpj){
try{
let limpo=cnpj.replace(/\D/g,"")
/* 🔥 1. BUSCA NO SEU BANCO (PRIORIDADE) */
let {data}=await db.from("postos").select("*").eq("cnpj",limpo).limit(1)
if(data&&data.length){
return{
nome:data[0].nome_posto||"",
fantasia:data[0].nome_posto||"",
cidade:data[0].cidade||"",
uf:data[0].uf||"",
endereco:data[0].endereco||"",
bairro:data[0].bairro||"",
cep:data[0].cep||""
}
}
/* 🔥 2. FALLBACK: API EXTERNA */
const res=await fetch("https://brasilapi.com.br/api/cnpj/v1/"+limpo)
if(!res.ok)throw new Error()
const api=await res.json()
/* 🔥 3. SALVA NO SEU BANCO (AUTO-APRENDIZADO) */
await db.from("postos").insert({
cnpj:limpo,
nome_posto:api.nome_fantasia||api.razao_social||"",
cidade:api.municipio||"",
uf:api.uf||"",
endereco:api.logradouro||"",
bairro:api.bairro||"",
cep:api.cep||"",
situacao:"Ativa"
})
return{
nome:api.razao_social||"",
fantasia:api.nome_fantasia||"",
cidade:api.municipio||"",
uf:api.uf||"",
endereco:api.logradouro||"",
bairro:api.bairro||"",
cep:api.cep||""
}
}catch(e){
console.warn("Erro CNPJ:",e)
return null
}
}
async function render(){
let{data}=await db.from("abastecimentos").select("*").eq("veiculo_id",VID)
lista.innerHTML=""
data.forEach(a=>{
lista.innerHTML+=`
<div class="item">
<div class="row"><span>${brData(a.data_abastecimento)}</span><span>${safe(a.quilometragem)} km</span></div>
<div class="row"><span>${safe(a.litros)} L</span><span>${moeda(a.valor_total)}</span></div>
<div class="row"><span>${safe(a.tipo_combustivel)}</span><span>${safe(a.tanque)}</span></div>
<div class="row"><span>${safe(a.posto)}</span><span>${safe(a.cidade)}-${safe(a.uf)}</span></div>
<div class="row"><span>${safe(a.cnpj)}</span><span>${a.valor_litro?Number(a.valor_litro).toFixed(2):"-"}/L</span></div>
<div class="row"><span>${safe(a.endereco)}</span><span>${safe(a.bairro)}</span></div>
</div>`
})
let ia=IA(data)
kpi.innerHTML=`
<div>Média ${ia.media.toFixed(2)}</div>
<div>Custo/km ${ia.custo.toFixed(2)}</div>
<div>Fraudes ${ia.fraude}</div>
`
alerta.innerHTML=ia.fraude?"🚨 possível fraude detectada":""
let labels=[],vals=[]
for(let i=1;i<data.length;i++){
let km=data[i].quilometragem-data[i-1].quilometragem
let l=data[i].litros
if(km>0&&l>0){
labels.push(i)
vals.push(km/l)
}
}
if(chart)chart.destroy()
chart=new Chart(grafico,{type:"line",data:{labels,datasets:[{data:vals}]}})
}

</script>

</body>
</html>
