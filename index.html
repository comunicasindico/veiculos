function hojeISO(){const d=new Date();const l=new Date(d.getTime()-d.getTimezoneOffset()*60000);return l.toISOString().slice(0,10)}
function moeda(v){return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function formatarData(d){if(!d)return"-";let s=d.split("T")[0];let[y,m,dd]=s.split("-");return`${dd}-${m}-${y}`}
function verificarExpiracao(){
const exp=localStorage.getItem("expira_em")
const isAdmin=localStorage.getItem("admin")==="1"
if(!isAdmin && exp && new Date(exp)<new Date()){
alert("Plano expirado")
logout()
}
}
function criarConta(){let nome=prompt("Nome da empresa");if(!nome)return;let email=prompt("Email");if(!email)return;let senha=prompt("Senha");if(!senha)return;db.from("usuarios").insert({usuario_apelido:email.toLowerCase(),senha_hash:senha,empresa_id:crypto.randomUUID()}).then(()=>alert("Conta criada! Aguarde liberação PRO."))}

const isAdmin=localStorage.getItem("admin")==="1"
if(!isAdmin)return
let{data,error}=await db.from("usuarios").select("*").order("created_at",{ascending:false})
if(error){console.error(error);return}

let ativo=u.expira_em&&new Date(u.expira_em)>new Date()

<button onclick="ativarPlano('${u.id}')" style="background:#22c55e">Ativar 6 meses R$54,90</button>
</div>`
}).join("")
}
async function ativarPlano(id){let f=new Date();f.setMonth(f.getMonth()+6);await db.from("usuarios").update({expira_em:f.toISOString()}).eq("id",id);carregarAdmin()}
function atualizarStatusPlano(){
const exp=localStorage.getItem("expira_em")
const isAdmin=localStorage.getItem("admin")==="1"
if(isAdmin){
statusPlano.innerHTML="<span class='badgePro'>ADMIN</span>"
return
}
if(!exp)return
let hoje=new Date()
let venc=new Date(exp)
let diff=Math.ceil((venc-hoje)/(1000*60*60*24))
if(venc<hoje){
statusPlano.innerHTML="<div class='alertaExpira'>Plano expirado</div>"
return
}
if(diff<=5){
statusPlano.innerHTML=`<div class='alertaExpira'>Expira em ${diff} dia(s)</div>`
}else{
statusPlano.innerHTML=`<span class='badgePro'>PRO até ${formatarData(exp)}</span>`
}
const box=document.getElementById("boxRenovar")
if(box){
box.style.display=(diff<=5 || venc<hoje)?"block":"none"
}
}

/* LOGIN */
async function login(){
const {data,error}=await db.from("usuarios").select("*").eq("usuario_apelido",user.value.toLowerCase())
if(error){console.error(error);return alert("Erro ao conectar")}
if(!data||!data.length)return alert("Usuário não encontrado")
const u=data[0]
if(u.senha_hash!==pass.value)return alert("Senha incorreta")
if(u.tipo==="admin"){
localStorage.setItem("admin","1")
localStorage.setItem("uid",u.id)
mostrarApp()
abrirTela("admin")
carregarAdmin()
return
}
if(u.expira_em && new Date(u.expira_em)<new Date()){
alert("Plano expirado")
return
}
localStorage.setItem("empresa",u.empresa_id)
localStorage.setItem("uid",u.id)
localStorage.setItem("admin","0")
localStorage.setItem("expira_em",u.expira_em||"")
init()
}

/* INIT */
async function init(){
if(!localStorage.getItem("uid"))return mostrarLogin()
mostrarApp()
verificarExpiracao()
autoCalc("valor","litros","valor_litro")
let empresa=localStorage.getItem("empresa")
let {data}=await db.from("veiculos").select("*")
veiculoSel.innerHTML=(data||[]).map(v=>`<option value="${v.id}">${v.modelo}</option>`).join("")
VID=data?.[0]?.id
carregarCadastros()
render()
}

/* DELETE */
function excluirRegistro(tabela,id){
if(!confirm("Excluir?"))return
db.from(tabela).delete().eq("id",id).then(()=>{carregarCadastros();render()})
}

/* UI */
function mostrarLogin(){telaLogin.style.display="block";app.style.display="none"}
function mostrarApp(){telaLogin.style.display="none";app.style.display="block"}
function abrirTela(t){
document.querySelectorAll(".tela").forEach(e=>e.style.display="none")

const el=document.getElementById("tela_"+t)
if(!el){
console.error("Tela não encontrada:","tela_"+t)
return
}

el.style.display="block"

if(t==="motorista"||t==="veiculo"||t==="posto"){
carregarCadastros()
}

if(t==="combustivel"){
render()
}
}
/* SALVAR ABASTECIMENTO */
async function salvar(){
let v=parseFloat(valor.value)
let l=parseFloat(litros.value)
let k=parseFloat(km.value)
let vl=parseFloat(valor_litro.value)||(v/l)

await db.from("abastecimentos").insert({
empresa_id: localStorage.getItem("empresa") || null,
veiculo_id:VID,
posto_id: (postoSel && postoSel.value && postoSel.value !== "undefined" && postoSel.value !== "null") ? postoSel.value : null,
valor_total:v,
litros:l,
valor_litro:vl,
quilometragem:k,
tanque:tanque.value,
data_abastecimento:data.value||hojeISO()
})

}

/* RENDER */
async function render(){
const exp=localStorage.getItem("expira_em")
const isAdmin=localStorage.getItem("admin")==="1"

if(!isAdmin && exp && new Date(exp)<new Date()){
lista.innerHTML="<div class='alertaExpira'>Plano expirado</div>"
return
}
let empresa=localStorage.getItem("empresa")

let query=db.from("abastecimentos").select(`
id,data_abastecimento,litros,valor_total,valor_litro,quilometragem,tanque,posto_id,
postos(nome_posto),
veiculos(modelo,motorista_id,motoristas(nome))
`)

if(!isAdmin){query=query}

query=query.eq("veiculo_id",VID).order("data_abastecimento",{ascending:false})

let {data:listaDados,error}=await query

if(error){
console.error(error)
lista.innerHTML="Erro ao carregar"
return
}

if(!listaDados||!listaDados.length){
lista.innerHTML="Sem dados"
return
}
if(!window.lista)return
lista.innerHTML=listaDados.map((a,i)=>{
let ant=listaDados[i+1]

let kmRodado=(ant && a.quilometragem && ant.quilometragem)
?(a.quilometragem-ant.quilometragem)
:0

let consumo=(kmRodado>0 && a.litros>0)
?(kmRodado/a.litros).toFixed(2)
:"-"

let valorUnitario=a.valor_litro
?Number(a.valor_litro).toLocaleString("pt-BR",{minimumFractionDigits:3})
:(a.valor_total && a.litros)
?Number(a.valor_total/a.litros).toLocaleString("pt-BR",{minimumFractionDigits:3})
:"-"

return `<div class="item">
<div class="row"><span>Data</span><span>${formatarData(a.data_abastecimento)}</span></div>
<div class="row"><span>Posto</span><span>${a.postos?.nome_posto||"POSTO NÃO IDENTIFICADO"}</span></div>
<div class="row"><span>Litros</span><span>${a.litros}</span></div>
<div class="row"><span>Valor Unitário</span><span>${valorUnitario}</span></div>
<div class="row"><span>Total</span><span>${moeda(a.valor_total)}</span></div>
<div class="row"><span>KM Atual</span><span>${a.quilometragem}</span></div>
<div class="row"><span>Tanque</span><span>${a.tanque||"-"}</span></div>
<div class="row"><span>Km/L</span><span>${consumo}</span></div>
<div class="row" style="justify-content:flex-end;gap:6px;margin-top:6px">
<button onclick="abrirEditar('${a.id}','${a.valor_total}','${a.litros}','${a.quilometragem}','${a.data_abastecimento}','${a.valor_litro}','${a.posto_id}','${a.tanque}')" style="background:#f59e0b;color:#000;padding:6px 10px;font-size:11px">✏️</button>
<button onclick="excluirRegistro('abastecimentos','${a.id}')" style="background:#ef4444;color:#fff;padding:6px 10px;font-size:11px">🗑</button>
</div>
</div>`
}).join("")
}

function autoCalc(valorId,litrosId,vlId){
const v=document.getElementById(valorId)
const l=document.getElementById(litrosId)
const vl=document.getElementById(vlId)
let lock=false
function calc(from){
if(lock)return
lock=true
let valor=parseFloat(v.value)
let litros=parseFloat(l.value)
let valorL=parseFloat(vl.value)
if(from==="valor"||from==="litros"){
if(valor && litros){vl.value=(valor/litros).toFixed(3)}
}
if(from==="vl"){
if(valorL && litros){v.value=(valorL*litros).toFixed(2)}
}
lock=false
}
v.addEventListener("input",()=>calc("valor"))
l.addEventListener("input",()=>calc("litros"))
vl.addEventListener("input",()=>calc("vl"))
}

}
console.log("Payload:",payload)
let resp
if(editMotoristaId){

}
if(resp.error){

}
