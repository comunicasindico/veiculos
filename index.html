<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Veículos App PRO</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#020617">
<link rel="manifest" href="manifest.json">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5"></script>
<style>
body{font-family:Arial;background:#020617;color:#fff;padding:15px}
.card{background:#111827;padding:15px;border-radius:12px;margin-top:10px}
button{padding:12px;border:none;border-radius:10px;background:#22c55e;color:#000;font-weight:bold;width:100%;margin-top:5px}
input,select{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:none}
.kpi{color:#22c55e}
.alerta{color:#ef4444;font-weight:bold}
video,canvas{width:100%;border-radius:10px;margin-top:10px}
</style>
</head>
<body>

<h2>🚗 Veículos PRO</h2>

<div class="card">
<select id="veiculoSel"></select>
<div id="kpi"></div>
<div id="alerta"></div>
</div>

<div class="card">
<h3>📷 Ler Nota</h3>
<video id="video" autoplay></video>
<button onclick="capturar()">Capturar Nota</button>
<canvas id="canvas"></canvas>
<div id="ocr"></div>
</div>

<div class="card">
<h3>📍 Rota GPS</h3>
<button onclick="iniciarGPS()">Iniciar Rastreamento</button>
<div id="gps"></div>
</div>

<div class="card">
<h3>⛽ Abastecimento</h3>
<input id="litros" placeholder="Litros">
<input id="valor" placeholder="Valor">
<input id="km" placeholder="KM">
<button onclick="salvar()">Salvar</button>
</div>

<div class="card">
<h3>📊 Gráfico</h3>
<canvas id="grafico"></canvas>
</div>

<script>

/* RESET TOTAL */
if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(x=>x.unregister()))}
if('caches'in window){caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)))}

/* SUPABASE */
const db=supabase.createClient("https://gspdlrenyrzbkxlvyugc.supabase.co","sb_publishable_MQRr8O1saGmGz3nsMg1g-Q_8ZIK6yrw")

/* INIT */
document.addEventListener("DOMContentLoaded",init)

/* INIT */
async function init(){
let {data:v}=await db.from("veiculos").select("*")
window.VEICULOS=v||[]
veiculoSel.innerHTML=v.map(x=>`<option value="${x.id}">${x.modelo}</option>`)
window.VID=v[0]?.id
iniciarCamera()
render()
}

/* CAMERA */
async function iniciarCamera(){
const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
video.srcObject=stream
}

/* OCR */
async function capturar(){
const ctx=canvas.getContext("2d")
canvas.width=video.videoWidth
canvas.height=video.videoHeight
ctx.drawImage(video,0,0)
const {data:{text}}=await Tesseract.recognize(canvas,"por")
ocr.innerText=text
}

/* GPS */
let watchId
function iniciarGPS(){
if(watchId)return
watchId=navigator.geolocation.watchPosition(pos=>{
gps.innerHTML=`Lat:${pos.coords.latitude}<br>Lng:${pos.coords.longitude}`
})
}

/* SALVAR */
async function salvar(){
await db.from("abastecimentos").insert({
veiculo_id:VID,
litros:parseFloat(litros.value),
valor_total:parseFloat(valor.value),
quilometragem:parseFloat(km.value),
data_abastecimento:new Date().toISOString()
})
await db.from("veiculos").update({km_atual:parseFloat(km.value)}).eq("id",VID)
render()
}

/* RENDER */
let chart
async function render(){
let {data}=await db.from("abastecimentos").select("*").eq("veiculo_id",VID).order("data_abastecimento",{ascending:true})
if(!data||data.length<2)return
let consumo=[],labels=[],total=0,count=0
for(let i=1;i<data.length;i++){
let c=(data[i].quilometragem-data[i-1].quilometragem)/data[i].litros
consumo.push(c);labels.push(i)
total+=c;count++
}
let media=(total/count).toFixed(2)
kpi.innerHTML=`<div class="kpi">KM/L: ${media}</div>`
renderGrafico(labels,consumo)
}

/* GRÁFICO */
function renderGrafico(labels,data){
if(chart)chart.destroy()
chart=new Chart(grafico,{type:"line",data:{labels:labels,datasets:[{label:"Consumo",data:data}]}})
}

/* PWA INSTALL */
let deferredPrompt
window.addEventListener('beforeinstallprompt',e=>{
e.preventDefault()
deferredPrompt=e
setTimeout(()=>{if(confirm("Instalar app?"))deferredPrompt.prompt()},3000)
})

</script>

</body>
</html>
