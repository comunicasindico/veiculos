<script>
function calcularIndicadores(lista){
if(!lista.length)return null
let totalGasto=0
let totalLitros=0
let consumos=[]
let totalKm=0
for(let i=0;i<lista.length;i++){
let atual=lista[i]
let anterior=lista[i+1]
totalGasto+=Number(atual.valor_total||0)
totalLitros+=Number(atual.litros||0)
if(anterior && atual.quilometragem && anterior.quilometragem){
let km=atual.quilometragem-anterior.quilometragem
if(km>0 && atual.litros>0){
let consumo=km/atual.litros
consumos.push(consumo)
totalKm+=km
}
}
}
let mediaConsumo=consumos.length?(consumos.reduce((a,b)=>a+b,0)/consumos.length):0
let melhor=Math.max(...consumos,0)
let pior=Math.min(...consumos,0)
let custoKm=totalKm>0?(totalGasto/totalKm):0
return{
totalGasto,
totalLitros,
mediaConsumo,
melhor,
pior,
custoKm,
totalAbastecimentos:lista.length
}
}
function renderKPIs(d){

if(!d)return

kpis.innerHTML=`

<div class="item">💰 Total<br><b>R$ ${d.totalGasto.toFixed(2)}</b></div>

<div class="item">⛽ Litros<br><b>${d.totalLitros.toFixed(1)}</b></div>

<div class="item">📈 Km/L<br><b>${d.mediaConsumo.toFixed(2)}</b></div>

<div class="item">🚗 Custo/KM<br><b>R$ ${d.custoKm.toFixed(2)}</b></div>

<div class="item">🏆 Melhor<br><b>${d.melhor.toFixed(2)}</b></div>

<div class="item">⚠️ Pior<br><b>${d.pior.toFixed(2)}</b></div>

<div class="item">📊 Registros<br><b>${d.totalAbastecimentos}</b></div>

`
}
function renderDashboard(lista){

if(!lista.length)return

let labels=lista.map(x=>formatarData(x.data_abastecimento))

let consumo=lista.map((a,i)=>{
let ant=lista[i+1]
if(!ant)return null
let km=a.quilometragem-ant.quilometragem
return km>0?(km/a.litros):0
})

let gasto=lista.map(x=>x.valor_total)

if(graficoConsumo)graficoConsumo.destroy()
if(graficoGasto)graficoGasto.destroy()

graficoConsumo=new Chart(graficoConsumoEl,{
type:"line",
data:{
labels,
datasets:[{
label:"Km/L",
data:consumo,
borderWidth:2,
tension:0.3
}]
}
})

const cores=[
"#22c55e","#3b82f6","#f59e0b","#ef4444","#a855f7",
"#06b6d4","#84cc16","#f97316","#e11d48","#14b8a6"
]
let labels=d.map(x=>fData(x.data_abastecimento)) // já está dd/mm
let valores=d.map(x=>Number(x.valor_total||0))
let ano=""
if(d.length){
ano=d[0].data_abastecimento.split("-")[0]
}
if(graficoGasto)graficoGasto.destroy()
graficoGasto=new Chart(graficoGastoEl,{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Gastos R$ ("+ano+")",
data:valores,
backgroundColor:valores.map((_,i)=>cores[i%cores.length]),
borderRadius:6
}]
},
options:{
plugins:{
legend:{display:false},
title:{
display:true,
text:"Gastos por Data - "+ano
}
},
scales:{
y:{
ticks:{
callback:(v)=>"R$ "+v.toFixed(0)
}
}
}
}
})

let indicadores=calcularIndicadores(lista)
renderKPIs(indicadores)

}
  
/* 003 CONFIG */
const db=supabase.createClient(
"https://gspdlrenyrzbkxlvyugc.supabase.co",
"sb_publishable_MQRr8O1saGmGz3nsMg1g-Q_8ZIK6yrw"
)

/* 004 ESTADO */
let VID=null,graficoConsumo,graficoGasto

/* 005 UTILS */
function fData(d){
if(!d)return "-"
let x=d.split("T")[0].split("-")
return x[2]+"/"+x[1]
}

/* 006 LOGIN */
async function login(){
let {data}=await db.from("usuarios").select("*").eq("usuario_apelido",user.value)
if(!data?.length)return alert("Erro")
if(data[0].senha_hash!==pass.value)return alert("Senha")
localStorage.setItem("empresa",data[0].empresa_id)
init()
}

/* 007 INIT */
async function init(){
telaLogin.style.display="none";app.style.display="block"
await carregarTudo()
render()
}

/* 008 UI */
function abrirTela(t){
document.querySelectorAll(".tela").forEach(e=>e.style.display="none")
document.getElementById("tela_"+t).style.display="block"
}

async function carregarTudo(){
let emp=localStorage.getItem("empresa")||null
if(!emp)return console.error("empresa não encontrada")

/* MOTORISTAS */
let {data:m,error:e1}=await db.from("motoristas").select("*").eq("empresa_id",emp)
if(e1){console.error("motoristas:",e1);m=[]}
m=m||[]
if(window.listaMotoristas){
listaMotoristas.innerHTML=m.map(x=>`
<div class="item">
<div class="itemContent">
<div><b>${x.nome||"-"}</b></div>
<div style="font-size:11px;color:#94a3b8">
CPF: <span id="cpf_${x.id}">***.***.***-**</span>
</div>
<div style="font-size:11px;color:#94a3b8">
Tel: ${x.telefone||"-"}
</div>
</div>
<div class="actions">
<button class="btnEye" onclick="toggleCPF('${x.id}','${x.cpf||""}')">👁</button>
<button class="btnEdit" onclick="editarMotorista('${x.id}','${x.nome||""}','${x.telefone||""}','${x.cpf||""}')">✏️</button>
<button class="btnDel" onclick="excluir('motoristas','${x.id}')">🗑</button>
</div>
</div>
`).join("")
}
if(window.v_motorista){
v_motorista.innerHTML=m.map(x=>`<option value="${x.id}">${x.nome||"-"}</option>`).join("")
}

/* POSTOS */
let {data:p,error:e2}=await db.from("postos").select("*").eq("empresa_id",emp)
if(e2){console.error("postos:",e2);p=[]}
p=p||[]
if(window.listaPostos){
listaPostos.innerHTML=p.map(x=>`
<div class="item">
<div class="itemContent">
<div><b>${x.nome_posto||"-"}</b></div>
<div style="font-size:11px;color:#94a3b8">${x.cidade||"-"} | ${x.cnpj||"-"}</div>
</div>
<div class="actions">
<button class="btnEdit" onclick="editarPosto('${x.id}','${x.nome_posto||""}','${x.cidade||""}','${x.cnpj||""}')">✏️</button>
<button class="btnDel" onclick="excluir('postos','${x.id}')">🗑</button>
</div>
</div>
`).join("")
}
if(window.postoSel){
postoSel.innerHTML=p.map(x=>`<option value="${x.id}">${x.nome_posto||"-"}</option>`).join("")
}
if(window.e_posto && window.postoSel){
e_posto.innerHTML=postoSel.innerHTML
}

/* VEÍCULOS (SEM RELAÇÃO DIRETA → JOIN MANUAL) */
let {data:v,error:e3}=await db.from("veiculos").select("*").eq("empresa_id",emp)
if(e3){console.error("veiculos:",e3);v=[]}
v=v||[]

/* MAPA DE MOTORISTAS */
let mapMotoristas={}
m.forEach(mo=>{mapMotoristas[mo.id]=mo})

/* SELECT */
if(window.veiculoSel){
veiculoSel.innerHTML=v.map(x=>`<option value="${x.id}">${x.modelo||"-"}</option>`).join("")
}
VID=v?.[0]?.id||null

/* LISTA */
if(window.listaVeiculos){
listaVeiculos.innerHTML=v.map(x=>{
let mot=mapMotoristas[x.motorista_id]||{}
return `
<div class="item">

<div class="itemContent">

<div><b>${x.modelo||"-"}</b> | ${x.placa||"-"}</div>

<div style="font-size:11px;color:#94a3b8">
${x.marca||"-"} | ${x.ano||"-"} | ${x.cor||"-"}
</div>

<div style="font-size:11px;color:#94a3b8">
KM ${x.km_atual||"-"} | Comb: ${x.combustivel_principal||"-"}
</div>

<div style="font-size:11px;color:#94a3b8">
Motorista: ${mot.nome||"-"}
</div>

<div style="font-size:11px;color:#94a3b8">
Renavam: <span id="renavam_${x.id}">***</span>
</div>

<div style="font-size:11px;color:#64748b">
IPVA: ${x.vencimento_ipva?fData(x.vencimento_ipva):"-"} | Lic: ${x.vencimento_licenciamento?fData(x.vencimento_licenciamento):"-"}
</div>

</div>

<div class="actions">

<button class="btnEye" onclick="toggleRenavam('${x.id}','${x.renavam||""}')">👁</button>

<button class="btnEdit" onclick="editarVeiculo('${x.id}','${x.placa||""}','${x.marca||""}','${x.modelo||""}','${x.ano||""}','${x.cor||""}','${x.renavam||""}','${x.combustivel_principal||""}','${x.km_atual||""}','${x.vencimento_ipva||""}','${x.vencimento_licenciamento||""}','${x.motorista_id||""}')">✏️</button>

<button class="btnDel" onclick="excluir('veiculos','${x.id}')">🗑</button>

</div>

</div>
`
}).join("")
}
}
/* 010 SALVAR */
async function salvar(){
await db.from("abastecimentos").insert({
empresa_id:localStorage.getItem("empresa"),
veiculo_id:VID,
posto_id:postoSel.value,
valor_total:valor.value,
litros:litros.value,
quilometragem:km.value,
data_abastecimento:data.value
})
render()
}

/* 011 RENDER */
async function render(){
if(!VID)return
let {data=[]}=await db.from("abastecimentos").select("*,postos(nome_posto)").eq("veiculo_id",VID).order("data_abastecimento",{ascending:false})
if(!Array.isArray(data)||!data.length){lista.innerHTML="<div class='item'>Sem dados</div>";return}
lista.innerHTML=data.map(a=>`
<div class="item">
<div class="itemContent">
<div><b>${fData(a.data_abastecimento)}</b> | ${a.postos?.nome_posto||"-"}</div>
<div style="font-size:11px;color:#94a3b8">R$ ${Number(a.valor_total||0).toFixed(2)} | ${a.litros||0}L | KM ${a.quilometragem||0}</div>
</div>
<div class="actions">
<button class="btnEdit" onclick="editarAbastecimento('${a.id}','${a.valor_total}','${a.litros}','${a.quilometragem}','${a.data_abastecimento}','${a.posto_id}')">✏️</button>
<button class="btnDel" onclick="excluir('abastecimentos','${a.id}')">🗑</button>
</div>
</div>
`).join("")
renderDashboard(data)
if(!veiculoSel.dataset.bind){
veiculoSel.addEventListener("change",()=>{VID=veiculoSel.value;render()})
veiculoSel.dataset.bind="1"
}
}

/* 012 DASHBOARD */
function renderDashboard(d){
let labels=d.map(x=>fData(x.data_abastecimento))
let gastos=d.map(x=>x.valor_total)

if(graficoConsumo)graficoConsumo.destroy()
if(graficoGasto)graficoGasto.destroy()

graficoConsumo=new Chart(graficoConsumoEl,{type:"line",data:{labels,datasets:[{label:"Consumo",data:gastos}]}})
graficoGasto=new Chart(graficoGastoEl,{type:"bar",data:{labels,datasets:[{label:"Gastos",data:gastos}]}})
}

/* CRUD */
async function salvarMotorista(){
let payload={
empresa_id:localStorage.getItem("empresa"),
nome:m_nome.value||"",
telefone:m_tel.value||"",
cpf:(typeof m_cpf!=="undefined" && m_cpf)?m_cpf.value:""
}
if(window.editMotoristaId){
await db.from("motoristas").update(payload).eq("id",window.editMotoristaId)

}else{

}
m_nome.value=""
m_tel.value=""
if(typeof m_cpf!=="undefined" && m_cpf)m_cpf.value=""

}

function cancelarMotorista(){

v_cor.value=""

p_cidade.value=cidade||""
p_cnpj.value=cnpj||""

id,placa,marca,modelo,ano,cor,renavam,comb,kilometragem,ipva,lic,motorista){

v_placa.value=placa||""
v_marca.value=marca||""
v_modelo.value=modelo||""

v_cor.value=cor||""

v_km.value=kilometragem||""

v_licenciamento.value=(lic||"").split("T")[0]

window.editarAbastecimento=function(id,valor,litros,km,data,posto){

async function excluir(t,id){
if(!confirm("Excluir?"))return
/* 🔒 NÃO APAGAR ABASTECIMENTOS (DADOS CONSOLIDADOS) */
if(t==="abastecimentos"){
alert("⚠️ Registro consolidado não pode ser excluído.\nUse edição.")
return
}
/* 🔒 PROTEÇÃO EXTRA */
let {data}=await db.from(t).select("id").eq("id",id).limit(1)
if(!data||!data.length){
alert("Registro não encontrado")
return
}
await db.from(t).delete().eq("id",id)
await carregarTudo()
render()
}

async function salvarEdicao(){
await db.from("abastecimentos").update({
valor_total:parseFloat(e_valor.value)||0,
litros:parseFloat(e_litros.value)||0,
quilometragem:parseFloat(e_km.value)||0,
posto_id:e_posto.value||null,
data_abastecimento:e_data.value
}).eq("id",editAbastecimentoId)

modalEditar.style.display="none"
render()
}

function fecharEditar(){
modalEditar.style.display="none"
}
function toggleDash(){
let el=document.getElementById("dashContent")
let icon=document.getElementById("dashIcon")
if(!el)return
if(el.style.display==="none"){
el.style.display="block"
icon.innerText="⬇️"
}else{
el.style.display="none"
icon.innerText="⬆️"
}
}
function toggleCPF(id,valor){
let el=document.getElementById("cpf_"+id)
if(!el)return
el.innerText=el.innerText==="***"?valor||"-":"***"
}

function toggleRenavam(id,valor){
