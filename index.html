<!DOCTYPE html>
<html lang="pt-br">
<head>
<!-- 001 HEAD -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="icon" href="img/192x192.png">
<title>IA Veículo Master</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5"></script>
</head>
<style>
/* 002 STYLE */
body{margin:0;font-family:Arial;background:#fff;color:#000}
.container{max-width:720px;margin:auto;padding:10px}
.card{background:#f1f5f9;padding:12px;border-radius:12px;margin-top:10px}
input,select{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#000}
button{width:100%;padding:12px;margin-top:6px;border:none;border-radius:10px;background:#22c55e;color:#000;font-weight:bold}
.item{background:#fff;padding:10px;border-radius:10px;margin-top:6px;border:1px solid #e2e8f0}
.row{display:flex;justify-content:space-between;font-size:12px}
.headerApp{position:sticky;top:0;background:#fff;padding:10px;border-bottom:1px solid #ddd}
.menuTabs{display:flex;gap:6px}
.menuTabs button{flex:1;background:#e2e8f0;color:#000}
.menuTabs button.active{background:#22c55e}
.footerBar{position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid #ddd;padding:8px;display:flex;justify-content:flex-end}
.btnLogout{background:#dc2626;color:#fff;border:none;padding:10px 16px;border-radius:10px}
.menuTabs button[title]{position:relative}
.menuTabs button[title]:hover::after{content:attr(title);position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:4px 8px;font-size:10px;border-radius:6px;white-space:nowrap}
#telaLogin{background:url("img/bancocomunicaveiculos.png") no-repeat center center fixed;background-size:cover;position:fixed;top:0;left:0;width:100%;height:100vh;display:flex;justify-content:center;align-items:center}
#telaLogin::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6)}
#loginBox{position:relative;z-index:2;background:#fff;padding:20px;border-radius:14px;width:300px;box-shadow:0 10px 30px rgba(0,0,0,0.4);text-align:center;margin:0!important}
#boxCriar{position:absolute;top:20px;left:50%;transform:translateX(-50%);z-index:3;background:#dc2626;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:bold;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.4)}
#boxCriar:hover{background:#b91c1c}
.badgePro{background:#22c55e;color:#000;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:bold}
.alertaExpira{color:#dc2626;font-weight:bold;font-size:12px;text-align:center;margin-top:6px}
</style>
<body>
<div id="telaLogin">
<div id="boxCriar" onclick="criarConta()">🚀 Criar Conta de Usuário PRO</div>
<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2">
<div id="loginBox">
<h2>🚗 IA Veículo Master</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>
</div>
</div>
<div id="app" class="container" style="display:none">
<div class="headerApp">
<div id="statusPlano"></div>
<div id="boxRenovar" style="display:none;text-align:center;margin-top:4px">
<button onclick="renovarPlano()" style="background:#f59e0b;color:#000">💰 Renovar Plano</button>
</div>
<div class="menuTabs">
<button onclick="abrirTela('combustivel')" id="tab_combustivel" title="Abastecimento">⛽</button>
<button onclick="abrirTela('motorista')" id="tab_motorista" title="Motoristas">👨</button>
<button onclick="abrirTela('veiculo')" id="tab_veiculo" title="Veículos">🚗</button>
<button onclick="abrirTela('posto')" id="tab_posto" title="Postos">🏪</button>
<button onclick="abrirTela('admin')" id="tab_admin" title="Admin">🛠</button>
</div>
</div>
<div id="tela_combustivel" class="tela">
<div class="card"><select id="veiculoSel"></select></div>
<div class="card">
<input id="valor" placeholder="Valor">
<input id="litros" placeholder="Litros">
<input id="km" placeholder="KM Atual">
<select id="tanque"><option value="cheio">Tanque Cheio</option><option value="parcial">Parcial</option></select>
<div style="display:flex;gap:6px">
<button onclick="salvar()" style="flex:1">Salvar</button>
<button onclick="abrirInserir()" style="flex:1;background:#3b82f6;color:#fff">Inserir</button>
</div>
</div>
<div class="card"><canvas id="grafico"></canvas></div>
<div class="card"><h3>Histórico Completo</h3><div id="lista"></div></div>
</div>
<div id="tela_motorista" class="tela" style="display:none"><div class="card"><input id="m_nome" placeholder="Nome"><input id="m_cpf" placeholder="CPF"><input id="m_cnh" placeholder="CNH"><input id="m_validade" placeholder="Validade CNH"><input id="m_tel" placeholder="Telefone"><input id="m_email" placeholder="E-mail"><input id="m_obs" placeholder="Observações"><button onclick="salvarMotorista()">Salvar</button></div><div id="listaMotoristas"></div></div>
<div id="tela_veiculo" class="tela" style="display:none"><div class="card"><input id="v_placa" placeholder="Placa"><input id="v_marca" placeholder="Marca"><input id="v_modelo" placeholder="Modelo"><input id="v_ano" placeholder="Ano"><input id="v_cor" placeholder="Cor"><input id="v_renavam" placeholder="Renavam"><input id="v_comb" placeholder="Combustível Principal"><input id="v_km" placeholder="KM Atual"><input id="v_ipva" placeholder="IPVA Vencimento"><input id="v_lic" placeholder="Licenciamento"><input id="v_obs" placeholder="Observações"><button onclick="salvarVeiculo()">Salvar</button></div><div id="listaVeiculos"></div></div>
<div id="tela_posto" class="tela" style="display:none"><div class="card"><input id="p_nome" placeholder="Nome do Posto"><input id="p_cnpj" placeholder="CNPJ"><input id="p_cidade" placeholder="Cidade"><input id="p_uf" placeholder="UF"><input id="p_endereco" placeholder="Endereço"><input id="p_bairro" placeholder="Bairro"><button onclick="salvarPosto()">Salvar</button></div><div id="listaPostos"></div></div>
<div id="tela_admin" class="tela" style="display:none"><div class="card"><h3>Painel Admin</h3><div id="listaUsuarios"></div></div></div>
<div class="footerBar"><button onclick="logout()" class="btnLogout">Sair</button></div>
<div id="modalInserir" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:999;justify-content:center;align-items:center">
<div style="background:#fff;padding:20px;border-radius:12px;width:300px">
<h3>Novo Abastecimento</h3>
<input id="i_valor" placeholder="Valor">
<input id="i_litros" placeholder="Litros">
<input id="i_km" placeholder="KM">
<button onclick="salvarInsercao()">Inserir</button>
<button onclick="fecharInserir()" style="background:#ef4444;color:#fff">Cancelar</button>
</div>
</div>
</div>
<script>
/* 003 SCRIPT */
const db=supabase.createClient("https://gspdlrenyrzbkxlvyugc.supabase.co","sb_publishable_MQRr8O1saGmGz3nsMg1g-Q_8ZIK6yrw")
let VID=null,chart=null
function hojeISO(){const d=new Date();const l=new Date(d.getTime()-d.getTimezoneOffset()*60000);return l.toISOString().slice(0,10)}
function moeda(v){return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function formatarData(d){if(!d)return"-";let s=d.split("T")[0];let[y,m,dd]=s.split("-");return`${dd}-${m}-${y}`}
function verificarExpiracao(){
const exp=localStorage.getItem("expira_em")
const isAdmin=localStorage.getItem("admin")==="1"
if(!isAdmin && exp && new Date(exp)<new Date()){
alert("Plano expirado")
logout()
}
}
function criarConta(){let nome=prompt("Nome da empresa");if(!nome)return;let email=prompt("Email");if(!email)return;let senha=prompt("Senha");if(!senha)return;db.from("usuarios").insert({usuario_apelido:email.toLowerCase(),senha_hash:senha,empresa_id:crypto.randomUUID()}).then(()=>alert("Conta criada! Aguarde liberação PRO."))}
async function carregarAdmin(){
const isAdmin=localStorage.getItem("admin")==="1"
if(!isAdmin)return
let{data,error}=await db.from("usuarios").select("*").order("created_at",{ascending:false})
if(error){console.error(error);return}
listaUsuarios.innerHTML=data.filter(u=>u.tipo!=="admin").map(u=>{
let ativo=u.expira_em&&new Date(u.expira_em)>new Date()
return `<div class="item">
<div class="row"><span>Email</span><span>${u.usuario_apelido}</span></div>
<div class="row"><span>Empresa</span><span>${u.empresa_id}</span></div>
<div class="row"><span>Status</span><span>${ativo?"ATIVO":"EXPIRADO"}</span></div>
<div class="row"><span>Expira</span><span>${u.expira_em||"-"}</span></div>
<button onclick="ativarPlano('${u.id}')" style="background:#22c55e">Ativar 6 meses R$54,90</button>
</div>`
}).join("")
}
async function ativarPlano(id){let f=new Date();f.setMonth(f.getMonth()+6);await db.from("usuarios").update({expira_em:f.toISOString()}).eq("id",id);carregarAdmin()}
function atualizarStatusPlano(){
const exp=localStorage.getItem("expira_em")
const isAdmin=localStorage.getItem("admin")==="1"
if(isAdmin){
statusPlano.innerHTML="<span class='badgePro'>ADMIN</span>"
return
}
if(!exp)return
let hoje=new Date()
let venc=new Date(exp)
let diff=Math.ceil((venc-hoje)/(1000*60*60*24))
if(venc<hoje){
statusPlano.innerHTML="<div class='alertaExpira'>Plano expirado</div>"
return
}
if(diff<=5){
statusPlano.innerHTML=`<div class='alertaExpira'>Expira em ${diff} dia(s)</div>`
}else{
statusPlano.innerHTML=`<span class='badgePro'>PRO até ${formatarData(exp)}</span>`
}
const box=document.getElementById("boxRenovar")
if(box){
box.style.display=(diff<=5 || venc<hoje)?"block":"none"
}
}
function renovarPlano(){
alert("Pagamento de R$54,90\nChave PIX: 69984311978\nApós pagamento, aguarde liberação.")
}

async function carregarCadastros(){
let empresa=localStorage.getItem("empresa")

let botaoInserir='<button onclick="alert(\'Use o formulário acima para inserir\')" style="background:#22c55e">Inserir</button>'

let{data:motoristas,error:e1}=await db.from("motoristas").select("*").eq("empresa_id",empresa)
if(e1)console.error(e1)
listaMotoristas.innerHTML=botaoInserir+(motoristas||[]).map(m=>`
<div class="item">
<div class="row"><span>Nome</span><span>${m.nome||"-"}</span></div>
<div class="row"><span>CPF</span><span>${m.cpf||"-"}</span></div>
<button onclick="excluirRegistro('motoristas','${m.id}')" style="background:#ef4444;color:#fff">Excluir</button>
</div>`).join("")

let{data:veiculos,error:e2}=await db.from("veiculos").select("*").eq("empresa_id",empresa)
if(e2)console.error(e2)
listaVeiculos.innerHTML=botaoInserir+(veiculos||[]).map(v=>`
<div class="item">
<div class="row"><span>Placa</span><span>${v.placa||"-"}</span></div>
<div class="row"><span>Modelo</span><span>${v.modelo||"-"}</span></div>
<div class="row">
<button onclick="excluirRegistro('veiculos','${v.id}')" style="background:#ef4444;color:#fff">Excluir</button>
</div>
</div>`).join("")

let{data:postos,error:e3}=await db.from("postos").select("*").eq("empresa_id",empresa)
if(e3)console.error(e3)
listaPostos.innerHTML=botaoInserir+(postos||[]).map(p=>`
<div class="item">
<div class="row"><span>Posto</span><span>${p.nome_posto||p.nome||"-"}</span></div>
<div class="row">
<button onclick="excluirRegistro('postos','${p.id}')" style="background:#ef4444;color:#fff">Excluir</button>
</div>
</div>`).join("")
}
async function login(){
const{data,error}=await db.from("usuarios").select("*").eq("usuario_apelido",user.value.toLowerCase())
if(error){console.error(error);return alert("Erro ao conectar")}
if(!data||!data.length)return alert("Usuário não encontrado")
const u=data[0]
if(u.senha_hash!==pass.value)return alert("Senha incorreta")
if(u.tipo==="admin"){
localStorage.setItem("admin","1")
localStorage.setItem("uid",u.id)
mostrarApp()
abrirTela("admin")
carregarAdmin()
return
}
if(u.expira_em&&new Date(u.expira_em)<new Date()){
alert("Plano expirado")
return
}
localStorage.setItem("empresa",u.empresa_id)
localStorage.setItem("uid",u.id)
localStorage.setItem("admin","0")
localStorage.setItem("expira_em",u.expira_em||"")
init()
}
async function init(){
if(!localStorage.getItem("uid"))return mostrarLogin()
mostrarApp()
verificarExpiracao()
let empresa=localStorage.getItem("empresa")
let{data}=await db.from("veiculos").select("*").eq("empresa_id",empresa)
veiculoSel.innerHTML=(data||[]).map(v=>`<option value="${v.id}">${v.modelo}</option>`).join("")
VID=data?.[0]?.id
carregarCadastros()
render()
}
function excluirRegistro(tabela,id){if(!confirm("Excluir?"))return;db.from(tabela).delete().eq("id",id).then(()=>render())}
function editarRegistro(tabela,id,campo,valor){db.from(tabela).update({[campo]:valor}).eq("id",id)}
function mostrarLogin(){telaLogin.style.display="block";app.style.display="none"}
function mostrarApp(){telaLogin.style.display="none";app.style.display="block"}
function abrirTela(t){document.querySelectorAll(".tela").forEach(e=>e.style.display="none");document.getElementById("tela_"+t).style.display="block"}
async function salvar(){let v=parseFloat(valor.value);let l=parseFloat(litros.value);let k=parseFloat(km.value);await db.from("abastecimentos").insert({empresa_id:localStorage.getItem("empresa"),veiculo_id:VID,valor_total:v,litros:l,valor_litro:(v/l),quilometragem:k,tanque:tanque.value,data_abastecimento:hojeISO()});render()}
async function render(){
const exp=localStorage.getItem("expira_em")
const isAdmin=localStorage.getItem("admin")==="1"
if(!isAdmin && exp && new Date(exp)<new Date()){
lista.innerHTML="<div class='alertaExpira'>Plano expirado. Renove para continuar.</div>"
return
}
let empresa=localStorage.getItem("empresa")
let query=db.from("abastecimentos").select(`id,data_abastecimento,litros,valor_total,valor_litro,quilometragem,tanque,tipo_combustivel,postos(nome_posto)`)
if(!isAdmin){
query=query.eq("empresa_id",empresa)
}
query=query.eq("veiculo_id",VID).order("data_abastecimento",{ascending:false})
let{data,error}=await query
if(error){
console.error(error)
lista.innerHTML="<div>Erro ao carregar</div>"
return
}
if(!data||!data.length){
lista.innerHTML="<div>Sem dados</div>"
return
}
lista.innerHTML=data.map((a,i)=>{
let ant=data[i-1]
let kmRodado=ant?(a.quilometragem-ant.quilometragem):0
let consumo=(kmRodado>0&&a.litros>0)?(kmRodado/a.litros).toFixed(2):"-"
return `<div class="item">
<div class="row">
<span>${formatarData(a.data_abastecimento)}</span>
<span>${a.postos?.nome_posto||"POSTO NÃO IDENTIFICADO"}</span>
</div>
<div class="row">
<span>${a.litros} L</span>
<span>${moeda(a.valor_total)}</span>
</div>
<div class="row">
<span>Km/L</span>
<span>${consumo}</span>
</div>
<div class="row" style="justify-content:flex-end;gap:6px;margin-top:6px">
<button onclick="abrirEditar('${a.id}','${a.valor_total}','${a.litros}','${a.quilometragem}')" style="background:#f59e0b;color:#000;padding:6px 10px;font-size:11px">✏️</button>
<button onclick="excluirRegistro('abastecimentos','${a.id}')" style="background:#ef4444;color:#fff;padding:6px 10px;font-size:11px">🗑</button>
</div>
</div>`
}).join("")
}
function logout(){localStorage.clear();location.reload()}
document.addEventListener("DOMContentLoaded",()=>{if(localStorage.getItem("uid"))init();else mostrarLogin()})
let editId=null

function abrirEditar(id,v,l,k){
editId=id
modalEditar.style.display="flex"
e_valor.value=v
e_litros.value=l
e_km.value=k
}

function fecharModal(){
modalEditar.style.display="none"
}

async function salvarEdicao(){
await db.from("abastecimentos").update({
valor_total:parseFloat(e_valor.value),
litros:parseFloat(e_litros.value),
quilometragem:parseFloat(e_km.value),
valor_litro:(parseFloat(e_valor.value)/parseFloat(e_litros.value))
}).eq("id",editId)
fecharModal()
render()
}
function abrirInserir(){modalInserir.style.display="flex"}
function fecharInserir(){modalInserir.style.display="none"}

async function salvarInsercao(){
let v=parseFloat(i_valor.value)
let l=parseFloat(i_litros.value)
let k=parseFloat(i_km.value)

await db.from("abastecimentos").insert({
empresa_id:localStorage.getItem("empresa"),
veiculo_id:VID,
valor_total:v,
litros:l,
valor_litro:(v/l),
quilometragem:k,
data_abastecimento:hojeISO()
})

fecharInserir()
render()
}
</script>

<div id="modalEditar" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:999;justify-content:center;align-items:center">
<div style="background:#fff;padding:20px;border-radius:12px;width:300px">
<h3>Editar</h3>
<input id="e_valor" placeholder="Valor">
<input id="e_litros" placeholder="Litros">
<input id="e_km" placeholder="KM">
<button onclick="salvarEdicao()">Salvar</button>
<button onclick="fecharModal()" style="background:#ef4444;color:#fff">Cancelar</button>
</div>
</div>
</body>
</html>
