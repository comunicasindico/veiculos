<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Veículo Simples</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body{font-family:Arial;background:#020617;color:#fff;padding:20px}
.box{max-width:400px;margin:80px auto;background:#111827;padding:20px;border-radius:10px}
input,button{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none}
button{background:#22c55e;font-weight:bold}
</style>
</head>
<body>

<div id="login" class="box">
<h2>Login</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">
<h2>Painel</h2>
<div id="dados"></div>
<button onclick="logout()">Sair</button>
</div>

<script>
const db=supabase.createClient(
"https://gspdlrenyrzbkxlvyugc.supabase.co",
"sb_publishable_MQRr8O1saGmGz3nsMg1g-Q_8ZIK6yrw"
)

async function login(){
const u=user.value.toLowerCase()
const p=pass.value

const {data}=await db.from("usuarios").select("*").eq("usuario_apelido",u).single()

if(!data||data.senha_hash!==p){alert("Erro login");return}

localStorage.setItem("uid",data.id)
localStorage.setItem("tipo",data.perfil)

init()
}

function logout(){
localStorage.clear()
location.reload()
}

async function init(){
const uid=localStorage.getItem("uid")
if(!uid)return

login.style.display="none"
app.style.display="block"

const tipo=localStorage.getItem("tipo")

let v=await db.from("veiculos").select("*")
let a=await db.from("abastecimentos").select("*")

let veiculos=v.data
let abastecimentos=a.data

if(tipo!=="admin"){
veiculos=veiculos.filter(x=>x.usuario_id===uid)
const ids=veiculos.map(x=>x.id)
abastecimentos=abastecimentos.filter(x=>ids.includes(x.veiculo_id))
}

dados.innerHTML=`
Veículos: ${veiculos.length}<br>
Abastecimentos: ${abastecimentos.length}<br>
`
}

init()
</script>

</body>
</html>
