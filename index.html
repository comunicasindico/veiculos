<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Veículos SPA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            height: 100vh;
            background: url('img/bcveiculos.png') center / cover fixed;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }
        #login {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            z-index: 100;
        }
        .login-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 3px solid #facc15;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .login-box input {
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            border: 1px solid #facc15;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 16px;
        }
        .login-box input::placeholder { color: rgba(255,255,255,0.7); }
        button {
            background: #facc15;
            color: black;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        #main-container {
            display: none;
            height: 100vh;
            position: relative;
        }
        #screens-container {
            display: flex;
            height: calc(100vh - 70px);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .screen {
            width: 100vw;
            flex-shrink: 0;
            padding: 20px;
            overflow-y: auto;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-row input {
            padding: 8px;
            border: 1px solid #facc15;
            border-radius: 5px;
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .kpis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .kpi-card {
            background: rgba(255,255,255,0.1);
            border: 2px solid #facc15;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            font-size: 18px;
        }
        .kpi-value {
            font-size: 32px;
            font-weight: bold;
            color: #facc15;
        }
        .charts-row {
            display: flex;
            gap: 20px;
            height: 300px;
            margin-bottom: 20px;
        }
        .charts-row canvas {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        .actions-row {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border: 2px solid #facc15;
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.2s;
        }
        .card:hover { transform: scale(1.02); }
        #bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: flex;
            border-top: 3px solid #facc15;
        }
        #bottom-nav button {
            flex: 1;
            background: none;
            border: none;
            color: white;
            padding: 10px;
            cursor: pointer;
            font-size: 14px;
        }
        #bottom-nav button.active {
            background: #facc15;
            color: black;
        }
        #crud-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
        }
        .modal-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 3px solid #facc15;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }
        .close {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #facc15;
        }
        #crud-form label {
            display: block;
            margin: 15px 0;
        }
        #crud-form input {
            width: 100%;
            padding: 10px;
            border: 1px solid #facc15;
            border-radius: 5px;
            background: rgba(255,255,255,0.2);
            color: white;
            margin-top: 5px;
        }
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #facc15;
            color: black;
            padding: 15px 30px;
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10000;
            font-weight: bold;
        }
        #reader {
            width: 100%;
            height: 400px;
            margin: 20px 0;
            display: none;
        }
        @media (max-width: 768px) {
            .charts-row { flex-direction: column; height: auto; }
            .charts-row canvas { height: 250px; }
            .header { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div id="login">
        <div class="login-box">
            <h1>Login</h1>
            <input id="email" type="email" placeholder="Email">
            <input id="senha" type="password" placeholder="Senha">
            <button onclick="login()">Entrar</button>
        </div>
    </div>
    <div id="main-container">
        <div id="screens-container">
            <div id="dashboard" class="screen">
                <div class="header">
                    <h1>Dashboard</h1>
                    <button onclick="logout()" style="margin-left:auto;">Sair</button>
                </div>
                <div class="filter-row">
                    <input type="date" id="date-from">
                    <input type="date" id="date-to">
                    <button onclick="filterData()">Filtrar</button>
                </div>
                <div class="kpis-grid">
                    <div class="kpi-card"><div>Total Litros</div><div class="kpi-value" id="total-litros">0</div></div>
                    <div class="kpi-card"><div>Km/L Médio</div><div class="kpi-value" id="kml-medio">0</div></div>
                    <div class="kpi-card"><div>Total Abast.</div><div class="kpi-value" id="total-abast">0</div></div>
                    <div class="kpi-card"><div>Total Valor</div><div class="kpi-value" id="total-valor">0</div></div>
                </div>
                <div class="charts-row">
                    <canvas id="chart-kml"></canvas>
                    <canvas id="chart-litros"></canvas>
                </div>
                <div id="reader"></div>
                <div class="actions-row">
                    <button onclick="startQR()">QR Code</button>
                    <button onclick="startOCR()">OCR</button>
                </div>
            </div>
            <div id="motoristas" class="screen">
                <div class="header">
                    <h1>Perfil Motorista</h1>
                    <button onclick="openCrud('motoristas')">Novo</button>
                </div>
                <div id="list-motoristas" class="cards-grid"></div>
            </div>
            <div id="veiculos" class="screen">
                <div class="header">
                    <h1>Veículos</h1>
                    <button onclick="openCrud('veiculos')">Novo</button>
                </div>
                <div id="list-veiculos" class="cards-grid"></div>
            </div>
            <div id="postos" class="screen">
                <div class="header">
                    <h1>Postos</h1>
                    <button onclick="openCrud('postos')">Novo</button>
                </div>
                <div id="list-postos" class="cards-grid"></div>
            </div>
        </div>
        <nav id="bottom-nav">
            <button data-screen="0" class="active">Dashboard</button>
            <button data-screen="1">Motoristas</button>
            <button data-screen="2">Veículos</button>
            <button data-screen="3">Postos</button>
        </nav>
    </div>
    <div id="crud-modal">
        <div class="modal-box">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">Novo Item</h2>
            <form id="crud-form"></form>
        </div>
    </div>
    <div id="toast"></div>
    <script>
        const supabaseUrl = 'https://gspdlrenyrzbkxlvyugc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzcGRscmVueXJ6Ymt4bHZ5dWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODU0NzAsImV4cCI6MjA5MDQ2MTQ3MH0.UWfkWvOh4qMDEcByVL-KZ6ejJ80V7wJlDOFH76TywaI'; // Substitua pela chave extraída do arquivo
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentScreen = 0;
        const screenNames = ['dashboard', 'motoristas', 'veiculos', 'postos'];
        let allAbastecimentos = [];
        let chartKml = null;
        let chartLitros = null;
        let user = null;
        let editingTable = null;
        editingId = null;
        let scanner = null;

        async function login() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            if (!email || !senha) return alert('Preencha email e senha');
            const { data, error } = await supabase.from('usuarios').select('*').eq('email', email).eq('senha', senha).single();
            if (error || !data) return alert('Erro no login');
            user = data;
            localStorage.setItem('user', JSON.stringify(data));
            document.getElementById('login').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
            showScreen(0);
        }

        function logout() {
            localStorage.removeItem('user');
            location.reload();
        }

        window.addEventListener('load', () => {
            const savedUser = localStorage.getItem('user');
            if (savedUser) {
                user = JSON.parse(savedUser);
                document.getElementById('login').style.display = 'none';
                document.getElementById('main-container').style.display = 'block';
                showScreen(0);
            }
        });

        function showScreen(index) {
            currentScreen = index;
            const container = document.getElementById('screens-container');
            container.style.transform = `translateX(-${index * 100}vw)`;
            document.querySelectorAll('#bottom-nav button').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            const screenEl = document.getElementById(screenNames[index]);
            if (screenEl.dataset.loaded !== 'true') {
                loadDataFor(screenNames[index]);
                screenEl.dataset.loaded = 'true';
            }
        }

        // Bottom nav
        document.querySelectorAll('#bottom-nav button').forEach((btn, i) => {
            btn.onclick = () => showScreen(i);
        });

        // Swipe navigation
        const container = document.getElementById('screens-container');
        let startX = 0;
        let moveX = 0;
        container.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            moveX = startX;
        });
        container.addEventListener('touchmove', (e) => {
            moveX = e.touches[0].clientX;
            const delta = startX - moveX;
            if (Math.abs(delta) > 10) {
                container.style.transition = 'none';
                container.style.transform = `translateX(calc(-${currentScreen * 100}vw + ${delta}px))`;
            }
        });
        container.addEventListener('touchend', () => {
            container.style.transition = 'transform 0.3s ease';
            const delta = startX - moveX;
            if (Math.abs(delta) > 50) {
                if (delta > 0 && currentScreen < 3) showScreen(currentScreen + 1);
                else if (delta < 0 && currentScreen > 0) showScreen(currentScreen - 1);
            } else {
                showScreen(currentScreen);
            }
        });

        async function loadDataFor(screen) {
            if (screen === 'dashboard') {
                await loadDashboardData();
            } else {
                loadList(screen);
            }
        }

        async function loadDashboardData(dateFrom, dateTo) {
            let query = supabase.from('abastecimentos').select('*').order('data_abastec', { ascending: false });
            if (dateFrom) query = query.gte('data_abastec', dateFrom);
            if (dateTo) query = query.lte('data_abastec', dateTo);
            const { data, error } = await query;
            if (error) return console.error(error);
            allAbastecimentos = data || [];
            updateKPIs();
            updateCharts();
            // Init scanner
            if (!scanner) {
                scanner = new Html5QrcodeScanner(
                    'reader',
                    { fps: 10, qrbox: { width: 300, height: 300 } },
                    false
                );
            }
        }

        function updateKPIs() {
            const totalLitros = allAbastecimentos.reduce((sum, a) => sum + (parseFloat(a.litros) || 0), 0);
            const totalKm = allAbastecimentos.reduce((sum, a) => sum + ((parseFloat(a.km_final) || 0) - (parseFloat(a.km_inicial) || 0)), 0);
            const kml = totalLitros ? (totalKm / totalLitros).toFixed(2) : 0;
            const totalAbast = allAbastecimentos.length;
            const totalValor = allAbastecimentos.reduce((sum, a) => sum + (parseFloat(a.valor) || 0), 0);
            document.getElementById('total-litros').textContent = totalLitros.toFixed(2);
            document.getElementById('kml-medio').textContent = kml;
            document.getElementById('total-abast').textContent = totalAbast;
            document.getElementById('total-valor').textContent = 'R$ ' + totalValor.toFixed(2);
        }

        function getMonthlyData() {
            const months = {};
            allAbastecimentos.forEach(a => {
                if (!a.data_abastec) return;
                const date = new Date(a.data_abastec);
                const monthKey = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
                if (!months[monthKey]) months[monthKey] = { litros: 0, km: 0 };
                months[monthKey].litros += parseFloat(a.litros) || 0;
                months[monthKey].km += (parseFloat(a.km_final) || 0) - (parseFloat(a.km_inicial) || 0);
            });
            const sorted = Object.keys(months).sort().slice(-6);
            return {
                labels: sorted.map(m => m.slice(5) + '/' + m.slice(0,4).slice(-2)),
                kmlData: sorted.map(m => months[m].litros ? (months[m].km / months[m].litros).toFixed(1) : 0),
                litrosData: sorted.map(m => months[m].litros.toFixed(1))
            };
        }

        function updateCharts() {
            const data = getMonthlyData();
            if (chartKml) chartKml.destroy();
            if (chartLitros) chartLitros.destroy();
            const ctxKml = document.getElementById('chart-kml').getContext('2d');
            chartKml = new Chart(ctxKml, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{ label: 'Km/L', data: data.kmlData, borderColor: '#facc15', backgroundColor: 'rgba(250,204,21,0.2)' }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });
            const ctxLitros = document.getElementById('chart-litros').getContext('2d');
            chartLitros = new Chart(ctxLitros, {
                type: 'bar',
                data: {
                    labels: data.labels,
                    datasets: [{ label: 'Litros', data: data.litrosData, backgroundColor: '#facc15' }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });
        }

        function filterData() {
            const from = document.getElementById('date-from').value;
            const to = document.getElementById('date-to').value;
            loadDashboardData(from || undefined, to || undefined);
        }

        function startQR() {
            document.getElementById('reader').style.display = 'block';
            scanner.render(
                (decodedText) => {
                    alert('QR Code do cupom: ' + decodedText);
                    // Aqui: parse e insira em abastecimentos
                    document.getElementById('reader').style.display = 'none';
                    scanner.clear();
                },
                (error) => console.warn('QR Error:', error)
            );
        }

        function startOCR() {
            alert('OCR para cupons: Implementar com Tesseract.js para reconhecimento de texto via câmera.');
        }

        async function loadList(table) {
            const { data, error } = await supabase.from(table).select('*');
            if (error) return console.error(error);
            const listId = 'list-' + table;
            document.getElementById(listId).innerHTML = (data || []).map(row => cardHTML(row, table)).join('');
        }

        function cardHTML(row, table) {
            let content = '';
            if (table === 'motoristas') {
                content = `<p><strong>CPF:</strong> ${row.cpf}</p><p><strong>CNH:</strong> ${row.cnh}</p><p><strong>Telefone:</strong> ${row.telefone}</p>`;
            } else if (table === 'veiculos') {
                content = `<p><strong>KM Atual:</strong> ${row.km_atual}</p><p><strong>Combustível:</strong> ${row.combustivel}</p><p><strong>IPVA:</strong> ${row.venc_ipva}</p><p><strong>Licenciamento:</strong> ${row.venc_licen}</p>`;
            } else if (table === 'postos') {
                content = `<p><strong>CNPJ:</strong> ${row.cnpj}</p><p><strong>Cidade/UF:</strong> ${row.cidade_uf}</p>`;
            }
            return `
                <div class="card" data-id="${row.id}">
                    <h3>${row.nome || row.placa || row.nome}</h3>
                    ${content}
                    <div style="margin-top:15px;">
                        <button onclick="openCrud('${table}', ${row.id})">Editar</button>
                        <button onclick="deleteItem('${table}', ${row.id})" style="background:#ff4444;color:white;">Excluir</button>
                    </div>
                </div>
            `;
        }

        let editingId = null;
        async function openCrud(table, id = null) {
            editingTable = table;
            editingId = id;
            document.getElementById('modal-title').textContent = (id ? 'Editar' : 'Novo ') + table.charAt(0).toUpperCase() + table.slice(1);
            const form = document.getElementById('crud-form');
            form.innerHTML = '';
            let fieldDefs = {};
            if (table === 'motoristas') {
                fieldDefs = { nome: '', cpf: '', cnh: '', telefone: '' };
            } else if (table === 'veiculos') {
                fieldDefs = { placa: '', km_atual: '', combustivel: '', venc_ipva: '', venc_licen: '' };
            } else if (table === 'postos') {
                fieldDefs = { nome: '', cnpj: '', cidade_uf: '' };
            }
            for (let field in fieldDefs) {
                form.innerHTML += `
                    <label>${field.toUpperCase().replace('_', ' ')}:</label>
                    <input id="${field}" value="${fieldDefs[field]}">
                `;
            }
            form.innerHTML += '<button type="submit" style="width:100%;margin-top:20px;">Salvar</button>';
            form.onsubmit = saveCrud;
            if (id) {
                const { data } = await supabase.from(table).select('*').eq('id', id).single();
                if (data) {
                    for (let f in data) {
                        const inp = document.getElementById(f);
                        if (inp) inp.value = data[f] || '';
                    }
                }
            }
            document.getElementById('crud-modal').style.display = 'flex';
        }

        async function saveCrud(e) {
            e.preventDefault();
            const data = {};
            document.querySelectorAll('#crud-form input:not([type="submit"])').forEach(inp => {
                data[inp.id] = inp.value;
            });
            let result;
            if (editingId) {
                result = await supabase.from(editingTable).update(data).eq('id', editingId);
            } else {
                result = await supabase.from(editingTable).insert([data]);
            }
            closeModal();
            loadList(editingTable);
            showToast(editingId ? 'Atualizado com sucesso!' : 'Criado com sucesso!');
        }

        function closeModal() {
            document.getElementById('crud-modal').style.display = 'none';
        }

        async function deleteItem(table, id) {
            if (!confirm(`Excluir este ${table}?`)) return;
            const { error } = await supabase.from(table).delete().eq('id', id);
            if (!error) {
                loadList(table);
                showToast('Excluído com sucesso!');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2500);
        }
    </script>
</body>
</html>
