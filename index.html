<!DOCTYPE html>
<html lang="pt-br">
<head>
<!-- 001 HEAD -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Veículo SaaS MASTER</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial;
color:#fff;
background:#020617;
background-image:url("img/bancocomunicaveiculos.png"),radial-gradient(circle at 20% 30%,rgba(34,197,94,0.15),transparent 40%),radial-gradient(circle at 80% 70%,rgba(59,130,246,0.15),transparent 40%);
background-size:cover,auto,auto;
background-position:center;
background-repeat:no-repeat;
overflow-x:hidden;
}
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(2,6,23,0.75);
z-index:-1;
}
.container{
max-width:720px;
width:100%;
margin:auto;
padding:10px;
}
.card{
width:100%;
background:#1e293b;
padding:10px;
border-radius:12px;
margin-top:10px;
}
input,select{
width:100%;
max-width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:none;
background:#334155;
color:#fff;
}
button{
padding:10px;
border:none;
border-radius:8px;
font-weight:bold;
}
.btnSave{
background:#22c55e;
color:#000;
width:100%;
}
.btnEdit{
background:#f59e0b;
color:#000;
flex:1;
}
.btnDel{
background:#ef4444;
color:#fff;
flex:1;
}
.item{
width:100%;
background:#020617;
padding:10px;
border-radius:10px;
margin-top:6px;
border:1px solid #1e293b;
}
.row{
display:flex;
justify-content:space-between;
gap:6px;
font-size:12px;
flex-wrap:wrap;
}
.actions{
display:flex;
gap:6px;
margin-top:6px;
}
.headerApp{
position:sticky;
top:0;
background:#020617;
padding:10px;
border-bottom:1px solid #1e293b;
z-index:10;
}
.menuTabs{
display:flex;
gap:6px;
}
.menuTabs button{
flex:1;
background:#1e293b;
color:#fff;
}
.footerBar{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:center;
padding:10px;
background:#020617;
}
.btnLogout{
background:#dc2626;
color:#fff;
width:180px;
}
canvas{
width:100%!important;
max-width:100%;
border-radius:10px;
margin-top:10px;
background:#fff;
}
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:999;
}
.modalBox{
width:95%;
max-width:420px;
background:#1e293b;
padding:15px;
border-radius:12px;
}
</style>

<body>

<!-- LOGIN -->
<div id="telaLogin" style="display:flex;justify-content:center;align-items:center;height:100vh">
<div class="card">
<h2>🚗 Veículo PRO</h2>
<input id="user">
<input id="pass" type="password">
<button class="btnSave" onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none">

<div class="headerApp">
<div class="menuTabs">
<button onclick="abrirTela('combustivel')">⛽</button>
<button onclick="abrirTela('motorista')">👨</button>
<button onclick="abrirTela('veiculo')">🚗</button>
<button onclick="abrirTela('posto')">🏪</button>
</div>
</div>

<!-- DASHBOARD -->
<div class="card">
<h3>📊 Dashboard</h3>
<canvas id="graficoConsumo"></canvas>
<canvas id="graficoGasto"></canvas>
</div>

<!-- ABASTECIMENTO -->
<div id="tela_combustivel" class="tela">
<div class="card">
<select id="veiculoSel"></select>
<input id="data" type="date">
<select id="postoSel"></select>
<input id="valor">
<input id="litros">
<input id="valor_litro">
<input id="km">
<button class="btnSave" onclick="salvar()">Salvar</button>
</div>
<div id="lista"></div>
</div>

<!-- MOTORISTA -->
<div id="tela_motorista" class="tela" style="display:none">
<div class="card">
<button class="btnEdit" onclick="editarMotorista('${x.id}','${x.nome}','${x.telefone}','${x.cpf}')">✏️</button>
<input id="m_nome" placeholder="Nome">
<input id="m_cpf" placeholder="CPF">
<input id="m_tel" placeholder="Telefone">
<button class="btnSave" onclick="salvarMotorista()">Salvar</button>
</div>
<div id="listaMotoristas"></div>
<button onclick="cancelarMotorista()" style="background:#64748b;color:#fff;width:100%;margin-top:6px">Cancelar</button>
</div>

<!-- VEICULO -->
<div id="tela_veiculo" class="tela" style="display:none">
<div class="card">
<input id="v_placa" placeholder="Placa">
<input id="v_marca" placeholder="Marca">
<input id="v_modelo" placeholder="Modelo">
<input id="v_ano" placeholder="Ano">
<input id="v_cor" placeholder="Cor">
<input id="v_renavam" placeholder="Renavam">
<input id="v_combustivel" placeholder="Combustível">
<input id="v_km" placeholder="KM Atual">
<input id="v_ipva" type="date">
<input id="v_licenciamento" type="date">
<select id="v_motorista"></select>
<button class="btnSave" onclick="salvarVeiculo()">Salvar</button>
</div>
<div id="listaVeiculos"></div>
</div>

<!-- POSTO -->
<div id="tela_posto" class="tela" style="display:none">
<div class="card">
<input id="p_nome" placeholder="Posto">
<input id="p_cnpj" placeholder="CNPJ">
<input id="p_cidade" placeholder="Cidade">
<button class="btnSave" onclick="salvarPosto()">Salvar</button>
</div>
<div id="listaPostos"></div>
</div>

<div class="footerBar">
<button onclick="logout()" class="btnLogout">Sair</button>
</div>

</div>

<script>
/* 003 CONFIG */
const db=supabase.createClient(
"https://gspdlrenyrzbkxlvyugc.supabase.co",
"sb_publishable_MQRr8O1saGmGz3nsMg1g-Q_8ZIK6yrw"
)

/* 004 ESTADO */
let VID=null,graficoConsumo,graficoGasto

/* 005 UTILS */
function fData(d){
if(!d)return "-"
let x=d.split("T")[0].split("-")
return x[2]+"/"+x[1]+"/"+x[0].slice(2)
}

/* 006 LOGIN */
async function login(){
let {data}=await db.from("usuarios").select("*").eq("usuario_apelido",user.value)
if(!data?.length)return alert("Erro")
if(data[0].senha_hash!==pass.value)return alert("Senha")
localStorage.setItem("empresa",data[0].empresa_id)
init()
}

/* 007 INIT */
async function init(){
telaLogin.style.display="none";app.style.display="block"
await carregarTudo()
render()
}

/* 008 UI */
function abrirTela(t){
document.querySelectorAll(".tela").forEach(e=>e.style.display="none")
document.getElementById("tela_"+t).style.display="block"
}

/* 009 CARREGAR */
async function carregarTudo(){
if(window.e_posto){
e_posto.innerHTML=postoSel.innerHTML
}
let emp=localStorage.getItem("empresa")

let {data:m=[]}=await db.from("motoristas").select("*").eq("empresa_id",emp)
listaMotoristas.innerHTML=m.map(x=>`
<div class="item">
<div>${x.nome} | ${x.telefone||"-"}</div>
<div class="actions">
<button class="btnEdit" onclick="editarMotorista('${x.id}','${x.nome}','${x.telefone}')">✏️</button>
<button class="btnDel" onclick="excluir('motoristas','${x.id}')">🗑</button>
</div></div>`).join("")
v_motorista.innerHTML=m.map(x=>`<option value="${x.id}">${x.nome}</option>`).join("")

let {data:p=[]}=await db.from("postos").select("*").eq("empresa_id",emp)
listaPostos.innerHTML=p.map(x=>`
<div class="item">
<div>${x.nome_posto} | ${x.cidade||"-"}</div>
<div class="actions">
<button class="btnEdit" onclick="editarPosto('${x.id}','${x.nome_posto}')">✏️</button>
<button class="btnDel" onclick="excluir('postos','${x.id}')">🗑</button>
</div></div>`).join("")
postoSel.innerHTML=p.map(x=>`<option value="${x.id}">${x.nome_posto}</option>`).join("")

let {data:v=[]}=await db.from("veiculos").select("*").eq("empresa_id",emp)
veiculoSel.innerHTML=v.map(x=>`<option value="${x.id}">${x.modelo}</option>`).join("")
VID=v?.[0]?.id
listaVeiculos.innerHTML=v.map(x=>`
<div class="item">
<div><b>${x.modelo||"-"}</b> | ${x.placa||"-"}</div>
<div class="row"><span>Marca</span><span>${x.marca||"-"}</span></div>
<div class="row"><span>Ano</span><span>${x.ano||"-"}</span></div>
<div class="row"><span>Cor</span><span>${x.cor||"-"}</span></div>
<div class="row"><span>Renavam</span><span>${x.renavam||"-"}</span></div>
<div class="row"><span>Combustível</span><span>${x.combustivel_principal||"-"}</span></div>
<div class="row"><span>KM</span><span>${x.km_atual||"-"}</span></div>
<div class="row"><span>IPVA</span><span>${x.vencimento_ipva||"-"}</span></div>
<div class="row"><span>Licenciamento</span><span>${x.vencimento_licenciamento||"-"}</span></div>

<div class="actions">
<button class="btnEdit" onclick="editarVeiculo(
'${x.id}',
'${x.placa||""}',
'${x.marca||""}',
'${x.modelo||""}',
'${x.ano||""}',
'${x.cor||""}',
'${x.renavam||""}',
'${x.combustivel_principal||""}',
'${x.km_atual||""}',
'${x.vencimento_ipva||""}',
'${x.vencimento_licenciamento||""}',
'${x.motorista_id||""}'
)">✏️</button>

<button class="btnDel" onclick="excluir('veiculos','${x.id}')">🗑</button>
</div>

</div>
`).join("")
}

/* 010 SALVAR */
async function salvar(){
await db.from("abastecimentos").insert({
empresa_id:localStorage.getItem("empresa"),
veiculo_id:VID,
posto_id:postoSel.value,
valor_total:valor.value,
litros:litros.value,
quilometragem:km.value,
data_abastecimento:data.value
})
render()
}

/* 011 RENDER */
async function render(){
let {data=[]}=await db.from("abastecimentos")
.select("*,postos(nome_posto)")
.eq("veiculo_id",VID)
.order("data_abastecimento",{ascending:false})

lista.innerHTML=data.map(a=>`
<div class="item">
<div>${fData(a.data_abastecimento)} | ${a.postos?.nome_posto||"-"}</div>
<div>Total: ${a.valor_total} | Litros: ${a.litros}</div>
<div class="actions">
<button class="btnEdit">✏️</button>
<button class="btnDel" onclick="excluir('abastecimentos','${a.id}')">🗑</button>
</div>
</div>`).join("")

renderDashboard(data)
}

/* 012 DASHBOARD */
function renderDashboard(d){
let labels=d.map(x=>fData(x.data_abastecimento))
let gastos=d.map(x=>x.valor_total)

if(graficoConsumo)graficoConsumo.destroy()
if(graficoGasto)graficoGasto.destroy()

graficoConsumo=new Chart(graficoConsumoEl,{type:"line",data:{labels,datasets:[{label:"Consumo",data:gastos}]}})
graficoGasto=new Chart(graficoGastoEl,{type:"bar",data:{labels,datasets:[{label:"Gastos",data:gastos}]}})
}

/* CRUD */
async function salvarMotorista(){
let payload={
empresa_id:localStorage.getItem("empresa"),
nome:m_nome.value||"",
telefone:m_tel.value||"",
cpf:(typeof m_cpf!=="undefined" && m_cpf)?m_cpf.value:""
}
if(window.editMotoristaId){
await db.from("motoristas").update(payload).eq("id",window.editMotoristaId)
window.editMotoristaId=null
}else{
await db.from("motoristas").insert(payload)
}
m_nome.value=""
m_tel.value=""
if(typeof m_cpf!=="undefined" && m_cpf)m_cpf.value=""
await carregarTudo()
}

function cancelarMotorista(){
window.editMotoristaId=null
m_nome.value=""
m_tel.value=""
m_cpf.value=""
}

async function salvarVeiculo(){
let payload={
empresa_id:localStorage.getItem("empresa"),
placa:v_placa.value,
marca:v_marca.value,
modelo:v_modelo.value,
ano:parseInt(v_ano.value)||null,
cor:v_cor.value,
renavam:v_renavam.value,
combustivel_principal:v_combustivel.value,
km_atual:parseFloat(v_km.value)||0,
vencimento_ipva:v_ipva.value||null,
vencimento_licenciamento:v_licenciamento.value||null,
motorista_id:v_motorista.value||null
}
/* UPDATE */
if(window.editVeiculoId){
await db.from("veiculos").update(payload).eq("id",window.editVeiculoId)
window.editVeiculoId=null
}else{
/* INSERT */
await db.from("veiculos").insert(payload)
}
/* LIMPA */
v_placa.value=""
v_marca.value=""
v_modelo.value=""
v_ano.value=""
v_cor.value=""
v_renavam.value=""
v_combustivel.value=""
v_km.value=""
v_ipva.value=""
v_licenciamento.value=""
/* RELOAD */
await carregarTudo()
}

async function salvarPosto(){
let payload={
empresa_id:localStorage.getItem("empresa"),
nome_posto:p_nome.value,
cidade:p_cidade.value,
cnpj:p_cnpj.value
}
if(editPostoId){
await db.from("postos").update(payload).eq("id",editPostoId)
editPostoId=null
}else{
await db.from("postos").insert(payload)
}
carregarTudo()
}
window.editarPosto=function(id,nome,cidade,cnpj){
window.editPostoId=id
p_nome.value=nome||""
p_cidade.value=cidade||""
p_cnpj.value=cnpj||""
}

window.editVeiculoId=null
window.editarVeiculo=function(
id,placa,marca,modelo,ano,cor,renavam,comb,kilometragem,ipva,lic,motorista){
window.editVeiculoId=id
v_placa.value=placa||""
v_marca.value=marca||""
v_modelo.value=modelo||""
v_ano.value=ano||""
v_cor.value=cor||""
v_renavam.value=renavam||""
v_combustivel.value=comb||""
v_km.value=kilometragem||""
v_ipva.value=(ipva||"").split("T")[0]
v_licenciamento.value=(lic||"").split("T")[0]
v_motorista.value=motorista||""
}

window.editarAbastecimento=function(id,valor,litros,km,data,posto){
window.editAbastecimentoId=id
modalEditar.style.display="flex"
e_valor.value=valor||""
e_litros.value=litros||""
e_km.value=km||""
e_data.value=(data||"").split("T")[0]
e_posto.value=posto||""
}

window.editMotoristaId=null
window.editarMotorista=function(id,nome,tel,cpf){
window.editMotoristaId=id
if(typeof m_nome!=="undefined" && m_nome){
m_nome.value=nome||""
}
if(typeof m_tel!=="undefined" && m_tel){
m_tel.value=tel||""
}
if(typeof m_cpf!=="undefined" && m_cpf){
m_cpf.value=cpf||""
}
}

async function excluir(t,id){
if(!confirm("Excluir?"))return
/* 🔒 NÃO APAGAR ABASTECIMENTOS (DADOS CONSOLIDADOS) */
if(t==="abastecimentos"){
alert("⚠️ Registro consolidado não pode ser excluído.\nUse edição.")
return
}
/* 🔒 PROTEÇÃO EXTRA */
let {data}=await db.from(t).select("id").eq("id",id).limit(1)
if(!data||!data.length){
alert("Registro não encontrado")
return
}
await db.from(t).delete().eq("id",id)
await carregarTudo()
render()
}
/* LOGOUT */
function logout(){localStorage.clear();location.reload()}

/* START */
document.addEventListener("DOMContentLoaded",()=>{
window.graficoConsumoEl=document.getElementById("graficoConsumo")
window.graficoGastoEl=document.getElementById("graficoGasto")
if(localStorage.getItem("empresa"))init()
})
let editId=null

function abrirEditar(id,valor,litros,km,data,posto){
editId=id
modalEditar.style.display="flex"

/* preenche */
e_valor.value=valor||""
e_litros.value=litros||""
e_km.value=km||""
e_data.value=(data||"").split("T")[0]||""
e_posto.value=posto||""
}


async function salvarEdicao(){
await db.from("abastecimentos").update({
valor_total:parseFloat(e_valor.value)||0,
litros:parseFloat(e_litros.value)||0,
quilometragem:parseFloat(e_km.value)||0,
posto_id:e_posto.value||null,
data_abastecimento:e_data.value
}).eq("id",editAbastecimentoId)

modalEditar.style.display="none"
render()
}

function fecharEditar(){
modalEditar.style.display="none"
}

  
</script>

<div id="modalEditar" class="modal">
<div class="modalBox">
<h3>Editar Abastecimento</h3>
<input id="e_data" type="date">
<select id="e_posto"></select>
<input id="e_valor">
<input id="e_litros">
<input id="e_km">
<div class="actions">
<button class="btnSave" onclick="salvarEdicao()">Salvar</button>
<button class="btnDel" onclick="fecharEditar()">Cancelar</button>
</div>
</div>
</div>
</body>
</html>
