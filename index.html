<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>VEÍCULOS - Controle Total (Audit V3)</title>
<link rel="icon" href="data:,">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
:root { --bg: #0f172a; --card: #1e293b; --accent: #22c55e; --danger: #ef4444; --border: #334155; --text: #f8fafc; }
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; width: 100vw; overflow: hidden; }
#login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://raw.githubusercontent.com/comunicasindico/veiculos/main/img/bcveiculos.png') no-repeat center center fixed; background-size: cover; display: flex; justify-content: center; align-items: center; z-index: 9999; }
.login-box { width: 380px; background: rgba(15, 23, 42, 0.9); padding: 35px; border-radius: 20px; text-align: center; border: 1px solid var(--border); backdrop-filter: blur(10px); }
.login-box h2 { color: var(--accent); margin-bottom: 25px; font-size: 24px; text-transform: uppercase; }
.btn-create { background: var(--danger) !important; color: #fff !important; margin-bottom: 10px !important; }
#app { display: none; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.top-header { background: var(--card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
.btn-edit-mode { background: #4a90e2; color: #fff; width: auto !important; padding: 8px 15px !important; }
.container { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; gap: 15px; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
.card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
.kpi-val { font-size: 2em; font-weight: bold; color: var(--accent); display: block; margin-top: 5px; }
.tabs { display: flex; gap: 8px; overflow-x: auto; padding: 10px; background: var(--card); border-bottom: 1px solid var(--border); }
.tab-btn { flex: 1; min-width: 130px; padding: 10px; background: #0f172a; color: #fff; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
.tab-btn.active { background: var(--accent); color: #000; font-weight: bold; }
input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: #fff; font-size: 15px; }
button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border: none; }
.actions-cell { display: none; gap: 5px; justify-content: center; }
.editing .actions-cell { display: flex; }
.btn-mini { padding: 4px 8px; font-size: 11px; width: auto; margin: 0; }
.btn-sair { background: var(--danger); color: #fff !important; width: auto !important; padding: 8px 15px !important; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
th { background: var(--border); color: var(--accent); position: sticky; top: 0; }
@media (max-width: 768px) { body { overflow: auto; } #app { height: auto; } }
</style>
</head>
<body>
<div id="login-screen">
<div class="login-box">
<h2>VEÍCULOS<br><span style="font-size: 14px; color: #fff;">Controle Total</span></h2>
<input type="text" id="user" placeholder="Usuário">
<input type="password" id="pass" placeholder="Senha">
<button class="btn-create" onclick="alert('Auditoria: Contate Admin.')">CRIAR CONTA</button>
<button onclick="login()">ACESSAR O PAINEL</button>
<p style="font-size: 11px; color: #94a3b8; margin-top: 15px;">PIX: 69 984311978 | Auditor: Neto</p>
</div>
</div>
<div id="app">
<div class="top-header">
<span id="header-title">AUDITORIA: MANOEL FERNANDES NETO</span>
<div>
<button class="btn-edit-mode" onclick="toggleEditMode()">🛠️ EDITAR</button>
<button class="btn-sair" onclick="location.reload()">SAIR</button>
</div>
</div>
<div class="tabs">
<button class="tab-btn active" onclick="showTab('tab-dash', event)">📊 Dashboard</button>
<button class="tab-btn" onclick="showTab('tab-abast', event)">⛽ Abastecimentos</button>
<button class="tab-btn" onclick="showTab('tab-veic', event)">🚗 Veículos</button>
<button class="tab-btn" onclick="showTab('tab-posto', event)">🏪 Postos</button>
</div>
<div id="tab-dash" class="container tab-content">
<div class="kpi-grid">
<div class="card">Km/L Médio <span id="kpi-kml" class="kpi-val">--</span></div>
<div class="card">Custo/Km <span id="kpi-custokm" class="kpi-val">--</span></div>
<div class="card">Gasto Total <span id="kpi-total" class="kpi-val">--</span></div>
</div>
<div class="card"><canvas id="mainChart" height="200"></canvas></div>
</div>
<div id="tab-abast" class="container tab-content" style="display:none;">
<div class="card table-wrapper">
<table id="tbl-abast">
<thead><tr><th>Data</th><th>Posto</th><th>Litros</th><th>Km Atual</th><th>Total</th><th class="actions-cell">Ações</th></tr></thead>
<tbody></tbody>
</table>
</div>
</div>
<div id="tab-veic" class="container tab-content" style="display:none;">
<div class="card table-wrapper">
<table id="tbl-veic"><thead><tr><th>ID</th><th>Placa</th><th>Modelo</th><th class="actions-cell">Ações</th></tr></thead><tbody></tbody></table>
</div>
</div>
<div id="tab-posto" class="container tab-content" style="display:none;">
<div class="card table-wrapper">
<table id="tbl-posto"><thead><tr><th>ID</th><th>Nome</th><th>CNPJ</th><th class="actions-cell">Ações</th></tr></thead><tbody></tbody></table>
</div>
</div>
</div>
<script>
let isEditMode = false;
let data = {
veiculo_veiculos: [{id:'58fdc6af-0156-40b7-a628-4799ffab108a', placa:'TIGGO8', modelo:'Chery Tiggo 8'}],
postos_veiculos: [
{id:'11ee0d59-f467-4592-a2c2-703443739374', nome:'Posto Simon Ltda', cnpj:'15.636.643/0001-01'},
{id:'19e5eda2-8ff2-41e7-ba3c-2371e2f93e71', nome:'AutoPosto Santa Marta', cnpj:'33.899.213/0001-56'}
],
abastecimento_veiculos: [
{id:'02061ec1-aa1b-4f54-be0a-9c7b20ac02ba', data:'2026-03-16', posto:'Posto Premier', litros:42.09, km:5336, total:268.96},
{id:'0da08a23-7adb-446a-bcaf-911a06637e09', data:'2025-09-20', posto:'Gas Station Tubarao', litros:44.88, km:200, total:309.19},
{id:'13d0044c-e463-4433-88f3-8cb4c10fdc09', data:'2026-01-05', posto:'Rede São Marcos', litros:37.82, km:3050, total:221.25}
]
};
function login() {
const u = document.getElementById('user').value.toLowerCase();
const p = document.getElementById('pass').value;
if(u === 'neto' && p === '1234') {
document.getElementById('login-screen').style.display = 'none';
document.getElementById('app').style.display = 'flex';
renderTables(); updateDash(); renderChart();
} else { alert('Acesso Negado.'); }
}
function toggleEditMode() {
isEditMode = !isEditMode;
document.body.classList.toggle('editing', isEditMode);
}
function updateDash() {
const totalVal = data.abastecimento_veiculos.reduce((s, a) => s + a.total, 0);
document.getElementById('kpi-total').innerText = 'R$ ' + totalVal.toFixed(2);
document.getElementById('kpi-kml').innerText = '8.45';
document.getElementById('kpi-custokm').innerText = 'R$ 0.680';
}
function renderTables() {
const abBody = document.querySelector('#tbl-abast tbody');
abBody.innerHTML = data.abastecimento_veiculos.map(a => `<tr>
<td>${a.data}</td><td>${a.posto}</td><td>${a.litros}L</td><td>${a.km}</td><td>R$ ${a.total}</td>
<td class="actions-cell"><button class="btn-mini">✏️</button><button class="btn-mini" style="background:var(--danger)">🗑️</button></td></tr>`).join('');
document.querySelector('#tbl-veic tbody').innerHTML = data.veiculo_veiculos.map(v => `<tr><td>${v.id.substring(0,8)}</td><td>${v.placa}</td><td>${v.modelo}</td><td class="actions-cell"><button class="btn-mini">✏️</button></td></tr>`).join('');
document.querySelector('#tbl-posto tbody').innerHTML = data.postos_veiculos.map(p => `<tr><td>${p.id.substring(0,8)}</td><td>${p.nome}</td><td>${p.cnpj}</td><td class="actions-cell"><button class="btn-mini">✏️</button></td></tr>`).join('');
}
function renderChart() {
const ctx = document.getElementById('mainChart').getContext('2d');
new Chart(ctx, { type: 'bar', data: { labels: ['Set', 'Out', 'Nov', 'Dez', 'Jan', 'Fev', 'Mar'], datasets: [{ label: 'Gasto Mensal R$', data: [309, 238, 292, 234, 265, 157, 268], backgroundColor: '#22c55e' }] }, options: { responsive: true, maintainAspectRatio: false } });
}
function showTab(id, e) {
document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
document.getElementById(id).style.display = 'flex'; e.target.classList.add('active');
}
</script>
</body>
</html>
