<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco Comunica - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif}
    body,html{height:100%;background-color:#000;display:flex;justify-content:center;align-items:center}
    .background-overlay{position:fixed;top:0;left:0;width:100%;height:100%;
      background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)), url('img/bcveiculos.png');
      background-size:cover;background-position:center;z-index:-1}
    .container{width:100%;max-width:400px;padding:20px;text-align:center}
    .header{margin-bottom:40px;color:#fff}
    .logo-box{display:inline-block;border:2px solid #C19A5B;padding:10px 15px;border-radius:8px;
      font-size:32px;font-weight:bold;color:#C19A5B;margin-bottom:10px}
    .brand-name{font-size:24px;letter-spacing:3px;line-height:1}
    .brand-sub{font-size:26px;font-weight:700;color:#C19A5B;display:block}
    .divider{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:5px}
    .line{height:1px;width:40px;background-color:#C19A5B}
    .divider span{font-size:10px;letter-spacing:5px}
    .slogan{font-size:10px;margin-top:15px;letter-spacing:1px;text-transform:uppercase}
    .slogan span{color:#C19A5B}
    .login-card{background:rgba(18,18,18,0.85);backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.1);border-radius:25px;padding:30px;text-align:left}
    .login-card h2{color:#fff;font-size:22px;margin-bottom:5px}
    .login-card p{color:#aaa;font-size:13px;margin-bottom:25px}
    .input-group{position:relative;margin-bottom:15px}
    .input-group i{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#666}
    .input-group input{width:100%;background:#121212;border:1px solid #333;border-radius:10px;
      padding:15px 15px 15px 45px;color:#fff;outline:none}
    .input-group .eye-icon{left:auto;right:15px;cursor:pointer}
    .options{display:flex;justify-content:space-between;align-items:center;font-size:11px;margin-bottom:25px}
    .remember{color:#aaa;display:flex;align-items:center;gap:5px}
    .remember input{accent-color:#C19A5B}
    .forgot{color:#C19A5B;text-decoration:none}
    .btn-entrar{width:100%;background:#C19A5B;color:#000;border:none;padding:15px;border-radius:10px;
      font-weight:bold;font-size:14px;cursor:pointer;transition:.3s}
    .btn-entrar:hover{background:#d4ae6d}
    .no-account{color:#fff;font-size:12px;text-align:center;margin:20px 0;display:block}
    .btn-outline{width:100%;background:transparent;color:#C19A5B;border:1px solid #C19A5B;
      padding:15px;border-radius:10px;font-weight:bold;font-size:14px;cursor:pointer;text-decoration:none;display:block;text-align:center}
    .footer-security{margin-top:20px;color:#aaa;font-size:11px;display:flex;align-items:center;justify-content:center;gap:8px}
    .footer-security i{color:#C19A5B}
  </style>
</head>
<body>
  <div class="background-overlay"></div>
  <div class="container">
    <div class="header">
      <div class="logo-box">B</div>
      <div class="brand-name">BANCO</div>
      <div class="brand-sub">COMUNICA</div>
      <div class="divider"><div class="line"></div><span>VEÍCULOS</span><div class="line"></div></div>
      <p class="slogan">O BANCO QUE <span>MOVE</span> VOCÊ</p>
    </div>
    <div class="login-card">
      <h2>Bem-vindo!</h2>
      <p>Acesse sua conta para continuar</p>
      <div class="input-group">
        <i class="fa-regular fa-envelope"></i>
        <input id="user" type="text" placeholder="E-mail ou CPF">
      </div>
      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input id="pass" type="password" placeholder="Senha">
        <i class="fa-regular fa-eye eye-icon" onclick="toggleSenha()"></i>
      </div>
      <div class="options">
        <label class="remember"><input type="checkbox" checked> Lembrar meu acesso</label>
        <a href="#" class="forgot">Esqueci minha senha</a>
      </div>
      <button class="btn-entrar" onclick="login()">ENTRAR</button>
      <span class="no-account">Ainda não tem uma conta?</span>
      <a href="#" class="btn-outline">CRIAR CONTA</a>
    </div>
    <div class="footer-security">
      <i class="fa-solid fa-shield-halved"></i> Seus dados protegidos com segurança
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://gspdlrenyrzbkxlvyugc.supabase.co";
    const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzcGRscmVueXJ6Ymt4bHZ5dWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODU0NzAsImV4cCI6MjA5MDQ2MTQ3MH0.UWfkWvOh4qMDEcByVL-KZ6ejJ80V7wJlDOFH76TywaI"const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function login(){
      const usuario = document.getElementById("user").value;
      const senha = document.getElementById("pass").value;
      let { data, error } = await db.from("usuarios").select("*").eq("usuario_apelido", usuario);
      if(error){ alert("Erro de conexão: "+error.message); return; }
      if(!data.length){ alert("Usuário não encontrado"); return; }
      if(data[0].senha_hash !== senha){ alert("Senha incorreta"); return; }
      localStorage.setItem("empresa", data[0].empresa_id);
      window.location.href = "app.html";
    }
    function toggleSenha(){
      const campo = document.getElementById("pass");
      campo.type = campo.type === "password" ? "text" : "password";
    }
  </script>
</body>
</html>
