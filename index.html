<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Banco Comunica - Veículos PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{background:#020617;color:#fff}
body.login{background:url("img/bcveiculos.png") center/cover no-repeat fixed;display:flex;justify-content:center;align-items:center;height:100vh}
#telaLogin{width:100%;max-width:420px;background:rgba(0,0,0,0.75);padding:24px;border-radius:22px}
input,select{width:100%;padding:12px;margin-top:8px;border-radius:12px;border:none;background:#1e293b;color:#fff}
button{padding:12px;border-radius:12px;border:none;font-weight:bold}
.btn{background:#facc15;color:#000;width:100%}
#app{display:none;padding-bottom:90px}
.card{background:#0f172a;padding:12px;border-radius:14px;margin-bottom:10px}
#menu{position:fixed;bottom:10px;width:100%;display:flex;justify-content:center;gap:10px}
.btnFloat{width:58px;height:58px;border-radius:16px;background:#1e293b;color:#fff;font-size:22px}
.btnSair{background:#dc2626}
</style>
</head>

<body class="login">

<div id="telaLogin">
<h2 style="text-align:center;color:#facc15">BANCO COMUNICA</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button class="btn" onclick="login()">Entrar</button>
</div>

<div id="app">

<div class="card">
<select id="veiculoSel"></select>
<input id="data" type="date">
<input id="valor" placeholder="Valor">
<input id="litros" placeholder="Litros">
<input id="km" placeholder="KM">
<button class="btn" onclick="salvar()">Salvar</button>
</div>

<div class="card">
<h3>📊 Dashboard</h3>
<div id="kpis"></div>
<canvas id="grafico"></canvas>
</div>

<div id="lista"></div>

</div>

<div id="menu">
<button class="btnFloat" onclick="render()">⛽</button>
<button class="btnFloat btnSair" onclick="logout()">🚪</button>
</div>

<script>

/* CONFIGURAÇÃO SUPABASE */
const SUPABASE_URL = "https://gspdlrenyrzbkxlvyugc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzcGRscmVueXJ6Ymt4bHZ5dWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODU0NzAsImV4cCI6MjA5MDQ2MTQ3MH0.UWfkWvOh4qMDEcByVL-KZ6ejJ80V7wJlDOFH76TywaI";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* LOGIN CORRIGIDO E ESTÁVEL */
async function login(){

let usuario=(document.getElementById("user").value||"").trim()
let senha=(document.getElementById("pass").value||"").trim()

if(!usuario||!senha){
alert("Informe usuário e senha")
return
}

let {data,error}=await db
.from("usuarios")
.select("*")
.eq("usuario_apelido",usuario)

if(error){
console.error(error)
alert("Erro conexão")
return
}

if(!data||!data.length){
alert("Usuário não encontrado")
return
}

/* 🔥 evita erro com múltiplos registros */
let userDB=data[0]

if(userDB.senha_hash!==senha){
alert("Senha incorreta")
return
}

/* 🔥 SALVA SESSÃO COMPLETA */
localStorage.setItem("empresa",userDB.empresa_id||"")
localStorage.setItem("usuario",userDB.usuario_apelido||"")
localStorage.setItem("login_time",Date.now())

/* 🔥 LIBERA APP */
document.body.classList.remove("login")
document.getElementById("telaLogin").style.display="none"
document.getElementById("app").style.display="block"

/* 🔥 GARANTE QUE NÃO QUEBRE */
if(typeof init==="function"){
await init()
}else{
console.warn("init() não encontrada")
}

}

/* INIT */
async function init(){
await carregarVeiculos()
await render()
}

/* VEÍCULOS */
async function carregarVeiculos(){
let emp=localStorage.getItem("empresa")

let {data,error}=await db
.from("veiculos")
.select("*")
.eq("empresa_id",emp)

if(error){
console.error("Erro veículos:",error)
veiculoSel.innerHTML="<option>Erro</option>"
return
}

if(!data)data=[]

veiculoSel.innerHTML=data.length
?data.map(v=>`<option value="${v.id}">${v.modelo||"-"}</option>`).join("")
:"<option>Nenhum veículo</option>"
}

/* SALVAR */
async function salvar(){

let emp=localStorage.getItem("empresa")

let payload={
empresa_id:emp,
veiculo_id:veiculoSel.value,
data_abastecimento:document.getElementById("data").value,
valor_total:parseFloat(valor.value)||0,
litros:parseFloat(litros.value)||0,
quilometragem:parseFloat(km.value)||0
}

let {error}=await db.from("abastecimentos").insert(payload)

if(error){
console.error("Erro salvar:",error)
alert("Erro ao salvar")
return
}

valor.value=""
litros.value=""
km.value=""

await render()
}

/* RENDER */
async function render(){

let emp=localStorage.getItem("empresa")

let {data,error}=await db
.from("abastecimentos")
.select("*")
.eq("empresa_id",emp)
.order("data_abastecimento",{ascending:false})

if(error){
console.error("Erro render:",error)
return
}

if(!data)data=[]

lista.innerHTML=data.map(a=>`
<div class="card">
<b>${a.data_abastecimento||"-"}</b><br>
R$ ${(a.valor_total||0).toFixed(2)} | ${(a.litros||0)}L | KM ${(a.quilometragem||0)}
</div>`).join("")

renderDashboard([...data]) /* clone pra não inverter lista */
}

/* DASHBOARD */
let chart

function renderDashboard(data){

let total=0
let litros=0
let labels=[]
let valores=[]

data.reverse().forEach(d=>{
total+=parseFloat(d.valor_total||0)
litros+=parseFloat(d.litros||0)
labels.push(d.data_abastecimento||"")
valores.push(d.valor_total||0)
})

kpis.innerHTML=`
<div>Total R$ ${total.toFixed(2)}</div>
<div>Litros ${litros.toFixed(1)}</div>
`

if(chart)chart.destroy()

chart=new Chart(grafico,{
type:"line",
data:{
labels:labels,
datasets:[{
data:valores,
borderColor:"#facc15",
backgroundColor:"rgba(250,204,21,0.2)",
fill:true,
tension:.3
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
y:{ticks:{color:"#94a3b8"}},
x:{ticks:{color:"#94a3b8"}}
}
}
})
}

/* LOGOUT */
function logout(){
localStorage.clear()
location.reload()
}

/* START */
document.addEventListener("DOMContentLoaded",()=>{

let inputData=document.getElementById("data")

if(inputData){
let hoje=new Date()
let offset=hoje.getTimezoneOffset()
hoje=new Date(hoje.getTime()-offset*60000)
inputData.value=hoje.toISOString().slice(0,10)
}

if(localStorage.getItem("empresa")){
document.body.classList.remove("login")
telaLogin.style.display="none"
app.style.display="block"
init()
}

})

</script>
</body>
</html>
