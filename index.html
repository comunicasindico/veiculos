function autoCalc(valorId,litrosId,vlId){
const v=document.getElementById(valorId)
const l=document.getElementById(litrosId)
const vl=document.getElementById(vlId)
let lock=false
function calc(from){
if(lock)return
lock=true
let valor=parseFloat(v.value)
let litros=parseFloat(l.value)
let valorL=parseFloat(vl.value)
if(from==="valor"||from==="litros"){
if(valor && litros){vl.value=(valor/litros).toFixed(3)}
}
if(from==="vl"){
if(valorL && litros){v.value=(valorL*litros).toFixed(2)}
}
lock=false
}
v.addEventListener("input",()=>calc("valor"))
l.addEventListener("input",()=>calc("litros"))
vl.addEventListener("input",()=>calc("vl"))
}

m_tel.value=""
m_email.value=""
m_obs.value=""
}
async function salvarMotorista(){
let payload={
empresa_id:localStorage.getItem("empresa"),
usuario_id:localStorage.getItem("uid"),
nome:(m_nome.value||"").trim(),
cpf:(m_cpf.value||"").trim(),
numero_cnh:(m_cnh.value||"").trim(),
categoria_cnh:"B",
validade_cnh:(m_validade.value||"").trim(),
telefone:(m_tel.value||"").trim(),
email:(m_email.value||"").trim(),
observacoes:(m_obs.value||"").trim()
}
console.log("Payload:",payload)
let resp
if(editMotoristaId){
resp=await db.from("motoristas").update(payload).eq("id",editMotoristaId)
}else{
resp=await db.from("motoristas").insert(payload)
}
if(resp.error){
console.error(resp.error)
alert("Erro: "+resp.error.message)
return
}
editMotoristaId=null
novoMotorista()
carregarCadastros()
}


</script>
