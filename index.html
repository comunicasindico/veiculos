<script>
function calcularIndicadores(lista){
if(!lista.length)return null
let totalGasto=0
let totalLitros=0
let consumos=[]
let totalKm=0
for(let i=0;i<lista.length;i++){
let atual=lista[i]
let anterior=lista[i+1]
totalGasto+=Number(atual.valor_total||0)
totalLitros+=Number(atual.litros||0)
if(anterior && atual.quilometragem && anterior.quilometragem){
let km=atual.quilometragem-anterior.quilometragem
if(km>0 && atual.litros>0){
let consumo=km/atual.litros
consumos.push(consumo)
totalKm+=km
}
}
}
let mediaConsumo=consumos.length?(consumos.reduce((a,b)=>a+b,0)/consumos.length):0
let melhor=Math.max(...consumos,0)
let pior=Math.min(...consumos,0)
let custoKm=totalKm>0?(totalGasto/totalKm):0
return{
totalGasto,
totalLitros,
mediaConsumo,
melhor,
pior,
custoKm,
totalAbastecimentos:lista.length
}
}
function renderKPIs(d){
let el=document.getElementById("kpis")
if(!el||!d)return
let total=Number(d.totalGasto||0)
let litros=Number(d.totalLitros||0)
let media=Number(d.mediaConsumo||0)
let custo=Number(d.custoKm||0)
let melhor=Number(d.melhor||0)
let pior=Number(d.pior||0)
let qtd=Number(d.totalAbastecimentos||0)
el.innerHTML=`
<div class="item">💰 Total<br><b>R$ ${total.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div class="item">⛽ Litros<br><b>${litros.toLocaleString("pt-BR",{minimumFractionDigits:1})}</b></div>
<div class="item">📈 Km/L<br><b>${media.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div class="item">🚗 Custo/KM<br><b>R$ ${custo.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div class="item">🏆 Melhor<br><b>${melhor.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div class="item">⚠️ Pior<br><b>${pior.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div class="item">📊 Registros<br><b>${qtd}</b></div>
`
}
  
function renderDashboard(lista){
if(!Array.isArray(lista)||!lista.length)return
let dados=[...lista].sort((a,b)=>new Date(b.data_abastecimento)-new Date(a.data_abastecimento))
let labels=dados.map(x=>fData(x.data_abastecimento))
let consumo=[]
for(let i=0;i<dados.length-1;i++){
let atual=dados[i]
let anterior=dados[i+1]
if(atual.tanque!=="cheio")continue
if(anterior.tanque!=="cheio")continue
let kmAtual=Number(atual.quilometragem||0)
let kmAnterior=Number(anterior.quilometragem||0)
let litros=Number(atual.litros||0)
let kmRodado=kmAtual-kmAnterior
if(kmRodado>0 && litros>0){
consumo.push(kmRodado/litros)
}
}
let valores=dados.map(x=>Number(x.valor_total||0))
if(graficoConsumo)graficoConsumo.destroy()
if(graficoGasto)graficoGasto.destroy()
graficoConsumo=new Chart(graficoConsumoEl,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Km/L",
data:consumo,
borderWidth:2,
tension:0.3
}]
},
options:{
plugins:{legend:{display:true}},
scales:{
y:{beginAtZero:true}
}
}
})
const cores=["#22c55e","#3b82f6","#f59e0b","#ef4444","#a855f7","#06b6d4","#84cc16","#f97316","#e11d48","#14b8a6"]
let ano=""
if(dados.length&&dados[0].data_abastecimento){
ano=dados[0].data_abastecimento.split("-")[0]
}
graficoGasto=new Chart(graficoGastoEl,{
type:"bar",
data:{
labels:labels,
datasets:[{
data:valores,
backgroundColor:valores.map((_,i)=>cores[i%cores.length]),
borderRadius:6
}]
},
options:{
plugins:{
legend:{display:false},
title:{display:true,text:"Gastos "+ano}
},
scales:{
y:{
beginAtZero:true,
ticks:{
callback:(v)=>"R$ "+Number(v).toLocaleString("pt-BR")
}
}
}
}
})
let indicadores=calcularIndicadores(dados)
renderKPIs(indicadores)
let auto=calcularAutonomia(lista)
if(auto){
let el=document.getElementById("kpis")
el.innerHTML+=`
<div class="item">🚗 Autonomia<br><b>${auto.autonomia.toFixed(0)} km</b></div>
<div class="item">⛽ Consumo Médio<br><b>${auto.media.toFixed(2)} km/L</b></div>
`
}
}

function calcularAutonomia(lista){
if(!Array.isArray(lista)||lista.length<2)return null
let dados=[...lista].sort((a,b)=>new Date(b.data_abastecimento)-new Date(a.data_abastecimento))
let consumos=[]
for(let i=0;i<dados.length-1;i++){
let a=dados[i],b=dados[i+1]
if(a.tanque!=="cheio"||b.tanque!=="cheio")continue
let kmA=Number(a.quilometragem||0),kmB=Number(b.quilometragem||0),lit=Number(a.litros||0)
let rodado=kmA-kmB
if(rodado>0&&lit>0)consumos.push(rodado/lit)
}
if(!consumos.length)return null
let media=consumos.reduce((x,y)=>x+y,0)/consumos.length
let ultimoKm=Number(dados[0].quilometragem||0)
/* 🔧 ajuste aqui se quiser por veículo no futuro */
let capacidade=60
let autonomia=media*capacidade
return{media,autonomia,capacidade,ultimoKm}
}

/* 006 LOGIN */
async function login(){
let usuario=(user.value||"").trim()
let senha=(pass.value||"").trim()
if(!usuario||!senha){alert("Informe usuário e senha");return}
let {data,error}=await db.from("usuarios").select("*").ilike("usuario_apelido",usuario)
if(error){console.error(error);alert("Erro conexão");return}
if(!data||!data.length){alert("Usuário não encontrado");return}
let userDB=data[0]
if(userDB.senha_hash!==senha){alert("Senha incorreta");return}
localStorage.setItem("empresa",userDB.empresa_id)
init()
}

let selPostoEdit=document.getElementById("e_posto")
let selVeiculo=document.getElementById("veiculoSel")

/* MOTORISTAS */
let {data:m,error:e1}=await db.from("motoristas").select("*").eq("empresa_id",emp)

m=Array.isArray(m)?m:[]

if(selMotorista){
selMotorista.innerHTML=m.length?m.map(x=>`<option value="${x.id}">${x.nome||"-"}</option>`).join(""):`<option value="">Sem motoristas</option>`
}

/* POSTOS */
let {data:p,error:e2}=await db.from("postos").select("*").eq("empresa_id",emp)
if(e2){console.error("postos:",e2);p=[]}
p=Array.isArray(p)?p:[]

function processarCupomInteligente(text){
text=text.replace(/\r/g,"\n").toLowerCase()

/* 🔥 CNPJ */
let cnpj=(text.match(/\d{2}\.\d{3}\.\d{3}\/\d{4}\-\d{2}/)||[""])[0]

/* 🔥 NOME DO POSTO (MELHORADO) */
let nomePosto=""
let matchPosto=text.match(/(?:posto|auto\s?posto|rede)\s+([a-z0-9\s\-]+)/i)
if(matchPosto && matchPosto[1]){
nomePosto=matchPosto[1].trim()
}

/* 🔥 VALORES */
let total=(text.match(/total\s*[r\$]*\s*([\d\.,]+)/)||[])[1]
let litros=(text.match(/(\d+[\.,]\d+)\s*l/)||[])[1]
let valorLitro=(text.match(/(\d+[\.,]\d+)\s*(?:\/l|litro)/)||[])[1]

/* 🔥 KM */
let km=(text.match(/km[\s:]*([\d]{3,7})/)||[])[1]

/* 🔥 COMBUSTÍVEL (MAIS COMPLETO) */
let combustivelRaw=(text.match(/gasolina\s+aditivada|gasolina|etanol|álcool|diesel\s?s10|diesel|gnv/i)||[""])[0]

/* 🔥 NORMALIZA */
if(total)total=total.replace(",",".")
if(litros)litros=litros.replace(",",".")
if(valorLitro)valorLitro=valorLitro.replace(",",".")
if(!valorLitro && total && litros){
valorLitro=(parseFloat(total)/parseFloat(litros)).toFixed(3)
}

/* 🔥 NORMALIZA COMBUSTÍVEL */
let combustivel=normalizarCombustivel(combustivelRaw)

/* 🔥 PREENCHE MODAL CONFIRMAÇÃO */
c_valor.value=total||""
c_litros.value=litros||""
c_valorLitro.value=valorLitro||""
c_km.value=km||""
c_combustivel.value=combustivel||""
c_cnpj.value=cnpj||""
c_posto.value=nomePosto?nomePosto.toUpperCase():""

/* 🔥 BUSCA CNPJ (se existir) */
if(cnpj)buscarPostoPorCNPJ(cnpj)

/* 🔥 ABRE CONFIRMAÇÃO */
modalConfirmacao.style.display="flex"
}

function normalizarCombustivel(c){
c=c.toLowerCase()
if(c.includes("aditiv"))return "Gasolina Aditivada"
if(c.includes("gasolina"))return "Gasolina Comum"
if(c.includes("etanol")||c.includes("alcool"))return "Álcool"
if(c.includes("diesel"))return "Diesel"
if(c.includes("gnv"))return "GNV"
return "Gasolina Comum"
}
  
async function buscarPostoPorCNPJ(cnpj){
try{
let limpo=cnpj.replace(/\D/g,"")
let emp=localStorage.getItem("empresa")

let res=await fetch("https://receitaws.com.br/v1/cnpj/"+limpo)
let json=await res.json()

if(!json.nome)return

let nome=json.nome
let cidade=json.municipio+"-"+json.uf

/* 🔍 VERIFICA EXISTENTE */
let {data}=await db.from("postos")
.select("*")
.eq("cnpj",cnpj)

let postoId=null

if(data && data.length){
postoId=data[0].id
}else{
/* 🆕 CRIA NOVO POSTO */
let {data:novo,error}=await db.from("postos")
.insert({
empresa_id:emp,
nome_posto:nome,
cidade:cidade,
cnpj:cnpj
})
.select()
.single()

if(error){
console.error(error)
return
}

postoId=novo.id
}

/* 🔥 ATUALIZA LISTA */
await carregarTudo()

/* 🔥 SELECIONA AUTOMATICAMENTE */
setTimeout(()=>{
if(window.postoSel && postoId){
postoSel.value=postoId
}
},300)

}catch(e){
console.log("Erro ao buscar CNPJ:",e)
}
}

function confirmarOCR(){
let nomePosto=(c_posto.value||"").trim()
let cnpj=(c_cnpj.value||"").trim()
let emp=localStorage.getItem("empresa")

if(nomePosto){

db.from("postos")

let postoId=null

function validarAbastecimentoAvancado(){
let v=parseFloat(valor.value)||0
let l=parseFloat(litros.value)||0
let kmAtual=parseFloat(km.value)||0
if(v<=0||l<=0)return
let preco=v/l
if(preco>10||preco<2){
alert("⚠️ Valor por litro fora do padrão")
}
if(l>120){
alert("🚨 Volume alto incomum")
}
if(kmAtual<1000){
alert("⚠️ KM muito baixo, verifique")
}
/* 🔥 ALERTA DE POSSÍVEL FRAUDE */
if(preco>8.5){
alert("🚨 Possível combustível adulterado ou erro")
}
}

modalOCR.style.display="none"

function analisarAbastecimentos(lista){
if(!lista||lista.length<2)return null
let dados=[...lista].sort((a,b)=>new Date(b.data_abastecimento)-new Date(a.data_abastecimento))
let alertas=[]
let sugestoes=[]
let consumos=[]
for(let i=0;i<dados.length-1;i++){
let atual=dados[i]
let anterior=dados[i+1]
let kmAtual=Number(atual.quilometragem||0)
let kmAnterior=Number(anterior.quilometragem||0)
let litros=Number(atual.litros||0)
let valor=Number(atual.valor_total||0)
let kmRodado=kmAtual-kmAnterior
if(atual.tanque==="cheio" && anterior.tanque==="cheio" && kmRodado>0 && litros>0){
let consumo=kmRodado/litros
consumos.push(consumo)
if(consumo<5)alertas.push("⚠️ Consumo muito baixo detectado")
if(consumo>20)alertas.push("⚠️ Consumo muito alto (possível erro)")
}
if(valor/litros>10)alertas.push("⚠️ Valor por litro muito alto")
if(kmRodado<0)alertas.push("🚨 KM inconsistente (possível fraude)")
}
let media=consumos.reduce((a,b)=>a+b,0)/consumos.length||0
let ultimo=consumos[0]||0
if(ultimo<media*0.8)sugestoes.push("🔻 Consumo piorou, verificar veículo")
if(ultimo>media*1.2)sugestoes.push("🔺 Consumo melhorou, manter padrão")
return{alertas,sugestoes,media,ultimo}
}
  
function renderIA(lista){
let analise=analisarAbastecimentos(lista)
if(!analise)return
let el=document.getElementById("iaBox")
if(!el)return
el.style.display="block"
el.innerHTML=`
<div style="font-weight:bold;margin-bottom:6px">🤖 Análise Inteligente</div>
<div style="font-size:12px;margin-bottom:6px">Média: ${analise.media.toFixed(2)} km/l | Último: ${analise.ultimo.toFixed(2)}</div>
${analise.alertas.map(a=>`<div style="color:#f59e0b;font-size:12px">${a}</div>`).join("")}
${analise.sugestoes.map(s=>`<div style="color:#22c55e;font-size:12px">${s}</div>`).join("")}
`
let mp=melhorPosto(lista)
if(mp&&mp.posto){
el.innerHTML+=`<div style="margin-top:6px;font-size:12px">🏪 Melhor posto: ${mp.posto} (R$ ${mp.preco.toFixed(2)}/L)</div>`
}
}

function melhorPosto(lista){
let mapa={}
lista.forEach(x=>{
let nome=x.postos?.nome_posto||"Desconhecido"
let litros=Number(x.litros||0)
let valor=Number(x.valor_total||0)
if(!mapa[nome])mapa[nome]={litros:0,valor:0}
mapa[nome].litros+=litros
mapa[nome].valor+=valor
})
let melhor=null
let menor=999
Object.keys(mapa).forEach(p=>{
let media=mapa[p].valor/mapa[p].litros
if(media<menor){
menor=media
melhor=p
}
})
return{posto:melhor,preco:menor}
}
          
function bindPostoInput(){
if(!postoSel||!postoInput)return
postoSel.addEventListener("change",()=>{
if(!postoInput.value){ // 🔥 só preenche se estiver vazio
let txt=postoSel.options[postoSel.selectedIndex]?.text||""
postoInput.value=txt
}
})
postoInput.addEventListener("input",()=>{
postoSel.value="" // 🔥 limpa seleção quando digita
})
}

e_postoInput.value=txt
}
})
e_postoInput.addEventListener("input",()=>{
e_posto.value=""
})
}
