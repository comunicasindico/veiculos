<!DOCTYPE html>
<html lang="pt-br">
<head>
<!-- 001 HEAD -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="icon" href="img/192x192.png">
<title>IA Veículo Master</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5"></script>
</head>
<style>
/* 002 STYLE */
body{margin:0;font-family:Arial;background:#fff;color:#000}
.container{max-width:720px;margin:auto;padding:10px}
.card{background:#f1f5f9;padding:12px;border-radius:12px;margin-top:10px}
input,select{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#000}
button{width:100%;padding:12px;margin-top:6px;border:none;border-radius:10px;background:#22c55e;color:#000;font-weight:bold}
.item{background:#fff;padding:10px;border-radius:10px;margin-top:6px;border:1px solid #e2e8f0}
.row{display:flex;justify-content:space-between;font-size:12px}
.headerApp{position:sticky;top:0;background:#fff;padding:10px;border-bottom:1px solid #ddd}
.menuTabs{display:flex;gap:6px}
.menuTabs button{flex:1;background:#e2e8f0;color:#000}
.menuTabs button.active{background:#22c55e}
.footerBar{position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid #ddd;padding:8px;display:flex;justify-content:flex-end}
.btnLogout{background:#dc2626;color:#fff;border:none;padding:10px 16px;border-radius:10px}
.menuTabs button[title]{position:relative}
.menuTabs button[title]:hover::after{
content:attr(title);
position:absolute;
bottom:-28px;
left:50%;
transform:translateX(-50%);
background:#000;
color:#fff;
padding:4px 8px;
font-size:10px;
border-radius:6px;
white-space:nowrap;
}

  
</style>
<body>
<div id="telaLogin">
<div class="container">
<h2>🚗 IA Veículo Master</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>
</div>
<div id="app" class="container" style="display:none">
<div class="headerApp">
<div class="menuTabs">
<button onclick="abrirTela('combustivel')" id="tab_combustivel" title="Abastecimento">⛽</button>
<button onclick="abrirTela('motorista')" id="tab_motorista" title="Motoristas">👨</button>
<button onclick="abrirTela('veiculo')" id="tab_veiculo" title="Veículos">🚗</button>
<button onclick="abrirTela('posto')" id="tab_posto" title="Postos">🏪</button>
</div>
</div>
<div id="tela_combustivel" class="tela">
<div class="card"><select id="veiculoSel"></select></div>
<div class="card">
<input id="valor" placeholder="Valor">
<input id="litros" placeholder="Litros">
<input id="km" placeholder="KM Atual">
<select id="tanque"><option value="cheio">Tanque Cheio</option><option value="parcial">Parcial</option></select>
<button onclick="salvar()">Salvar</button>
</div>
<div class="card"><canvas id="grafico"></canvas></div>
<div class="card"><h3>Histórico Completo</h3><div id="lista"></div></div>
</div>
<div id="tela_motorista" class="tela" style="display:none">
<div class="card">
<input id="m_nome" placeholder="Nome">
<input id="m_cpf" placeholder="CPF">
<input id="m_cnh" placeholder="CNH">
<input id="m_validade" placeholder="Validade CNH">
<input id="m_tel" placeholder="Telefone">
<input id="m_email" placeholder="E-mail">
<input id="m_obs" placeholder="Observações">
<button onclick="salvarMotorista()">Salvar</button>
</div>
<div id="listaMotoristas"></div>
</div>
<div id="tela_veiculo" class="tela" style="display:none">
<div class="card">
<input id="v_placa" placeholder="Placa">
<input id="v_marca" placeholder="Marca">
<input id="v_modelo" placeholder="Modelo">
<input id="v_ano" placeholder="Ano">
<input id="v_cor" placeholder="Cor">
<input id="v_renavam" placeholder="Renavam">
<input id="v_comb" placeholder="Combustível Principal">
<input id="v_km" placeholder="KM Atual">
<input id="v_ipva" placeholder="IPVA Vencimento">
<input id="v_lic" placeholder="Licenciamento">
<input id="v_obs" placeholder="Observações">
<button onclick="salvarVeiculo()">Salvar</button>
</div>
<div id="listaVeiculos"></div>
</div>
<div id="tela_posto" class="tela" style="display:none">
<div class="card">
<input id="p_nome" placeholder="Nome do Posto">
<input id="p_cnpj" placeholder="CNPJ">
<input id="p_cidade" placeholder="Cidade">
<input id="p_uf" placeholder="UF">
<input id="p_endereco" placeholder="Endereço">
<input id="p_bairro" placeholder="Bairro">
<button onclick="salvarPosto()">Salvar</button>
</div>
<div id="listaPostos"></div>
</div>
<div class="footerBar"><button onclick="logout()" class="btnLogout">Sair</button></div>
</div>
<script>
/* 003 SCRIPT */
const db=supabase.createClient("https://gspdlrenyrzbkxlvyugc.supabase.co","sb_publishable_MQRr8O1saGmGz3nsMg1g-Q_8ZIK6yrw")
let VID=null,chart=null
function hojeISO(){const d=new Date();const l=new Date(d.getTime()-d.getTimezoneOffset()*60000);return l.toISOString().slice(0,10)}
function moeda(v){return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
/* 004 LOGIN */
async function login(){
const{data}=await db.from("usuarios").select("*").eq("usuario_apelido",user.value.toLowerCase())
if(!data||!data.length)return alert("Usuário não encontrado")
if(data[0].senha_hash!==pass.value)return alert("Senha incorreta")
localStorage.setItem("empresa",data[0].empresa_id)
localStorage.setItem("uid",data[0].id)
init()
}
/* 005 INIT */
async function init(){
if(!localStorage.getItem("uid"))return mostrarLogin()
mostrarApp()
let empresa=localStorage.getItem("empresa")
let{data}=await db.from("veiculos").select("*").eq("empresa_id",empresa)
veiculoSel.innerHTML=data.map(v=>`<option value="${v.id}">${v.modelo}</option>`).join("")
VID=data[0]?.id
carregarCadastros()
render()
}
/* 006 UI */
function mostrarLogin(){telaLogin.style.display="block";app.style.display="none"}
function mostrarApp(){telaLogin.style.display="none";app.style.display="block"}
function abrirTela(t){
document.querySelectorAll(".tela").forEach(e=>e.style.display="none")
document.getElementById("tela_"+t).style.display="block"
}
/* 007 CADASTROS */
async function carregarCadastros(){
let empresa=localStorage.getItem("empresa")
let{data:motoristas}=await db.from("motoristas").select("*").eq("empresa_id",empresa)
listaMotoristas.innerHTML=motoristas.map(m=>`<div class="item">${m.id} - ${m.nome}</div>`).join("")
let{data:veiculos}=await db.from("veiculos").select("*").eq("empresa_id",empresa)
listaVeiculos.innerHTML=veiculos.map(v=>`<div class="item">${v.placa} - ${v.modelo}</div>`).join("")
let{data:postos}=await db.from("postos").select("*").eq("empresa_id",empresa)
listaPostos.innerHTML=postos.map(p=>`<div class="item">${p.nome_posto}</div>`).join("")
}
/* 008 SALVAR */
async function salvar(){
let v=parseFloat(valor.value)
let l=parseFloat(litros.value)
let k=parseFloat(km.value)
await db.from("abastecimentos").insert({
empresa_id:localStorage.getItem("empresa"),
veiculo_id:VID,
valor_total:v,
litros:l,
valor_litro:(v/l),
quilometragem:k,
tanque:tanque.value,
data_abastecimento:hojeISO()
})
render()
}
/* 009 RENDER */
async function render(){
let empresa=localStorage.getItem("empresa")
let{data}=await db.from("abastecimentos").select("*").eq("empresa_id",empresa).eq("veiculo_id",VID).order("data_abastecimento",{ascending:true})
lista.innerHTML=data.map((a,i)=>{
let ant=data[i-1]
let kmRodado=ant?(a.quilometragem-ant.quilometragem):0
let consumo=kmRodado&&a.litros?(kmRodado/a.litros).toFixed(2):"-"
return `<div class="item">
<div class="row"><span>Data</span><span>${a.data_abastecimento}</span></div>
<div class="row"><span>Posto</span><span>${a.posto_id||"-"}</span></div>
<div class="row"><span>Combustível</span><span>${a.tipo_combustivel||"-"}</span></div>
<div class="row"><span>Litros</span><span>${a.litros}</span></div>
<div class="row"><span>Valor Unitário</span><span>${a.valor_litro}</span></div>
<div class="row"><span>Total</span><span>${moeda(a.valor_total)}</span></div>
<div class="row"><span>Odômetro</span><span>${a.quilometragem}</span></div>
<div class="row"><span>KM Rodado</span><span>${kmRodado}</span></div>
<div class="row"><span>Tanque</span><span>${a.tanque}</span></div>
<div class="row"><span>Km/L</span><span>${consumo}</span></div>
</div>`
}).join("")
}
/* 010 LOGOUT */
function logout(){localStorage.clear();location.reload()}
/* 011 INIT DOM */
document.addEventListener("DOMContentLoaded",()=>{
if(localStorage.getItem("uid"))init()
else mostrarLogin()
})
</script>
</body>
</html>
