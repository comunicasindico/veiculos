<script>
function calcularIndicadores(lista){
if(!lista.length)return null
let totalGasto=0
let totalLitros=0
let consumos=[]
let totalKm=0
for(let i=0;i<lista.length;i++){
let atual=lista[i]
let anterior=lista[i+1]
totalGasto+=Number(atual.valor_total||0)
totalLitros+=Number(atual.litros||0)
if(anterior && atual.quilometragem && anterior.quilometragem){
let km=atual.quilometragem-anterior.quilometragem
if(km>0 && atual.litros>0){
let consumo=km/atual.litros
consumos.push(consumo)
totalKm+=km
}
}
}
let mediaConsumo=consumos.length?(consumos.reduce((a,b)=>a+b,0)/consumos.length):0
let melhor=Math.max(...consumos,0)
let pior=Math.min(...consumos,0)
let custoKm=totalKm>0?(totalGasto/totalKm):0
return{
totalGasto,
totalLitros,
mediaConsumo,
melhor,
pior,
custoKm,
totalAbastecimentos:lista.length
}
}
function renderKPIs(d){
let el=document.getElementById("kpis")
if(!el||!d)return
let total=Number(d.totalGasto||0)
let litros=Number(d.totalLitros||0)
let media=Number(d.mediaConsumo||0)
let custo=Number(d.custoKm||0)
let melhor=Number(d.melhor||0)
let pior=Number(d.pior||0)
let qtd=Number(d.totalAbastecimentos||0)
el.innerHTML=`
<div class="item">💰 Total<br><b>R$ ${total.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div class="item">⛽ Litros<br><b>${litros.toLocaleString("pt-BR",{minimumFractionDigits:1})}</b></div>
<div class="item">📈 Km/L<br><b>${media.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div class="item">🚗 Custo/KM<br><b>R$ ${custo.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div class="item">🏆 Melhor<br><b>${melhor.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div class="item">⚠️ Pior<br><b>${pior.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div class="item">📊 Registros<br><b>${qtd}</b></div>
`
}
  
function renderDashboard(lista){
if(!Array.isArray(lista)||!lista.length)return
let dados=[...lista].sort((a,b)=>new Date(b.data_abastecimento)-new Date(a.data_abastecimento))
let labels=dados.map(x=>fData(x.data_abastecimento))
let consumo=dados.map((a,i)=>{
let ant=dados[i+1]
if(!ant)return 0
let kmAtual=Number(a.quilometragem||0)
let kmAnt=Number(ant.quilometragem||0)
let litros=Number(a.litros||0)
let km=kmAtual-kmAnt
if(km<=0||litros<=0)return 0
return km/litros
})
let valores=dados.map(x=>Number(x.valor_total||0))
if(graficoConsumo)graficoConsumo.destroy()
if(graficoGasto)graficoGasto.destroy()
graficoConsumo=new Chart(graficoConsumoEl,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Km/L",
data:consumo,
borderWidth:2,
tension:0.3
}]
},
options:{
plugins:{legend:{display:true}},
scales:{
y:{beginAtZero:true}
}
}
})
const cores=["#22c55e","#3b82f6","#f59e0b","#ef4444","#a855f7","#06b6d4","#84cc16","#f97316","#e11d48","#14b8a6"]
let ano=""
if(dados.length&&dados[0].data_abastecimento){
ano=dados[0].data_abastecimento.split("-")[0]
}
graficoGasto=new Chart(graficoGastoEl,{
type:"bar",
data:{
labels:labels,
datasets:[{
data:valores,
backgroundColor:valores.map((_,i)=>cores[i%cores.length]),
borderRadius:6
}]
},
options:{
plugins:{
legend:{display:false},
title:{display:true,text:"Gastos "+ano}
},
scales:{
y:{
beginAtZero:true,
ticks:{
callback:(v)=>"R$ "+Number(v).toLocaleString("pt-BR")
}
}
}
}
})
let indicadores=calcularIndicadores(dados)
renderKPIs(indicadores)
}

function fData(d){
if(!d)return "-"
let x=d.split("T")[0].split("-")
return x[2]+"/"+x[1]
}

/* 006 LOGIN */
async function login(){
let usuario=(user.value||"").trim()
let senha=(pass.value||"").trim()
if(!usuario||!senha){
alert("Informe usuário e senha")
return
}
let {data,error}=await db
.from("usuarios")
.select("*")
.eq("usuario_apelido",usuario)
.single()
if(error||!data){
alert("Usuário não encontrado")
return
}
if(data.senha_hash!==senha){
alert("Senha incorreta")
return
}
localStorage.setItem("empresa",data.empresa_id)
init()
}

/* 010 SALVAR */
async function salvar(){
if(!data.value){
data.value=new Date().toISOString().slice(0,10)
}
if(!VID)return alert("Selecione um veículo")

let emp=localStorage.getItem("empresa")

let v_total=parseFloat(valor.value)||0
let v_litros=parseFloat(litros.value)||0
let v_km=parseFloat(km.value)||0
let v_data=data.value

if(!v_data)return alert("Informe a data")
if(v_total<=0)return alert("Valor inválido")
if(v_litros<=0)return alert("Litros inválido")

/* 🔥 CALCULA VALOR/LITRO AUTOMÁTICO */
let v_valorLitro=v_litros>0?(v_total/v_litros):0

async function abrirCameraOCR(){
modalOCR.style.display="flex"
previewOCR.style.display="none"
let stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
videoOCR.srcObject=stream
}
function capturarImagem(){
let canvas=canvasOCR
let video=videoOCR
canvas.width=video.videoWidth
canvas.height=video.videoHeight
let ctx=canvas.getContext("2d")
ctx.drawImage(video,0,0)
let img=canvas.toDataURL("image/jpeg",0.9)
previewOCR.src=img
previewOCR.style.display="block"
}
async function processarOCR(){
if(!previewOCR.src)return alert("Capture primeiro")
alert("Processando cupom...")
const {data:{text}}=await Tesseract.recognize(previewOCR.src,"por",{logger:m=>console.log(m)})
console.log(text)
processarCupomInteligente(text)
fecharOCR()
}
function processarCupomInteligente(text){
text=text.replace(/\r/g,"\n").toLowerCase()
let cnpj=(text.match(/\d{2}\.\d{3}\.\d{3}\/\d{4}\-\d{2}/)||[""])[0]
let total=(text.match(/total\s*[r\$]*\s*([\d\.,]+)/)||[])[1]
let litros=(text.match(/(\d+[\.,]\d+)\s*l/)||[])[1]
let valorLitro=(text.match(/(\d+[\.,]\d+)\s*(?:\/l|litro)/)||[])[1]
let km=(text.match(/km[:\s]*([\d]+)/)||[])[1]
let combustivel=(text.match(/gasolina|etanol|diesel|gnv/)||[""])[0]
if(total)valor.value=total.replace(",",".")
if(litros)litros.value=litros.replace(",",".")
if(valorLitro)valor_litro.value=valorLitro.replace(",",".")
if(km)km.value=km
if(combustivel)v_combustivel.value=combustivel
if(cnpj)buscarPostoPorCNPJ(cnpj)
validarAbastecimento()
alert("Cupom processado com IA")
}
function validarAbastecimento(){
let v=parseFloat(valor.value)||0
let l=parseFloat(litros.value)||0
if(v>0&&l>0){
let calc=v/l
if(calc>10||calc<2){
alert("⚠️ Valor por litro suspeito")
}
}
}
function fecharOCR(){
modalOCR.style.display="none"
let stream=videoOCR.srcObject
if(stream){stream.getTracks().forEach(t=>t.stop())}
}
function analisarAbastecimentos(lista){
if(!lista||lista.length<2)return null
let dados=[...lista].sort((a,b)=>new Date(b.data_abastecimento)-new Date(a.data_abastecimento))
let alertas=[]
let sugestoes=[]
let consumos=[]
for(let i=0;i<dados.length-1;i++){
let atual=dados[i]
let anterior=dados[i+1]
let kmAtual=Number(atual.quilometragem||0)
let kmAnterior=Number(anterior.quilometragem||0)
let litros=Number(atual.litros||0)
let valor=Number(atual.valor_total||0)
let kmRodado=kmAtual-kmAnterior
if(kmRodado>0&&litros>0){
let consumo=kmRodado/litros
consumos.push(consumo)
if(consumo<5)alertas.push("⚠️ Consumo muito baixo detectado")
if(consumo>20)alertas.push("⚠️ Consumo muito alto (possível erro)")
}
if(valor/litros>10)alertas.push("⚠️ Valor por litro muito alto")
if(kmRodado<0)alertas.push("🚨 KM inconsistente (possível fraude)")
}
let media=consumos.reduce((a,b)=>a+b,0)/consumos.length||0
let ultimo=consumos[0]||0
if(ultimo<media*0.8)sugestoes.push("🔻 Consumo piorou, verificar veículo")
if(ultimo>media*1.2)sugestoes.push("🔺 Consumo melhorou, manter padrão")
return{alertas,sugestoes,media,ultimo}
}
  
function renderIA(lista){
let analise=analisarAbastecimentos(lista)
if(!analise)return
let el=document.getElementById("iaBox")
if(!el)return
el.style.display="block"
el.innerHTML=`
<div style="font-weight:bold;margin-bottom:6px">🤖 Análise Inteligente</div>
<div style="font-size:12px;margin-bottom:6px">Média: ${analise.media.toFixed(2)} km/l | Último: ${analise.ultimo.toFixed(2)}</div>
${analise.alertas.map(a=>`<div style="color:#f59e0b;font-size:12px">${a}</div>`).join("")}
${analise.sugestoes.map(s=>`<div style="color:#22c55e;font-size:12px">${s}</div>`).join("")}
`
let mp=melhorPosto(lista)
if(mp&&mp.posto){
el.innerHTML+=`<div style="margin-top:6px;font-size:12px">🏪 Melhor posto: ${mp.posto} (R$ ${mp.preco.toFixed(2)}/L)</div>`
}
}

function melhorPosto(lista){
let mapa={}
lista.forEach(x=>{
let nome=x.postos?.nome_posto||"Desconhecido"
let litros=Number(x.litros||0)
let valor=Number(x.valor_total||0)
if(!mapa[nome])mapa[nome]={litros:0,valor:0}
mapa[nome].litros+=litros
mapa[nome].valor+=valor
})
let melhor=null
let menor=999
Object.keys(mapa).forEach(p=>{
let media=mapa[p].valor/mapa[p].litros
if(media<menor){
menor=media
melhor=p
}
})
return{posto:melhor,preco:menor}
}
