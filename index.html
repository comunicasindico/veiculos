/* 🔥 RENDER PRINCIPAL */
async function render(){

if(!db)return

let vs=document.getElementById("veiculoSel")

VID=vs.value

if(listaEl)listaEl.innerHTML="<div class='item'>Selecione um veículo</div>"
renderDashboard([])
return
}

/* 🔥 BUSCA */
let {data,error}=await db
.from("abastecimentos")
.select("*,postos(nome_posto)")
.eq("veiculo_id",VID)
.eq("empresa_id",EMP())
.order("data_abastecimento",{ascending:false})

/* 🔒 ERRO */
if(error){
console.error(error)
if(listaEl)listaEl.innerHTML="Erro ao carregar"
return
}

/* 🔒 SEM DADOS */
if(!data || !data.length){
if(listaEl)listaEl.innerHTML="<div class='item'>Sem histórico</div>"
renderDashboard([])
return
}

/* 🔥 LIMITE */
data=data.slice(0,50)

/* 🔥 RENDER LISTA */
listaEl.innerHTML=data.map(a=>{

let valor=Number(a.valor_total||0)
let litros=Number(a.litros||0)
let km=Number(a.quilometragem||0)

return `
<div class="item">
<div class="itemContent">
<div><b>${fData(a.data_abastecimento)}</b> | "-"}</div>
<div style="font-size:11px;color:#94a3b8">
R$ ${valor.toFixed(2)} | ${litros}L | KM ${km}
</div>
</div>
</div>
`

}).join("")

/* 🔥 DASHBOARD */
renderDashboard(data)

}

/* 🔥 INDICADORES */
function calcularIndicadores(lista){
if(!lista.length)return null
let totalGasto=0,totalLitros=0,totalKm=0,consumos=[]
for(let i=0;i<lista.length;i++){
let a=lista[i]
let b=lista[i+1]
totalGasto+=Number(a.valor_total||0)
totalLitros+=Number(a.litros||0)
if(b){
let km=a.quilometragem-b.quilometragem
if(km>0&&a.litros>0){
let c=km/a.litros
consumos.push(c)
totalKm+=km
}
}
}
let media=consumos.length?consumos.reduce((x,y)=>x+y)/consumos.length:0
return{
totalGasto,
totalLitros,
mediaConsumo:media,
melhor:Math.max(...consumos,0),
pior:Math.min(...consumos,0),
custoKm:totalKm?totalGasto/totalKm:0,
totalAbastecimentos:lista.length
}
}

/* 🔥 DASHBOARD */
function renderDashboard(lista){
if(!Array.isArray(lista))return
let dados=[...lista]
if(filtroInicio)dados=dados.filter(x=>new Date(x.data_abastecimento)>=new Date(filtroInicio))
if(filtroFim)dados=dados.filter(x=>new Date(x.data_abastecimento)<=new Date(filtroFim))
if(!dados.length)return
dados=dados.sort((a,b)=>new Date(a.data_abastecimento)-new Date(b.data_abastecimento))
let labels=dados.map(x=>fData(x.data_abastecimento))
let consumo=[null]
for(let i=1;i<dados.length;i++){
let a=dados[i],b=dados[i-1]
let km=a.quilometragem-b.quilometragem
if(km>0&&a.litros>0)consumo.push(km/a.litros);else consumo.push(null)
}

/* =========================================================
🔥 EXTRAÇÃO INTELIGENTE
========================================================= */
function extrairDadosIA(text){
if(!text)return{}
text=text.replace(/\r/g,"\n").toLowerCase()
let num=v=>v?v.replace(/\./g,"").replace(",","."):""
let dados={}
dados.cnpj=(text.match(/\d{2}\.\d{3}\.\d{3}\/\d{4}\-\d{2}/)||[])[0]||(text.match(/\d{14}/)||[])[0]||""
let total=text.match(/total\s*(r\$)?\s*([\d\.,]+)/)
dados.total=total?num(total[2]):""
let litros=text.match(/([\d\.,]+)\s*(l|litros)/)
dados.litros=litros?num(litros[1]):""
let vl=text.match(/([\d\.,]+)\s*(\/l|litro)/)
dados.valor_litro=vl?num(vl[1]):""
let km=text.match(/km[\s:]*([\d]{3,7})/)
dados.km=km?km[1]:""
if(text.includes("aditivada"))dados.combustivel="Gasolina Aditivada"
else if(text.includes("gasolina"))dados.combustivel="Gasolina Comum"
else if(text.includes("etanol")||text.includes("alcool"))dados.combustivel="Álcool"
else if(text.includes("diesel"))dados.combustivel="Diesel"
else if(text.includes("gnv"))dados.combustivel="GNV"
else dados.combustivel="Gasolina Comum"
if(!dados.total&&!dados.litros)return null
return dados
}

/* =========================================================
🔥 AUTO RECORTE
========================================================= */
async function autoRecorteCupom(src){
return new Promise(resolve=>{
let img=new Image()
img.onload=()=>{
let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")
canvas.width=img.width
canvas.height=img.height
ctx.drawImage(img,0,0)
let imageData=ctx.getImageData(0,0,canvas.width,canvas.height)
let data=imageData.data
for(let i=0;i<data.length;i+=4){
let avg=(data[i]+data[i+1]+data[i+2])/3
let val=avg>160?255:0
data[i]=val;data[i+1]=val;data[i+2]=val
}
ctx.putImageData(imageData,0,0)
resolve(canvas.toDataURL())
}
img.src=src
})
}

function analisarAbastecimentos(lista){
if(!lista||lista.length<2)return null
let dados=[...lista].sort((a,b)=>new Date(b.data_abastecimento)-new Date(a.data_abastecimento))
let alertas=[]
let sugestoes=[]
let consumos=[]
for(let i=0;i<dados.length-1;i++){
let a=dados[i]
let b=dados[i+1]
let kmA=Number(a.quilometragem||0)
let kmB=Number(b.quilometragem||0)
let litros=Number(a.litros||0)
let valor=Number(a.valor_total||0)
let kmRodado=kmA-kmB
if(a.tanque==="cheio"&&b.tanque==="cheio"&&kmRodado>0&&litros>0){
let consumo=kmRodado/litros
consumos.push(consumo)
if(consumo<5)alertas.push("⚠️ Consumo muito baixo")
if(consumo>20)alertas.push("⚠️ Consumo muito alto")
}
let preco=litros>0?valor/litros:0
if(preco>10)alertas.push("⚠️ Preço combustível alto")
if(preco<2)alertas.push("⚠️ Preço suspeito")
if(kmRodado<0)alertas.push("🚨 KM inconsistente")
}
let media=consumos.length?consumos.reduce((a,b)=>a+b,0)/consumos.length:0
let ultimo=consumos[0]||0
if(ultimo<media*0.8)sugestoes.push("🔻 Consumo piorou")
if(ultimo>media*1.2)sugestoes.push("🔺 Consumo melhorou")
return{alertas,sugestoes,media,ultimo}
}

function calcularAutonomia(lista){
if(!Array.isArray(lista)||lista.length<2)return null
let dados=[...lista].sort((a,b)=>new Date(b.data_abastecimento)-new Date(a.data_abastecimento))
let consumos=[]
for(let i=0;i<dados.length-1;i++){
let a=dados[i],b=dados[i+1]
if(a.tanque!=="cheio"||b.tanque!=="cheio")continue
let kmA=Number(a.quilometragem||0)
let kmB=Number(b.quilometragem||0)
let litros=Number(a.litros||0)
let rodado=kmA-kmB
if(rodado>0&&litros>0)consumos.push(rodado/litros)
}
if(!consumos.length)return null
let media=consumos.reduce((x,y)=>x+y)/consumos.length
let capacidade=60
let autonomia=media*capacidade
return{media,autonomia}
}

function melhorPosto(lista){
let mapa={}
lista.forEach(x=>{
let nome=x.postos?.nome_posto||"Desconhecido"
let litros=Number(x.litros||0)
let valor=Number(x.valor_total||0)
if(!mapa[nome])mapa[nome]={litros:0,valor:0}
mapa[nome].litros+=litros
mapa[nome].valor+=valor
})
let melhor=null,menor=999
Object.keys(mapa).forEach(p=>{
let media=mapa[p].valor/mapa[p].litros
if(media<menor){menor=media;melhor=p}
})
return{posto:melhor,preco:menor}
}

function renderIA(lista){
let el=document.getElementById("iaBox")
if(!el)return
let analise=analisarAbastecimentos(lista)
if(!analise){el.style.display="none";return}
el.style.display="block"
el.innerHTML=`<div style="font-weight:bold">🤖 IA Veículo</div>
<div style="font-size:12px">Média: ${analise.media.toFixed(2)} km/l | Último: ${analise.ultimo.toFixed(2)}</div>
${analise.alertas.map(a=>`<div style="color:#f59e0b;font-size:12px">${a}</div>`).join("")}
${analise.sugestoes.map(s=>`<div style="color:#22c55e;font-size:12px">${s}</div>`).join("")}`
