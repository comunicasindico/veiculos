<!DOCTYPE html>
<html lang="pt-br">
<head>
<link rel="icon" href="data:,">
<meta charset="UTF-8">
<title>Veículos App PRO</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#020617">
<link rel="manifest" href="manifest.json">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5"></script>

<style>
body{font-family:Arial;background:#020617;color:#fff;padding:15px}
.card{background:#111827;padding:15px;border-radius:12px;margin-top:10px}
button{padding:12px;border:none;border-radius:10px;background:#22c55e;color:#000;font-weight:bold;width:100%;margin-top:5px}
input,select{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:none}
.kpi{color:#22c55e}
.alerta{color:#ef4444;font-weight:bold}
video,canvas{width:100%;border-radius:10px;margin-top:10px}

</style>

</head>
<body>
<div id="loginBox" class="card" style="max-width:300px;margin:auto">
<h3>Login</h3>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">
<h2>🚗 Veículos PRO</h2>

<div class="card">
<select id="veiculoSel"></select>
<div id="kpi"></div>
<div id="alerta"></div>
</div>

<div class="card">
<h3>📷 Ler Nota</h3>
<video id="video" autoplay style="display:none"></video>
<button onclick="capturar()">Capturar Nota</button>
<canvas id="canvas"></canvas>
<div id="ocr"></div>
</div>

<div class="card">
<h3>📍 Rota GPS</h3>
<button onclick="iniciarGPS()">Iniciar Rastreamento</button>
<div id="gps"></div>
</div>

<div class="card">
<h3>⛽ Abastecimento</h3>
<input id="litros" placeholder="Litros">
<input id="valor" placeholder="Valor">
<input id="km" placeholder="KM">
<button onclick="salvar()">Salvar</button>
</div>

<div class="card">
<h3>📊 Gráfico</h3>
<canvas id="grafico"></canvas>
</div>

<div class="card">
<h3>📊 Gráfico Mensal</h3>
<canvas id="graficoMensal"></canvas>
</div>

<div class="card">
<h3>📋 Histórico</h3>
<div id="lista"></div>
</div>

<script>
/* ====================================================000 – VAR GLOBAL==================================================== */
let chart=null
let chartMensal=null
/* ====================================================000 RESET==================================================== */
if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(x=>x.unregister()))}
if('caches'in window){caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)))}
/* ====================================================001 INIT==================================================== */
document.addEventListener("DOMContentLoaded",()=>{
window.db=supabase.createClient("https://gspdlrenyrzbkxlvyugc.supabase.co","sb_publishable_MQRr8O1saGmGz3nsMg1g-Q_8ZIK6yrw")
window.lista=document.getElementById("lista")
window.kpi=document.getElementById("kpi")
window.alerta=document.getElementById("alerta")
window.grafico=document.getElementById("grafico")
window.veiculoSel=document.getElementById("veiculoSel")
init()
})
/* ========LOGIN================================================== */
async function login(){
const u=user.value.toLowerCase()
const p=pass.value
const {data}=await db.from("usuarios")
.select("*")
.eq("usuario_apelido",u)
.single()
if(!data||data.senha_hash!==p){
alert("Login inválido")
return
}
localStorage.setItem("uid",data.id)
localStorage.setItem("tipo",data.perfil)
document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="block"
init()
}
/* ====================================================010 INIT==================================================== */
async function init(){
const uid=localStorage.getItem("uid")
const tipo=localStorage.getItem("tipo")
/* 🔐 CONTROLE LOGIN */
if(!uid){
document.getElementById("loginBox").style.display="block"
document.getElementById("app").style.display="none"
return
}else{
document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="block"
}
/* 🚗 BUSCAR VEÍCULOS */
let {data:v,error}=await db.from("veiculos").select("*")
if(error){alert("Erro ao carregar veículos");return}
/* 🔥 FILTRO POR PERFIL */
if(tipo!=="admin"){
v=v.filter(x=>String(x.usuario_id)===String(uid))
}
/* 🧠 GARANTIA */
if(!v||!v.length){
veiculoSel.innerHTML="<option>Nenhum veículo</option>"
return
}
/* 🚘 LISTA */
window.VEICULOS=v
veiculoSel.innerHTML=v.map(x=>`
<option value="${x.id}">
${x.modelo} - ${x.placa||""}
</option>
`).join("")
/* 🎯 VEÍCULO ATUAL */
window.VID=v[0].id
/* 🔁 TROCA VEÍCULO */
veiculoSel.onchange=()=>{
window.VID=veiculoSel.value
render()
}
/* 🚀 RENDER */
render()
}
/* ====================================================020 CAMERA CONTROL==================================================== */
let stream=null
async function abrirCamera(){
if(stream)return
stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
video.srcObject=stream
video.style.display="block"
}
function fecharCamera(){
if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
video.style.display="none"
}
/* ====================================================030 OCR==================================================== */
async function capturar(){
if(!stream)await abrirCamera()
const ctx=canvas.getContext("2d")
canvas.width=video.videoWidth
canvas.height=video.videoHeight
ctx.drawImage(video,0,0)
ocr.innerText="Lendo..."
const {data:{text}}=await Tesseract.recognize(canvas,"por")
const dados=interpretar(text)
ocr.innerHTML=`Valor: ${dados.valor||"-"} | CNPJ: ${dados.cnpj||"-"}`
if(dados.valor)valor.value=dados.valor
fecharCamera()
}
/* ====================================================031 INTERPRETAR==================================================== */
function interpretar(txt){
txt=txt.toUpperCase()
let valor=null,cnpj=null
let v=txt.match(/\d{1,3}(\.\d{3})*,\d{2}/g)
if(v){valor=Math.max(...v.map(x=>parseFloat(x.replace(/\./g,"").replace(",","."))))}
let c=txt.match(/\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}/)
if(c)cnpj=c[0]
return{valor,cnpj}
}
/* ====================================================040 SALVAR==================================================== */
async function salvar(){
await db.from("abastecimentos").insert({
veiculo_id:VID,
litros:parseFloat(litros.value),
valor_total:parseFloat(valor.value),
quilometragem:parseFloat(km.value),
data_abastecimento:new Date().toISOString()
})
await db.from("veiculos").update({km_atual:parseFloat(km.value)}).eq("id",VID)
render()
}
/* ====================================================060 – GRAFICO==================================================== */
function renderGrafico(labels,data){
const el=document.getElementById("grafico")
if(!el)return
const ctx=el.getContext("2d")
if(chart){chart.destroy()}
chart=new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"KM/L",
data:data,
borderWidth:2
}]
},
options:{
responsive:true,
plugins:{legend:{labels:{color:"#fff"}}},
scales:{x:{ticks:{color:"#fff"}},y:{ticks:{color:"#fff"}}}
}
})
}
/* ====================================================070 CSV IMPORT==================================================== */
async function importarCSV(file){
const text=await file.text()
const linhas=text.split("\n").slice(1)
for(const l of linhas){
if(!l.trim())continue
const c=l.split(",")
await db.from("abastecimentos").insert({
veiculo_id:VID,
litros:parseFloat(c[1]),
valor_total:parseFloat(c[2]),
quilometragem:parseFloat(c[3]),
data_abastecimento:c[0]
})
}
render()
}
/* ====================================================071 INPUT CSV==================================================== */
document.addEventListener("change",e=>{
if(e.target.id==="csvFile")importarCSV(e.target.files[0])
})
/* ====================================================100 – RENDER DASHBOARD PROFISSIONAL==================================================== */
async function render(){
let {data}=await db.from("abastecimentos").select("*").eq("veiculo_id",VID).order("data_abastecimento",{ascending:true})
if(!data||data.length<2){
if(lista){
lista.innerHTML=data.map(a=>`
<div>
${a.data_abastecimento.slice(0,10)} | ${a.quilometragem} km<br>
${a.litros}L | R$${a.valor_total}
<hr>
</div>
`).join("")
}
kpi.innerHTML=""
return
}
/* ================= KPI ================= */
let consumo=[],labels=[],totalCons=0,count=0,totalValor=0,totalKm=0
let melhor=0,pior=999

for(let i=1;i<data.length;i++){
let kmDiff=data[i].quilometragem-data[i-1].quilometragem
let cons=kmDiff/data[i].litros
consumo.push(cons)
labels.push(i)

if(cons>0){
totalCons+=cons
count++
if(cons>melhor)melhor=cons
if(cons<pior)pior=cons
}
totalValor+=data[i].valor_total
totalKm+=kmDiff
}
let media=(totalCons/count).toFixed(2)
let custoKm=(totalValor/totalKm).toFixed(2)
/* ================= KPI UI ================= */
kpi.innerHTML=`
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<div class="card"><b>Média</b><br>${media} km/l</div>
<div class="card"><b>Custo/KM</b><br>R$ ${custoKm}</div>
<div class="card"><b>Melhor</b><br>${melhor.toFixed(2)}</div>
<div class="card"><b>Pior</b><br>${pior.toFixed(2)}</div>
</div>
`
/* ================= ALERTA ================= */
if(media<6){
alerta.innerHTML='<div class="alerta">⚠ Consumo alto</div>'
}else{
alerta.innerHTML=''
}
/* ================= GRÁFICO PRINCIPAL ================= */
renderGrafico(labels,consumo)
/* ================= GRÁFICO MENSAL ================= */
let meses={}
data.forEach((a,i)=>{
let mes=a.data_abastecimento.slice(0,7)
if(!meses[mes])meses[mes]={km:0,litros:0}
if(i>0){
meses[mes].km+=a.quilometragem-data[i-1].quilometragem
meses[mes].litros+=a.litros
}
})
let labelsMes=[],consumoMes=[]
for(let m in meses){
let c=meses[m].km/meses[m].litros
labelsMes.push(m)
consumoMes.push(c)
}
renderGraficoMensal(labelsMes,consumoMes)

/* ================= LISTA ================= */
if(lista){
lista.innerHTML=data.map(a=>`
<div class="card" style="display:flex;justify-content:space-between;align-items:center">
<div>
<b>${a.data_abastecimento.slice(0,10)}</b><br>
${a.litros}L • R$ ${a.valor_total}
</div>
<div>
<b>${a.quilometragem} km</b>
</div>
</div>
`).join("")
}
}
/* ====================================================101 – GRAFICO MENSAL==================================================== */
function renderGraficoMensal(labels,data){
const el=document.getElementById("graficoMensal")
if(!el)return
const ctx=el.getContext("2d")
if(chartMensal){chartMensal.destroy()}
chartMensal=new Chart(ctx,{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"KM/L",
data:data,
borderRadius:8,
backgroundColor:"rgba(34,197,94,0.7)"
}]
},
options:{
plugins:{
legend:{display:false},
tooltip:{
backgroundColor:"#000",
titleColor:"#fff",
bodyColor:"#fff"
}
},
scales:{
x:{ticks:{color:"#ccc"}},
y:{ticks:{color:"#ccc"}}
}
}
})
}


</script>
</div>
</body>
</html>
